# =============================================================================
# OmicsClaw Skill v2 — skill.yaml (ADR 0037 machine contract)
#
# This file is the SINGLE SOURCE OF TRUTH for a v2 skill.  SKILL.md,
# catalog.json, references/parameters.md, the routing table and INDEX.md are all
# GENERATED one-way from it — never hand-edit those; edit here and regenerate.
#
# Validated by `omicsclaw.skill.schema` (SkillManifest).  After copying this
# template, resolve every `# TODO` below, then run (from the repo root):
#   python scripts/generate_skill_md.py        skills/<domain>/<name>
#   python scripts/generate_parameters_md.py   skills/<domain>/<name>
#   python scripts/audit_skill_requires.py --write     # finalize deps.python
#   python scripts/skill_lint.py               skills/<domain>/<name>
#
# A real, filled-in example lives at skills/singlecell/scrna/sc-qc/skill.yaml.
# =============================================================================

schema_version: 2

# ── identity ────────────────────────────────────────────────────────────────
id: replace-me-skill        # TODO: kebab-case id (matches the skill dir name)
name: replace-me-skill      # TODO: kebab-case name (usually == id)
domain: replace-me          # TODO: spatial|singlecell|genomics|proteomics|metabolomics|bulkrna|orchestrator|literature
type: leaf                  # leaf (default) | consensus | workflow
version: 0.1.0
author: OmicsClaw           # TODO
license: MIT
emoji: "🔬"                 # TODO: single decorative emoji

# ── applicability (drives routing + the generated SKILL.md description) ──────
summary:
  # One "Load when …" clause; keep it plus the skip clause under ~50 words.
  load_when: replace-me — describe the one situation this skill is for   # TODO
  skip_when:                # TODO: >=1 rule (lint requires at least one)
  - condition: an existing skill already covers the request
    use: replace-me-sibling-skill    # optional: the skill to redirect to
  trigger_keywords:         # TODO: free-text routing phrases
  - replace-me-keyword
  tags:                     # TODO
  - replace-me
  aliases: []               # legacy skill names this answers to

# ── interface (generated into SKILL.md's Inputs & Outputs summary) ──────────
interface:
  inputs:
    modalities: []          # TODO: e.g. [scrna] / [visium]
    file_types: []          # TODO: extensions WITHOUT the dot, e.g. [h5ad, csv]
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    # Flags the script accepts BEYOND --input/--output/--demo.  Must match the
    # script's argparse exactly (skill_lint enforces this).  Kebab-case only.
    allowed_extra_flags:
    - --method
    hints: {}               # per-method tuning hints; {} is valid
  outputs:
    files:                  # TODO: the concrete files the script writes
    - tables/replace_me.csv
    - report.md
    - result.json
    result_json:
      required_keys: []

# ── execution ───────────────────────────────────────────────────────────────
runtime:
  language: python          # python | r | bash
  entry: replace_me.py      # TODO: rename to <skill_name>.py after copying

# ── install channels (finalize with scripts/audit_skill_requires.py) ────────
deps:
  python:                   # TODO: third-party imports as PyPI names
  - numpy
  - pandas

# ── generated-doc bookkeeping ───────────────────────────────────────────────
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/

lifecycle:
  status: draft             # draft while filling in; -> mvp once it runs on real data

provenance:
  origin: human             # a hand-authored skill copied from templates/skill/
