name: PR CI

on:
  pull_request:
    branches: [main]

jobs:
  pr-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR Summary
        run: |
          echo "## Pull Request Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **PR** | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Author** | @${{ github.event.pull_request.user.login }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Title** | ${{ github.event.pull_request.title }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Base** | \`${{ github.event.pull_request.base.ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Head** | \`${{ github.event.pull_request.head.ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files changed" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          git diff --stat ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  core-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pandas scikit-learn matplotlib PyYAML pydantic

      - name: Test OmicsClaw CLI
        run: python omicsclaw.py list

      - name: Check skills/catalog.json is fresh
        run: python scripts/generate_catalog.py --check

      - name: Check references/parameters.md is fresh (dual-track)
        run: python scripts/generate_parameters_md.py --all --check

      - name: Check v2 SKILL.md is regenerated from skill.yaml
        run: python scripts/generate_skill_md.py --all --check

      - name: Check v2 script SKILL_VERSION matches skill.yaml.version
        run: python scripts/sync_skill_version.py --all --check

      - name: Check skill `requires:` frontmatter is complete
        run: python scripts/audit_skill_requires.py --check

      - name: Validate v2 skill.yaml contracts (ADR 0037 dual-track)
        run: python scripts/validate_skill_yaml.py --check

      - name: Check routing table (CLAUDE.md) is fresh
        run: python scripts/generate_routing_table.py --check

      - name: Check per-domain INDEX.md is fresh
        run: python scripts/generate_domain_index.py --check

      - name: Check SKILL.md description drift (catalog / INDEX / routing)
        run: python scripts/check_description_drift.py

      - name: Catalog generator regression tests
        run: python -m pytest tests/test_generate_catalog.py -v

      - name: Skill requires auditor tests
        run: python -m pytest tests/test_skill_requires_audit.py -v

      - name: Skill schema + v2 registry-wiring tests
        run: python -m pytest tests/test_skill_schema.py tests/test_registry_v2.py -v

      - name: v2 lint + parameters.md generator tests (dual-track)
        run: python -m pytest tests/test_skill_lint_v2.py tests/test_generate_parameters_md.py -v

      - name: v2 interface extraction + SKILL.md generator tests
        run: python -m pytest tests/test_interface_extract.py tests/test_skill_md.py -v

      - name: v2 SKILL_VERSION sync tests
        run: python -m pytest tests/test_skill_version.py -v

      - name: v2 skip_when description parser tests
        run: python -m pytest tests/test_skill_description_parse.py -v

  memory-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[memory,dev]"
          # These runtime packages are mamba-owned in environment.yml for
          # real installs. The PR job is intentionally pip-only, so install
          # the narrow memory/interactive import surface needed by these tests.
          pip install \
            rich \
            prompt-toolkit \
            questionary \
            PyYAML \
            aiosqlite \
            sqlalchemy \
            fastapi \
            uvicorn \
            cryptography \
            pydantic \
            requests \
            openai \
            python-dotenv \
            httpx

      - name: Run memory tests
        run: |
          python -m pytest \
            tests/test_context_assembler.py \
            tests/test_interactive_memory_command_support.py \
            tests/test_memory_server_security.py \
            tests/test_scoped_memory.py \
            -v

  bot-core-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bot core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # bot/requirements.txt was retired by ADR 0004 (bot/ folded into
          # omicsclaw/surfaces/channels/). Install the runtime deps the
          # channel-surface tests import here, mirroring memory-test's
          # explicit-pip-list pattern.
          pip install \
            requests \
            httpx \
            pyyaml \
            pydantic \
            openai \
            python-dotenv \
            python-telegram-bot \
            lark-oapi \
            edge-tts

      - name: Run bot core tests
        run: |
          python -m pytest \
            tests/test_bot_core_import_behavior.py \
            tests/test_bot_completion_messages.py \
            tests/test_channels.py \
            tests/test_provider_registry.py \
            tests/test_pipeline_provider_resolution.py \
            -v

  spatial-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install spatial preprocess test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Full analysis installs get these from 0_setup_env.sh/environment.yml.
          # Keep pyproject.toml as the thin pip residue and hydrate only this
          # pip-only PR job with the spatial-preprocess demo test surface.
          pip install \
            "numpy>=1.24,<2.1" \
            "pandas>=2.0,<3.0" \
            scipy \
            scikit-learn \
            matplotlib \
            seaborn \
            pillow \
            h5py \
            anndata \
            scanpy \
            scikit-misc \
            python-igraph \
            leidenalg \
            umap-learn

      - name: Run spatial preprocessing tests
        run: python -m pytest skills/spatial/spatial-preprocess/tests/ -v
