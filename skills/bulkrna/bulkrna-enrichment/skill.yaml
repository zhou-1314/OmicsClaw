schema_version: 2
id: bulkrna-enrichment
name: bulkrna-enrichment
domain: bulkrna
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: 🛤️
summary:
  load_when: running pathway / GO term enrichment on a bulk RNA-seq DE result list
  skip_when:
  - condition: the input is single-cell
    use: sc-enrichment
  - condition: the input is spatial
    use: spatial-enrichment
  - condition: metabolite pathways
    use: metabolomics-pathway-enrichment
  trigger_keywords:
  - bulk enrichment
  - pathway analysis
  - GSEA
  - ORA
  - GO enrichment
  - KEGG
  - bulk pathway
  tags:
  - bulkrna
  - enrichment
  - GSEA
  - ORA
  - GO
  - KEGG
  - Reactome
  - pathway
  aliases:
  - bulk-enrichment
interface:
  inputs:
    file_types:
    - csv
    artifacts:
    - kind: bulkrna.differential_results
      formats:
      - csv
  outputs:
    files:
    - tables/enrichment_results.csv
    - tables/enrichment_significant.csv
    - figures/enrichment_barplot.png
    - figures/enrichment_dotplot.png
    - report.md
    - result.json
runtime:
  entry: bulkrna_enrichment.py
deps:
  python:
  - gseapy
  - matplotlib
  - numpy
  - pandas
  - scipy
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  tests: tests/
