schema_version: 2
id: bulkrna-de
name: bulkrna-de
domain: bulkrna
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: 🔬
summary:
  load_when: comparing gene expression between two conditions in bulk RNA-seq count data
  skip_when:
  - condition: the data is single-cell
    use: sc-de
  - condition: spatial
    use: spatial-de
  - condition: you need exon-level alternative splicing
    use: bulkrna-splicing
  trigger_keywords:
  - differential expression
  - DE analysis
  - DESeq2
  - volcano plot
  - fold change
  - DEGs
  - bulk DE
  tags:
  - bulkrna
  - differential-expression
  - DESeq2
  - volcano
  - MA-plot
  - fold-change
  aliases:
  - bulk-de
interface:
  inputs:
    file_types:
    - csv
  outputs:
    files:
    - tables/counts.csv
    - tables/de_results.csv
    - tables/de_significant.csv
    - tables/deseq2_results.csv
    - figures/de_barplot.png
    - figures/ma_plot.png
    - figures/pvalue_histogram.png
    - figures/volcano_plot.png
    - report.md
    - result.json
runtime:
  entry: bulkrna_de.py
deps:
  python:
  - matplotlib
  - numpy
  - pandas
  - scipy
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  tests: tests/
