schema_version: 2
id: bulkrna-read-qc
name: bulkrna-read-qc
domain: bulkrna
type: leaf
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: 🔍
summary:
  load_when: checking raw FASTQ quality (Phred / GC / adapter / Q20-Q30) before alignment in bulk RNA-seq
  skip_when:
  - condition: reads are already aligned
    use: bulkrna-read-alignment
  - condition: counted
    use: bulkrna-qc
  - condition: single-cell FASTQ
    use: sc-fastq-qc
  trigger_keywords:
  - FASTQ QC
  - read quality
  - Phred
  - FastQC
  - adapter
  - GC content
  - Q20
  - Q30
  tags:
  - bulkrna
  - FASTQ
  - QC
  - Phred
  - GC-content
  - adapter
  - read-quality
  aliases:
  - bulk-fastqc
interface:
  inputs:
    modalities: []
    file_types:
    - fastq
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags: []
    hints: {}
  outputs:
    files:
    - tables/qc_summary.csv
    - figures/gc_content.png
    - figures/per_base_quality.png
    - figures/quality_score_distribution.png
    - figures/read_length_distribution.png
    - report.md
    - result.json
    result_json:
      required_keys: []
runtime:
  language: python
  entry: bulkrna_read_qc.py
deps:
  python:
  - matplotlib
  - numpy
  - pandas
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
