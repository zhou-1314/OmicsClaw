schema_version: 2
id: bulkrna-read-alignment
name: bulkrna-read-alignment
domain: bulkrna
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: 🧬
summary:
  load_when: summarising STAR / HISAT2 / Salmon alignment-rate logs in bulk RNA-seq
  skip_when:
  - condition: data is raw FASTQ
    use: bulkrna-read-qc
  - condition: already counted
    use: bulkrna-qc
  - condition: genome-DNA alignment
    use: genomics-alignment
  trigger_keywords:
  - RNA-seq alignment
  - STAR
  - HISAT2
  - Salmon
  - mapping rate
  - read alignment
  - alignment QC
  tags:
  - bulkrna
  - alignment
  - STAR
  - HISAT2
  - Salmon
  - mapping-rate
  - strandedness
  aliases:
  - bulk-align-reads
interface:
  inputs:
    file_types:
    - out
    - log
    - json
  outputs:
    files:
    - tables/alignment_stats.csv
    - figures/alignment_composition.png
    - figures/gene_body_coverage.png
    - figures/mapping_summary.png
    - report.md
    - result.json
runtime:
  entry: bulkrna_read_alignment.py
deps:
  python:
  - matplotlib
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
