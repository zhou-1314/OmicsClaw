schema_version: 2
id: bulkrna-batch-correction
name: bulkrna-batch-correction
domain: bulkrna
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: 🔧
summary:
  load_when: removing batch effects from a multi-cohort bulk RNA-seq dataset using ComBat (R or Python
    implementation)
  skip_when:
  - condition: there is only one batch
  - condition: single-cell batch integration
    use: sc-batch-integration
  - condition: spatial multi-slice integration
    use: spatial-integrate
  trigger_keywords:
  - batch correction
  - ComBat
  - batch effect
  - harmonize
  - multi-cohort
  - batch removal
  tags:
  - bulkrna
  - batch-correction
  - ComBat
  - harmonization
  - batch-effect
  aliases:
  - bulk-combat
interface:
  inputs:
    file_types:
    - csv
  outputs:
    files:
    - tables/batch_info.csv
    - tables/batch_metrics.csv
    - tables/corrected_counts.csv
    - tables/corrected_expression.csv
    - tables/counts.csv
    - figures/batch_assessment.png
    - report.md
    - result.json
runtime:
  entry: bulkrna_batch_correction.py
deps:
  python:
  - matplotlib
  - numpy
  - pandas
  - scipy
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
