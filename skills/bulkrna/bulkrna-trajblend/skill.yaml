schema_version: 2
id: bulkrna-trajblend
name: bulkrna-trajblend
domain: bulkrna
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: 🔀
summary:
  load_when: placing bulk RNA-seq samples on a single-cell reference's pseudotime axis (NNLS deconvolution
    + nearest-neighbour mapping)
  skip_when:
  - condition: plain cell-type proportions
    use: bulkrna-deconvolution
  - condition: native single-cell trajectory inference
    use: sc-pseudotime
  trigger_keywords:
  - trajblend
  - trajectory
  - bulk to single cell
  - interpolation
  - bulk2single
  - VAE
  - deconvolution trajectory
  tags:
  - bulkrna
  - trajectory
  - pseudotime
  - deconvolution
  - single-cell
  aliases:
  - bulk-trajblend
interface:
  inputs:
    file_types:
    - csv
    - tsv
    - h5ad
  outputs:
    files:
    - tables/cell_fractions.csv
    - tables/pseudotime_estimates.csv
    - figures/bulk_on_trajectory.png
    - figures/fraction_heatmap.png
    - figures/pseudotime_distribution.png
    - figures/trajectory_embedding.png
    - report.md
    - result.json
runtime:
  entry: bulkrna_trajblend.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scikit-learn
  - scipy
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
