schema_version: 2
id: bulkrna-geneid-mapping
name: bulkrna-geneid-mapping
domain: bulkrna
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: 🏷️
summary:
  load_when: converting gene identifiers between Ensembl, Entrez, and HGNC symbol in a bulk RNA-seq count
    matrix
  skip_when:
  - condition: the input is already in the desired identifier system
  - condition: organisms outside human/mouse
  - condition: non-bulk-counts inputs
  trigger_keywords:
  - gene ID
  - Ensembl
  - Entrez
  - gene symbol
  - ID mapping
  - gene annotation
  - convert IDs
  tags:
  - bulkrna
  - gene-id
  - mapping
  - Ensembl
  - Entrez
  - HGNC
  - annotation
  aliases:
  - bulk-geneid
interface:
  inputs:
    file_types:
    - csv
  outputs:
    files:
    - tables/mapped_counts.csv
    - tables/mapping_table.csv
    - tables/unmapped_genes.csv
    - report.md
    - result.json
    artifacts:
    - kind: bulkrna.count_matrix
      path: tables/mapped_counts.csv
      format: csv
runtime:
  entry: bulkrna_geneid_mapping.py
deps:
  python:
  - mygene
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
