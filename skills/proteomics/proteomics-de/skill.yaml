schema_version: 2
id: proteomics-de
name: proteomics-de
domain: proteomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: ⚖️
summary:
  load_when: computing two-group differential protein abundance (group2 vs group1, log2FC + p-value +
    BH-adjusted FDR) via Welch t-test, equal-variance t-test, or Mann-Whitney on a wide protein × sample
    CSV
  skip_when:
  - condition: you need multi-condition DE (run pairwise contrasts manually)
  - condition: label-based TMT linear-mixed models
  trigger_keywords:
  - differential abundance
  - protein expression
  - MSstats
  - limma
  - volcano
  tags:
  - proteomics
  - differential-expression
  - ttest
  - welch
  - mann-whitney
  - bh-fdr
  aliases:
  - differential-abundance
interface:
  inputs:
    file_types:
    - csv
    artifacts:
    - kind: proteomics.abundance_matrix
      formats:
      - csv
  outputs:
    files:
    - tables/differential_abundance.csv
    - tables/significant.csv
    - report.md
    - result.json
    artifacts:
    - kind: proteomics.differential_results
      path: tables/differential_abundance.csv
      format: csv
runtime:
  entry: proteomics_de.py
deps:
  python:
  - numpy
  - pandas
  - scipy
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
