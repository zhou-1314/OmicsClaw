schema_version: 2
id: proteomics-enrichment
name: proteomics-enrichment
domain: proteomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🗺️
summary:
  load_when: running over-representation analysis (ORA) on a list of proteins via Fisher's exact test
    against a built-in 8-pathway DEMO dictionary, with BH-FDR correction
  skip_when:
  - condition: needing a real pathway database (this skill is demo-only)
    use: bulkrna-enrichment
  - condition: rank-based GSEA
  trigger_keywords:
  - proteomics enrichment
  - pathway analysis
  - STRING
  - DAVID
  - g:Profiler
  - GO enrichment
  tags:
  - proteomics
  - enrichment
  - ora
  - fisher
  - demo
  - pathway
  aliases:
  - prot-enrichment
interface:
  inputs:
    file_types:
    - csv
  outputs:
    files:
    - tables/enrichment_results.csv
    - report.md
    - result.json
runtime:
  entry: prot_enrichment.py
deps:
  python:
  - numpy
  - pandas
  - scipy
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
