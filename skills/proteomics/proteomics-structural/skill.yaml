schema_version: 2
id: proteomics-structural
name: proteomics-structural
domain: proteomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🏗️
summary:
  load_when: summarising cross-linking MS (XL-MS) results — intra/inter-protein link split, optional FDR
    filtering, distance-constraint validation against a per-crosslinker (DSS / BS3 / EDC / DSSO / DSBU)
    max distance
  skip_when:
  - condition: raw spectra are the input (run XlinkX / pLink / xiSEARCH first)
  - condition: no XL-MS experiment was performed
  trigger_keywords:
  - structural proteomics
  - cross-linking MS
  - XL-MS
  - XlinkX
  - pLink
  - xiSEARCH
  tags:
  - proteomics
  - structural
  - xl-ms
  - crosslinking
  - dss
  - bs3
  - dsso
  - dsbu
  - edc
  aliases:
  - struct-proteomics
interface:
  inputs:
    file_types:
    - csv
  outputs:
    files:
    - tables/crosslinks.csv
    - tables/inter_protein_crosslinks.csv
    - report.md
    - result.json
runtime:
  entry: struct_proteomics.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
