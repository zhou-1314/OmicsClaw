schema_version: 2
id: proteomics-ms-qc
name: proteomics-ms-qc
domain: proteomics
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📊
summary:
  load_when: computing protein-table QC — proteins × samples count, missing-value rate, intensity CV (median
    + mean) — from a MaxQuant / FragPipe / DIA-NN protein-quantification CSV
  skip_when:
  - condition: raw mzML / RAW spectra are the input (run a search engine first)
  - condition: peptide-level QC is needed
    use: proteomics-identification
  trigger_keywords:
  - MS QC
  - mass spec QC
  - PTXQC
  - rawTools
  tags:
  - proteomics
  - qc
  - ms
  - maxquant
  - intensity
  - missing-values
  - cv
  aliases:
  - ms-qc
interface:
  inputs:
    modalities:
    - ms
    file_types:
    - csv
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints: {}
  outputs:
    files:
    - tables/qc_metrics.csv
    - report.md
    - result.json
    result_json:
      required_keys: []
runtime:
  language: python
  entry: proteomics_ms_qc.py
deps:
  python:
  - numpy
  - pandas
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
