schema_version: 2
id: proteomics-ms-qc
name: proteomics-ms-qc
domain: proteomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📊
summary:
  load_when: computing protein-table QC — proteins × samples count, missing-value rate, intensity CV (median
    + mean) — from a MaxQuant / FragPipe / DIA-NN protein-quantification CSV
  skip_when:
  - condition: raw mzML / RAW spectra are the input (run a search engine first)
  - condition: peptide-level QC is needed
    use: proteomics-identification
  trigger_keywords:
  - MS QC
  - mass spec QC
  - PTXQC
  - rawTools
  tags:
  - proteomics
  - qc
  - ms
  - maxquant
  - intensity
  - missing-values
  - cv
  aliases:
  - ms-qc
interface:
  inputs:
    modalities:
    - ms
    file_types:
    - csv
  outputs:
    files:
    - tables/qc_metrics.csv
    - report.md
    - result.json
runtime:
  entry: proteomics_ms_qc.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
