schema_version: 2
id: proteomics-data-import
name: proteomics-data-import
domain: proteomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📥
summary:
  load_when: ingesting a MaxQuant `proteinGroups.txt`, FragPipe `combined_protein.tsv`, DIA-NN report,
    or generic CSV / TSV protein-quantification table — normalises columns to a standard schema, emits
    `tables/proteins.csv`
  skip_when:
  - condition: raw spectra are the input (run the search engine first)
  - condition: the file is already OmicsClaw schema
  trigger_keywords:
  - data import
  - convert proteomics
  - format conversion
  tags:
  - proteomics
  - import
  - maxquant
  - fragpipe
  - diann
  - spectronaut
  aliases:
  - data-import
interface:
  inputs:
    file_types:
    - txt
    - tsv
    - csv
  outputs:
    files:
    - tables/proteins.csv
    - report.md
    - result.json
runtime:
  entry: proteomics_data_import.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
