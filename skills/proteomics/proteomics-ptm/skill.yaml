schema_version: 2
id: proteomics-ptm
name: proteomics-ptm
domain: proteomics
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🔬
summary:
  load_when: summarising PTM sites (phosphorylation, acetylation, ubiquitination, etc.) from a per-site
    CSV — site-class assignment (Olsen et al. Class I/II/III by `localization_probability`), per-PTM-type
    counts, amino-acid distribution, sites-per-protein
  skip_when:
  - condition: raw spectra are the input
  - condition: you only need protein-level abundance
    use: proteomics-quantification
  trigger_keywords:
  - PTM
  - phosphorylation
  - acetylation
  - ubiquitination
  - modification
  - motif
  tags:
  - proteomics
  - ptm
  - phosphorylation
  - acetylation
  - ubiquitination
  - site-localization
  aliases:
  - ptm
interface:
  inputs:
    modalities: []
    file_types:
    - csv
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --loc-threshold
    hints: {}
  outputs:
    files:
    - tables/ptm_class_I_sites.csv
    - tables/ptm_sites.csv
    - report.md
    - result.json
    result_json:
      required_keys: []
runtime:
  language: python
  entry: proteomics_ptm.py
deps:
  python:
  - numpy
  - pandas
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
