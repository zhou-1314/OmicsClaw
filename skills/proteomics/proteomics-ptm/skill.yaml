schema_version: 2
id: proteomics-ptm
name: proteomics-ptm
domain: proteomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🔬
summary:
  load_when: summarising PTM sites (phosphorylation, acetylation, ubiquitination, etc.) from a per-site
    CSV — site-class assignment (Olsen et al. Class I/II/III by `localization_probability`), per-PTM-type
    counts, amino-acid distribution, sites-per-protein
  skip_when:
  - condition: raw spectra are the input
  - condition: you only need protein-level abundance
    use: proteomics-quantification
  trigger_keywords:
  - PTM
  - phosphorylation
  - acetylation
  - ubiquitination
  - modification
  - motif
  tags:
  - proteomics
  - ptm
  - phosphorylation
  - acetylation
  - ubiquitination
  - site-localization
  aliases:
  - ptm
interface:
  inputs:
    file_types:
    - csv
  outputs:
    files:
    - tables/ptm_class_I_sites.csv
    - tables/ptm_sites.csv
    - report.md
    - result.json
runtime:
  entry: proteomics_ptm.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
