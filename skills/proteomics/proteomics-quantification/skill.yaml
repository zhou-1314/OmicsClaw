schema_version: 2
id: proteomics-quantification
name: proteomics-quantification
domain: proteomics
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📏
summary:
  load_when: computing per-protein abundance from a peptide / PSM table via LFQ (intensity summation),
    iBAQ (intensity / tryptic peptide count), or spectral counting (PSMs per protein)
  skip_when:
  - condition: the input is already protein-level
    use: proteomics-ms-qc
  - condition: label-based TMT / iTRAQ workflows (search upstream first)
  trigger_keywords:
  - protein quantification
  - LFQ
  - TMT
  - DIA
  - DIA-NN
  - Skyline
  tags:
  - proteomics
  - quantification
  - lfq
  - ibaq
  - spectral-counting
  aliases:
  - quantification
interface:
  inputs:
    modalities:
    - lfq
    file_types:
    - csv
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --method
    hints: {}
  outputs:
    files:
    - tables/protein_abundance.csv
    - report.md
    - result.json
    result_json:
      required_keys: []
runtime:
  language: python
  entry: proteomics_quantification.py
deps:
  python:
  - numpy
  - pandas
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
