schema_version: 2
id: proteomics-quantification
name: proteomics-quantification
domain: proteomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📏
summary:
  load_when: computing per-protein abundance from a peptide / PSM table via LFQ (intensity summation),
    iBAQ (intensity / tryptic peptide count), or spectral counting (PSMs per protein)
  skip_when:
  - condition: the input is already protein-level
    use: proteomics-ms-qc
  - condition: label-based TMT / iTRAQ workflows (search upstream first)
  trigger_keywords:
  - protein quantification
  - LFQ
  - TMT
  - DIA
  - DIA-NN
  - Skyline
  tags:
  - proteomics
  - quantification
  - lfq
  - ibaq
  - spectral-counting
  aliases:
  - quantification
interface:
  inputs:
    modalities:
    - lfq
    file_types:
    - csv
  outputs:
    files:
    - tables/protein_abundance.csv
    - report.md
    - result.json
runtime:
  entry: proteomics_quantification.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
