schema_version: 2
id: spatial-raw-processing
name: spatial-raw-processing
domain: spatial
type: leaf
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: 🧬
summary:
  load_when: converting spatial transcriptomics raw FASTQ pairs through ST-Pipeline into a `raw_counts.h5ad`
    ready for spatial-preprocess
  skip_when:
  - condition: input is already a count-matrix AnnData
    use: spatial-preprocess
  - condition: non-spatial bulk / scRNA FASTQ
    use: bulkrna-read-qc
  trigger_keywords:
  - spatial raw processing
  - raw spatial fastq
  - spatial fastq
  - st_pipeline
  - st pipeline
  - barcode coordinates
  - ids file
  - visium raw fastq
  - slide-seq fastq
  - slideseq fastq
  - upstream spatial processing
  tags:
  - spatial
  - raw-processing
  - fastq
  - st-pipeline
  - visium
  - slideseq
  aliases:
  - spatial-raw-fastq-processing
  - spatial-st-pipeline
interface:
  inputs:
    modalities:
    - visium
    - slideseq
    file_types:
    - fastq
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --read1
    - --read2
    - --ids
    - --ref-map
    - --ref-annotation
    - --exp-name
    - --platform
    - --threads
    - --contaminant-index
    - --min-length-qual-trimming
    - --min-quality-trimming
    - --demultiplexing-mismatches
    - --demultiplexing-kmer
    - --umi-allowed-mismatches
    - --umi-start-position
    - --umi-end-position
    - --disable-clipping
    - --compute-saturation
    - --htseq-no-ambiguous
    - --transcriptome
    - --star-two-pass-mode
    - --stpipeline-repo
    - --bin-path
    hints:
      st_pipeline:
        priority: ids/ref_map/ref_annotation -> threads -> compute_saturation -> demultiplexing -> umi
        params:
        - read1
        - read2
        - ids
        - ref_map
        - ref_annotation
        - exp_name
        - platform
        - threads
        - compute_saturation
        - demultiplexing_mismatches
        - demultiplexing_kmer
        - umi_allowed_mismatches
        - umi_start_position
        - umi_end_position
        defaults:
          platform: visium
          threads: 4
          min_length_qual_trimming: 20
          min_quality_trimming: 20
          demultiplexing_mismatches: 2
          demultiplexing_kmer: 6
          umi_allowed_mismatches: 1
          umi_start_position: 18
          umi_end_position: 27
        requires:
        - FASTQ_R1
        - FASTQ_R2
        - ids_barcode_coordinate_file
        - STAR_index_directory
        - GTF_annotation_or_transcriptome
        tips:
        - '--ids / --ref-map / --ref-annotation: these are the core run contract; matrix-level inputs
          should go to spatial-preprocess instead.'
        - '--platform: a reporting label only; it does not switch upstream algorithms, but it keeps the
          output contract explicit for Visium, Slide-seq, or custom barcode-coordinate assays.'
        - '--compute-saturation: enables the upstream saturation curve so the OmicsClaw report can summarize
          sequencing depth sufficiency.'
        - '--demultiplexing-mismatches / --demultiplexing-kmer: first tuning knobs when barcode recovery
          is unexpectedly low.'
        - '--umi-allowed-mismatches / --umi-start-position / --umi-end-position: only adjust if the kit
          layout differs from the standard assumptions or the upstream protocol documents it.'
  outputs:
    files:
    - tables/gene_qc.csv
    - tables/raw_gene_qc.csv
    - tables/raw_processing_run_summary.csv
    - tables/raw_processing_spatial_points.csv
    - tables/raw_spot_qc.csv
    - tables/raw_top_genes.csv
    - tables/run_summary.csv
    - tables/saturation_curve.csv
    - tables/spatial_coordinates.csv
    - tables/spot_qc.csv
    - tables/stage_summary.csv
    - tables/top_genes.csv
    - figures/raw_detected_genes_spatial.png
    - figures/raw_spot_qc_histograms.png
    - figures/raw_top_genes_barplot.png
    - figures/raw_total_counts_spatial.png
    - figures/st_pipeline_saturation_curve.png
    - figures/st_pipeline_stage_attrition.png
    - omicsclaw_stpipeline_run.json
    - raw_counts.h5ad
    - st_pipeline.stderr.txt
    - st_pipeline.stdout.txt
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs:
      - barcode
      - x_array
      - y_array
      obsm:
      - spatial
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: spatial_raw_processing.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - PyYAML
  - scipy
  - seaborn
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  figures: r_visualization/
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
