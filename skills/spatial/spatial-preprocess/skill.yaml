schema_version: 2
id: spatial-preprocess
name: spatial-preprocess
domain: spatial
type: leaf
version: 0.6.0
author: OmicsClaw
license: MIT
emoji: 🔬
summary:
  load_when: running the foundational spatial transcriptomics QC + filtering + normalisation + HVG + PCA
    + neighbour-graph + Leiden pipeline on a Visium / Xenium / generic spatial AnnData
  skip_when:
  - condition: raw FASTQs need converting first
    use: spatial-raw-processing
  - condition: tissue-domain detection on already-preprocessed data
    use: spatial-domains
  trigger_keywords:
  - preprocess
  - spatial preprocessing
  - spatial QC
  - normalize
  - visium
  - xenium
  - merfish
  - slide-seq
  - load spatial data
  - leiden
  - umap
  tags:
  - spatial
  - visium
  - xenium
  - preprocessing
  - qc
  - normalization
  - hvg
  - pca
  - leiden
  aliases:
  - preprocess
  - spatial-preprocessing
interface:
  inputs:
    modalities:
    - visium
    - xenium
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm:
        - spatial
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --data-type
    - --leiden-resolution
    - --max-genes
    - --max-mt-pct
    - --min-cells
    - --min-genes
    - --n-neighbors
    - --n-pcs
    - --n-top-hvg
    - --resolutions
    - --species
    - --tissue
    hints:
      scanpy_standard:
        priority: tissue → min_genes/max_mt_pct/max_genes → n_top_hvg → n_pcs/n_neighbors → leiden_resolution
        params:
        - data_type
        - species
        - tissue
        - min_genes
        - min_cells
        - max_mt_pct
        - max_genes
        - n_top_hvg
        - n_pcs
        - n_neighbors
        - leiden_resolution
        - resolutions
        defaults:
          data_type: generic
          species: human
          min_genes: 0
          min_cells: 0
          max_mt_pct: 20.0
          max_genes: 0
          n_top_hvg: 2000
          n_pcs: 30
          n_neighbors: 15
          leiden_resolution: 0.5
        requires:
        - raw_counts_in_X
        - obsm.spatial_optional
        - scanpy_pipeline
        tips:
        - '--tissue: OmicsClaw wrapper-level preset that fills QC defaults; reports also record the effective
          thresholds after preset resolution.'
        - '--min-genes / --max-mt-pct / --max-genes: main QC thresholds controlling how aggressively low-quality
          spots are removed.'
        - '--n-top-hvg: public Scanpy HVG selection budget passed to `pp.highly_variable_genes(..., flavor=''seurat_v3'',
          layer=''counts'')`.'
        - '--n-pcs / --n-neighbors: public Scanpy graph-construction controls; OmicsClaw reports requested,
          computed, used, and suggested PCs separately.'
        - '--leiden-resolution / --resolutions: public Leiden clustering resolution controls for the primary
          clustering and optional sweep.'
  outputs:
    files:
    - tables/cluster_summary.csv
    - tables/multi_resolution_summary.csv
    - tables/pca_variance_ratio.csv
    - tables/preprocess_run_summary.csv
    - tables/preprocess_spatial_points.csv
    - tables/preprocess_umap_points.csv
    - tables/qc_metric_distributions.csv
    - tables/qc_summary.csv
    - figures/cluster_size_barplot.png
    - figures/leiden_resolution_sweep.png
    - figures/pca_variance_curve.png
    - figures/qc_metric_distributions.png
    - figures/qc_metrics_spatial.png
    - figures/spatial_leiden.png
    - figures/umap_leiden.png
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs:
      - leiden
      obsm:
      - X_pca
      - X_umap
      var:
      - highly_variable
      layers:
      - counts
      uns: []
runtime:
  language: python
  entry: spatial_preprocess.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - seaborn
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  figures: r_visualization/
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
