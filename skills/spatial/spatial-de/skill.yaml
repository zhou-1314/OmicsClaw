schema_version: 2
id: spatial-de
name: spatial-de
domain: spatial
version: 0.5.0
author: OmicsClaw Team
license: MIT
emoji: 🧬
summary:
  load_when: ranking spatial cluster markers or comparing two spatial groups in spatial transcriptomics
  skip_when:
  - condition: the data is single-cell
    use: sc-de
  - condition: bulk
    use: bulkrna-de
  - condition: spatially variable expression discovery
    use: spatial-genes
  trigger_keywords:
  - differential expression
  - marker gene
  - pseudobulk
  - Wilcoxon
  - t-test
  - PyDESeq2
  - spatial DE
  tags:
  - spatial
  - differential-expression
  - markers
  - wilcoxon
  - t-test
  - pydeseq2
  - pseudobulk
  aliases:
  - de
interface:
  inputs:
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
  parameters:
    hints:
      wilcoxon:
        priority: groupby → scanpy_corr_method → filter_markers → scanpy_tie_correct
        params:
        - groupby
        - group1
        - group2
        - n_top_genes
        - fdr_threshold
        - log2fc_threshold
        - scanpy_corr_method
        - scanpy_rankby_abs
        - scanpy_pts
        - scanpy_tie_correct
        - filter_markers
        - min_in_group_fraction
        - min_fold_change
        - max_out_group_fraction
        - filter_compare_abs
        defaults:
          groupby: leiden
          n_top_genes: 10
          fdr_threshold: 0.05
          log2fc_threshold: 1.0
          scanpy_corr_method: benjamini-hochberg
          scanpy_rankby_abs: false
          scanpy_pts: false
          scanpy_tie_correct: false
          filter_markers: true
          min_in_group_fraction: 0.25
          min_fold_change: 1.0
          max_out_group_fraction: 0.5
          filter_compare_abs: false
        requires:
        - obs.groupby
        - X_log_normalized
        tips:
        - '--scanpy-corr-method: official `scanpy.tl.rank_genes_groups` multiple-testing correction (`benjamini-hochberg`
          or `bonferroni`).'
        - '--scanpy-tie-correct: official Wilcoxon tie correction toggle in Scanpy; only relevant for
          `wilcoxon`.'
        - '--scanpy-rankby-abs: ranks genes by absolute score but does not change the reported log fold-change
          sign.'
        - '--scanpy-pts: asks Scanpy to report per-group detection fractions (`pct_nz_group`, `pct_nz_reference`).'
        - '--filter-markers + min/max fraction controls: official `scanpy.tl.filter_rank_genes_groups`
          post-filter for cluster-style marker specificity.'
      t-test:
        priority: groupby → scanpy_corr_method → filter_markers
        params:
        - groupby
        - group1
        - group2
        - n_top_genes
        - fdr_threshold
        - log2fc_threshold
        - scanpy_corr_method
        - scanpy_rankby_abs
        - scanpy_pts
        - filter_markers
        - min_in_group_fraction
        - min_fold_change
        - max_out_group_fraction
        - filter_compare_abs
        defaults:
          groupby: leiden
          n_top_genes: 10
          fdr_threshold: 0.05
          log2fc_threshold: 1.0
          scanpy_corr_method: benjamini-hochberg
          scanpy_rankby_abs: false
          scanpy_pts: false
          filter_markers: true
          min_in_group_fraction: 0.25
          min_fold_change: 1.0
          max_out_group_fraction: 0.5
          filter_compare_abs: false
        requires:
        - obs.groupby
        - X_log_normalized
        tips:
        - '--scanpy-corr-method / --scanpy-rankby-abs / --scanpy-pts: same official Scanpy controls as
          the Wilcoxon path.'
        - '--filter-markers: keep this on for a first pass unless the user explicitly wants raw unfiltered
          ranking output.'
        - '`t-test` is faster than Wilcoxon but remains an exploratory log-expression marker workflow
          rather than replicate-aware sample inference.'
      pydeseq2:
        priority: group1/group2 → sample_key → min_cells_per_sample/min_counts_per_gene → pydeseq2_fit_type/size_factors_fit_type
          → pydeseq2_alpha
        params:
        - groupby
        - group1
        - group2
        - sample_key
        - n_top_genes
        - fdr_threshold
        - log2fc_threshold
        - min_cells_per_sample
        - min_counts_per_gene
        - pydeseq2_fit_type
        - pydeseq2_size_factors_fit_type
        - pydeseq2_refit_cooks
        - pydeseq2_alpha
        - pydeseq2_cooks_filter
        - pydeseq2_independent_filter
        - pydeseq2_n_cpus
        defaults:
          groupby: leiden
          sample_key: sample_id
          n_top_genes: 10
          fdr_threshold: 0.05
          log2fc_threshold: 1.0
          min_cells_per_sample: 10
          min_counts_per_gene: 10
          pydeseq2_fit_type: parametric
          pydeseq2_size_factors_fit_type: ratio
          pydeseq2_refit_cooks: true
          pydeseq2_alpha: 0.05
          pydeseq2_cooks_filter: true
          pydeseq2_independent_filter: true
          pydeseq2_n_cpus: 1
        requires:
        - counts_or_raw
        - obs.sample_key
        - obs.groupby
        tips:
        - '`pydeseq2` in `spatial-de` is intentionally restricted to explicit two-group contrasts with
          a real `sample_key`; OmicsClaw will not fabricate replicates.'
        - If the same biological samples contribute to both groups, OmicsClaw automatically uses a paired
          design (`~ sample_id + condition`).
        - '--min-cells-per-sample: wrapper-level gate for each sample x group pseudobulk profile before
          DESeq2 fitting.'
        - '--min-counts-per-gene: wrapper-level pseudobulk gene filter applied before PyDESeq2.'
        - '--pydeseq2-fit-type / --pydeseq2-size-factors-fit-type / --pydeseq2-refit-cooks / --pydeseq2-alpha
          / --pydeseq2-cooks-filter / --pydeseq2-independent-filter / --pydeseq2-n-cpus: official PyDESeq2
          controls exposed directly by the wrapper.'
  outputs:
    files:
    - tables/de_full.csv
    - tables/de_plot_points.csv
    - tables/de_run_summary.csv
    - tables/de_significant.csv
    - tables/de_spatial_points.csv
    - tables/de_umap_points.csv
    - tables/group_de_metrics.csv
    - tables/markers_top.csv
    - tables/sample_counts_by_group.csv
    - tables/skipped_sample_groups.csv
    - tables/top_de_hits.csv
    - figures/de_effect_burden_spatial.png
    - figures/de_effect_burden_umap.png
    - figures/de_group_spatial_context.png
    - figures/de_marker_dotplot.png
    - figures/de_marker_heatmap.png
    - figures/de_pvalue_distribution.png
    - figures/de_top_hits_barplot.png
    - figures/de_volcano.png
    - figures/group_de_burden.png
    - figures/sample_counts_by_group.png
    - figures/skipped_sample_groups.png
    - processed.h5ad
    - report.md
    - result.json
    anndata:
      saves_h5ad: true
runtime:
  entry: spatial_de.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - pydeseq2
  - scanpy
  - scipy
  - seaborn
compatibility:
  platforms:
  - macos
  - linux
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  figures: r_visualization/
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
