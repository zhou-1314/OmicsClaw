schema_version: 2
id: spatial-velocity
name: spatial-velocity
domain: spatial
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🏎️
summary:
  load_when: estimating RNA velocity on a spatial AnnData with `layers["spliced"]` + `layers["unspliced"]`
    via scVelo (stochastic / deterministic / dynamical) or veloVI (deep generative)
  skip_when:
  - condition: input lacks the spliced/unspliced layers (must be quantified upstream by velocyto / kb-python
      / STARsolo)
  - condition: non-spatial scRNA velocity
    use: sc-velocity
  trigger_keywords:
  - RNA velocity
  - cellular dynamics
  - scVelo
  - VELOVI
  - latent time
  - spliced unspliced
  tags:
  - spatial
  - velocity
  - rna-velocity
  - scvelo
  - velovi
  - dynamics
  aliases:
  - velocity
interface:
  inputs:
    modalities: []
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm:
        - spatial
      env: []
      config: []
  parameters:
    hints:
      stochastic:
        priority: velocity_n_neighbors/n_pcs → velocity_fit_offset/min_r2 → velocity_graph_*
        params:
        - cluster_key
        - velocity_min_shared_counts
        - velocity_n_top_genes
        - velocity_n_pcs
        - velocity_n_neighbors
        - velocity_use_highly_variable
        - velocity_fit_offset
        - velocity_fit_offset2
        - velocity_min_r2
        - velocity_min_likelihood
        - velocity_graph_n_neighbors
        - velocity_graph_sqrt_transform
        - velocity_graph_approx
        defaults:
          cluster_key: leiden
          velocity_min_shared_counts: 30
          velocity_n_top_genes: 2000
          velocity_n_pcs: 30
          velocity_n_neighbors: 30
          velocity_use_highly_variable: true
          velocity_fit_offset: false
          velocity_fit_offset2: false
          velocity_min_r2: 0.01
          velocity_min_likelihood: 0.001
          velocity_graph_n_neighbors: null
          velocity_graph_sqrt_transform: null
          velocity_graph_approx: null
        requires:
        - layers.spliced
        - layers.unspliced
        tips:
        - '`stochastic` uses official `scv.tl.velocity(mode=''stochastic'')` after OmicsClaw rebuilds
          moments with the requested preprocessing controls.'
        - '--velocity-fit-offset / --velocity-fit-offset2 / --velocity-min-r2 / --velocity-min-likelihood:
          official `scv.tl.velocity()` controls.'
        - '--velocity-graph-n-neighbors / --velocity-graph-sqrt-transform / --velocity-graph-approx: official
          `scv.tl.velocity_graph()` controls.'
      deterministic:
        priority: velocity_n_neighbors/n_pcs → velocity_fit_offset/min_r2 → velocity_graph_*
        params:
        - cluster_key
        - velocity_min_shared_counts
        - velocity_n_top_genes
        - velocity_n_pcs
        - velocity_n_neighbors
        - velocity_use_highly_variable
        - velocity_fit_offset
        - velocity_fit_offset2
        - velocity_min_r2
        - velocity_min_likelihood
        - velocity_graph_n_neighbors
        - velocity_graph_sqrt_transform
        - velocity_graph_approx
        defaults:
          cluster_key: leiden
          velocity_min_shared_counts: 30
          velocity_n_top_genes: 2000
          velocity_n_pcs: 30
          velocity_n_neighbors: 30
          velocity_use_highly_variable: true
          velocity_fit_offset: false
          velocity_fit_offset2: false
          velocity_min_r2: 0.01
          velocity_min_likelihood: 0.001
          velocity_graph_n_neighbors: null
          velocity_graph_sqrt_transform: null
          velocity_graph_approx: null
        requires:
        - layers.spliced
        - layers.unspliced
        tips:
        - '`deterministic` uses the same scVelo engine as `stochastic` but switches to `mode=''deterministic''`.'
        - The shared `velocity_*` preprocessing settings are wrapper-level controls around the official
          scVelo preprocessing recipe and materially affect the result.
      dynamical:
        priority: dynamical_n_top_genes/max_iter → velocity_min_r2/min_likelihood → velocity_graph_*
        params:
        - cluster_key
        - velocity_min_shared_counts
        - velocity_n_top_genes
        - velocity_n_pcs
        - velocity_n_neighbors
        - velocity_use_highly_variable
        - velocity_min_r2
        - velocity_min_likelihood
        - dynamical_n_top_genes
        - dynamical_max_iter
        - dynamical_fit_time
        - dynamical_fit_scaling
        - dynamical_fit_steady_states
        - dynamical_n_jobs
        - velocity_graph_n_neighbors
        - velocity_graph_sqrt_transform
        - velocity_graph_approx
        defaults:
          cluster_key: leiden
          velocity_min_shared_counts: 30
          velocity_n_top_genes: 2000
          velocity_n_pcs: 30
          velocity_n_neighbors: 30
          velocity_use_highly_variable: true
          velocity_min_r2: 0.01
          velocity_min_likelihood: 0.001
          dynamical_n_top_genes: null
          dynamical_max_iter: 10
          dynamical_fit_time: true
          dynamical_fit_scaling: true
          dynamical_fit_steady_states: true
          dynamical_n_jobs: null
          velocity_graph_n_neighbors: null
          velocity_graph_sqrt_transform: null
          velocity_graph_approx: null
        requires:
        - layers.spliced
        - layers.unspliced
        tips:
        - '--dynamical-n-top-genes / --dynamical-max-iter / --dynamical-fit-time / --dynamical-fit-scaling
          / --dynamical-fit-steady-states / --dynamical-n-jobs: official `scv.tl.recover_dynamics()` controls.'
        - '`dynamical` additionally exports latent-time support when `scv.tl.latent_time()` succeeds.'
      velovi:
        priority: velovi_max_epochs/n_samples → velovi_n_hidden/n_latent/n_layers → velocity_graph_*
        params:
        - cluster_key
        - velocity_min_shared_counts
        - velocity_n_top_genes
        - velocity_n_pcs
        - velocity_n_neighbors
        - velocity_use_highly_variable
        - velovi_n_hidden
        - velovi_n_latent
        - velovi_n_layers
        - velovi_dropout_rate
        - velovi_max_epochs
        - velovi_lr
        - velovi_weight_decay
        - velovi_batch_size
        - velovi_n_samples
        - velovi_early_stopping
        - velocity_graph_n_neighbors
        - velocity_graph_sqrt_transform
        - velocity_graph_approx
        defaults:
          cluster_key: leiden
          velocity_min_shared_counts: 30
          velocity_n_top_genes: 2000
          velocity_n_pcs: 30
          velocity_n_neighbors: 30
          velocity_use_highly_variable: true
          velovi_n_hidden: 256
          velovi_n_latent: 10
          velovi_n_layers: 1
          velovi_dropout_rate: 0.1
          velovi_max_epochs: 500
          velovi_lr: 0.01
          velovi_weight_decay: 0.01
          velovi_batch_size: 256
          velovi_n_samples: 25
          velovi_early_stopping: true
          velocity_graph_n_neighbors: null
          velocity_graph_sqrt_transform: null
          velocity_graph_approx: null
        requires:
        - layers.spliced
        - layers.unspliced
        - scvi_tools
        tips:
        - OmicsClaw still runs shared scVelo preprocessing first because VELOVI consumes moment-smoothed
          `Ms` / `Mu` layers.
        - '--velovi-n-hidden / --velovi-n-latent / --velovi-n-layers / --velovi-dropout-rate: official
          `scvi.external.VELOVI(...)` model controls.'
        - '--velovi-max-epochs / --velovi-lr / --velovi-weight-decay / --velovi-batch-size / --velovi-early-stopping:
          official `VELOVI.train()` controls.'
        - '--velovi-n-samples: official posterior-sampling control for `get_velocity()` and `get_latent_time()`
          extraction.'
  outputs:
    files:
    - tables/cell_velocity_metrics.csv
    - tables/gene_velocity_summary.csv
    - tables/top_velocity_cells.csv
    - tables/top_velocity_genes.csv
    - tables/velocity_cell_metrics.csv
    - tables/velocity_cluster_summary.csv
    - tables/velocity_gene_hits.csv
    - tables/velocity_gene_summary.csv
    - tables/velocity_run_summary.csv
    - tables/velocity_spatial_points.csv
    - tables/velocity_summary.csv
    - tables/velocity_top_cells.csv
    - tables/velocity_top_genes.csv
    - tables/velocity_umap_points.csv
    - figures/velocity_cluster_summary.png
    - figures/velocity_confidence_distribution.png
    - figures/velocity_confidence_spatial.png
    - figures/velocity_confidence_umap.png
    - figures/velocity_heatmap.png
    - figures/velocity_latent_time_spatial.png
    - figures/velocity_layer_proportions.png
    - figures/velocity_paga.png
    - figures/velocity_phase.png
    - figures/velocity_pseudotime_spatial.png
    - figures/velocity_speed_distribution.png
    - figures/velocity_speed_spatial.png
    - figures/velocity_speed_umap.png
    - figures/velocity_stream_spatial.png
    - figures/velocity_stream_umap.png
    - figures/velocity_top_genes_barplot.png
    - figures/velocity_transition_confidence_umap.png
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs:
      - velocity_speed
      - latent_time
      obsm: []
      var:
      - fit_scaling
      - velocity_genes
      - fit_t_
      layers:
      - velocity
      - latent_time_velovi
      - fit_t
      uns: []
runtime:
  language: python
  entry: spatial_velocity.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - scvelo
  - scvi-tools
  - seaborn
  - torch
  - velovi
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  figures: r_visualization/
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
