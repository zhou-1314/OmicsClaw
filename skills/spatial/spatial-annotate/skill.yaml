schema_version: 2
id: spatial-annotate
name: spatial-annotate
domain: spatial
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🏷️
summary:
  load_when: assigning per-spot cell-type labels on a spatial AnnData via marker-gene scoring or scRNA-reference
    mapping (Tangram / scANVI / CellAssign)
  skip_when:
  - condition: computing spot-level cell-type proportions for multi-cell-per-spot platforms
    use: spatial-deconv
  - condition: tissue-domain detection
    use: spatial-domains
  trigger_keywords:
  - cell type annotation
  - annotate cell types
  - Tangram
  - scANVI
  - CellAssign
  - marker genes
  - label transfer
  - spatial annotation
  tags:
  - spatial
  - annotation
  - cell-type
  - marker-based
  - tangram
  - scanvi
  - cellassign
  aliases:
  - annotate
  - spatial-cell-annotation
interface:
  inputs:
    modalities: []
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm:
        - spatial
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --batch-key
    - --cell-type-key
    - --cellassign-max-epochs
    - --cluster-key
    - --layer
    - --marker-n-genes
    - --marker-overlap-method
    - --marker-overlap-normalize
    - --marker-padj-cutoff
    - --marker-rank-method
    - --method
    - --model
    - --reference
    - --scanvi-max-epochs
    - --scanvi-n-hidden
    - --scanvi-n-layers
    - --scanvi-n-latent
    - --species
    - --tangram-device
    - --tangram-num-epochs
    - --tangram-train-genes
    hints:
      marker_based:
        priority: cluster_key → marker_rank_method → marker_n_genes / marker_padj_cutoff
        params:
        - cluster_key
        - species
        - marker_rank_method
        - marker_n_genes
        - marker_overlap_method
        - marker_overlap_normalize
        - marker_padj_cutoff
        defaults:
          cluster_key: leiden
          species: human
          marker_rank_method: wilcoxon
          marker_n_genes: 50
          marker_overlap_method: overlap_count
          marker_overlap_normalize: reference
        requires:
        - X_log_normalized
        - cluster_labels
        tips:
        - '--marker-rank-method: Passed to `scanpy.tl.rank_genes_groups`; OmicsClaw defaults to `wilcoxon`.'
        - '--marker-n-genes: Passed through as `top_n_markers` for `scanpy.tl.marker_gene_overlap`; set
          `0` to switch to adjusted-p-value marker selection.'
        - '--marker-overlap-method / --marker-overlap-normalize: Passed to `scanpy.tl.marker_gene_overlap`;
          `reference` normalization preserves the old overlap / signature-size behavior.'
        - '--marker-padj-cutoff: Only takes effect when `--marker-n-genes 0`, matching Scanpy''s documented
          precedence.'
      tangram:
        priority: reference → cell_type_key → tangram_num_epochs → tangram_train_genes
        params:
        - reference
        - cell_type_key
        - tangram_num_epochs
        - tangram_device
        - tangram_train_genes
        defaults:
          cell_type_key: cell_type
          tangram_num_epochs: 500
          tangram_device: auto
          tangram_train_genes: 2000
        requires:
        - reference_h5ad
        - X_log_normalized
        tips:
        - '--tangram-num-epochs: Passed to `tg.map_cells_to_space(..., num_epochs=...)`.'
        - '--tangram-device: Passed to `tg.map_cells_to_space(..., device=...)`; `auto` resolves to CUDA,
          MPS, or CPU in that order.'
        - '--tangram-train-genes: OmicsClaw wrapper control for the gene list passed into `tg.pp_adatas(...,
          genes=...)`; `0` means all shared genes.'
      scanvi:
        priority: reference → cell_type_key → batch_key/layer → scanvi_n_latent
        params:
        - reference
        - cell_type_key
        - batch_key
        - layer
        - scanvi_n_hidden
        - scanvi_n_latent
        - scanvi_n_layers
        - scanvi_max_epochs
        defaults:
          cell_type_key: cell_type
          layer: counts
          scanvi_n_hidden: 128
          scanvi_n_latent: 10
          scanvi_n_layers: 1
          scanvi_max_epochs: 100
        requires:
        - reference_h5ad
        - counts_or_raw
        tips:
        - '--layer / --batch-key: Passed to `SCVI.setup_anndata` / `SCANVI.setup_anndata`; use them when
          raw counts live outside `layers[''counts'']` or batch structure matters.'
        - '--scanvi-n-hidden / --scanvi-n-latent / --scanvi-n-layers: Passed to the underlying `scvi.model.SCVI(...)`
          encoder-decoder.'
        - '--scanvi-max-epochs: Current OmicsClaw wrapper uses this for SCVI pretraining, SCANVI finetuning,
          and query adaptation.'
      cellassign:
        priority: model/species → layer → batch_key → cellassign_max_epochs
        params:
        - model
        - species
        - layer
        - batch_key
        - cellassign_max_epochs
        defaults:
          species: human
          layer: counts
          cellassign_max_epochs: 400
        requires:
        - counts_or_raw
        tips:
        - '--model: OmicsClaw wrapper path to a JSON marker-panel file; if omitted, built-in species signatures
          are used.'
        - '--layer / --batch-key: Passed to `CellAssign.setup_anndata(..., layer=..., batch_key=...)`.'
        - '--cellassign-max-epochs: Passed to `model.train(max_epochs=...)`.'
  outputs:
    files:
    - tables/annotation_cell_type_counts.csv
    - tables/annotation_probabilities.csv
    - tables/annotation_spatial_points.csv
    - tables/annotation_summary.csv
    - tables/annotation_umap_points.csv
    - tables/cell_type_assignments.csv
    - tables/cluster_annotations.csv
    - tables/marker_overlap_scores.csv
    - figures/annotation_confidence_histogram.png
    - figures/annotation_confidence_spatial.png
    - figures/annotation_probability_heatmap.png
    - figures/cell_type_barplot.png
    - figures/cell_type_spatial.png
    - figures/cell_type_umap.png
    - figures/marker_overlap_heatmap.png
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs:
      - cell_type
      obsm:
      - tangram_ct_pred
      - scanvi_probabilities
      - cellassign_probabilities
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: spatial_annotate.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - scvi-tools
  - seaborn
  - tangram-sc
  - torch
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  figures: r_visualization/
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
