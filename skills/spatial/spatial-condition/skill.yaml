schema_version: 2
id: spatial-condition
name: spatial-condition
domain: spatial
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: ⚖️
summary:
  load_when: comparing two or more experimental conditions (treatment vs control) on a multi-sample preprocessed
    spatial AnnData via PyDESeq2 pseudobulk or Wilcoxon DE — needs `obs[condition_key]`, `obs[sample_key]`,
    and cluster labels
  skip_when:
  - condition: running per-cluster DE on one condition
    use: spatial-de
  - condition: comparing two slices without replicates
  trigger_keywords:
  - condition comparison
  - pseudobulk
  - DESeq2
  - PyDESeq2
  - treatment vs control
  - experimental conditions
  - replicate-aware differential expression
  tags:
  - spatial
  - condition
  - pseudobulk
  - pydeseq2
  - wilcoxon
  - differential-expression
  aliases:
  - condition
  - spatial-condition
  - spatial-condition-comparison
interface:
  inputs:
    modalities: []
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm:
        - spatial
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --cluster-key
    - --condition-key
    - --fdr-threshold
    - --log2fc-threshold
    - --method
    - --min-counts-per-gene
    - --min-samples-per-condition
    - --pydeseq2-alpha
    - --pydeseq2-cooks-filter
    - --pydeseq2-fit-type
    - --pydeseq2-independent-filter
    - --pydeseq2-n-cpus
    - --pydeseq2-refit-cooks
    - --pydeseq2-size-factors-fit-type
    - --reference-condition
    - --sample-key
    - --wilcoxon-alternative
    hints:
      pydeseq2:
        priority: condition_key/sample_key/cluster_key → reference_condition → pydeseq2_fit_type/size_factors_fit_type
          → pydeseq2_alpha
        params:
        - condition_key
        - sample_key
        - cluster_key
        - reference_condition
        - min_counts_per_gene
        - min_samples_per_condition
        - fdr_threshold
        - log2fc_threshold
        - pydeseq2_fit_type
        - pydeseq2_size_factors_fit_type
        - pydeseq2_alpha
        - pydeseq2_refit_cooks
        - pydeseq2_cooks_filter
        - pydeseq2_independent_filter
        - pydeseq2_n_cpus
        defaults:
          condition_key: condition
          sample_key: sample_id
          cluster_key: leiden
          min_counts_per_gene: 10
          min_samples_per_condition: 2
          fdr_threshold: 0.05
          log2fc_threshold: 1.0
          pydeseq2_fit_type: parametric
          pydeseq2_size_factors_fit_type: ratio
          pydeseq2_alpha: 0.05
          pydeseq2_refit_cooks: true
          pydeseq2_cooks_filter: true
          pydeseq2_independent_filter: true
          pydeseq2_n_cpus: 1
        requires:
        - raw_or_counts
        - obs.condition_key
        - obs.sample_key
        tips:
        - '--condition-key / --sample-key / --cluster-key: define the pseudobulk design before any statistical
          tuning.'
        - '--reference-condition: determines the direction of the contrast and therefore the sign of log2FC.'
        - '--min-counts-per-gene: OmicsClaw pseudobulk gene filter before DE testing.'
        - '--min-samples-per-condition: wrapper-level replicate gate; use 2 as the minimum and prefer
          >=3.'
        - '--pydeseq2-fit-type: official PyDESeq2 dispersion fit mode (`parametric` or `mean`).'
        - '--pydeseq2-size-factors-fit-type: official PyDESeq2 size-factor strategy (`ratio`, `poscounts`,
          `iterative`).'
        - '--pydeseq2-alpha: official DeseqStats significance target used during result filtering.'
        - '--pydeseq2-refit-cooks / --pydeseq2-cooks-filter / --pydeseq2-independent-filter: official
          PyDESeq2 result-stabilizing controls.'
        - '--pydeseq2-n-cpus: passed through to DeseqDataSet / DeseqStats.'
      wilcoxon:
        priority: condition_key/sample_key/cluster_key → reference_condition → wilcoxon_alternative
        params:
        - condition_key
        - sample_key
        - cluster_key
        - reference_condition
        - min_counts_per_gene
        - min_samples_per_condition
        - fdr_threshold
        - log2fc_threshold
        - wilcoxon_alternative
        defaults:
          condition_key: condition
          sample_key: sample_id
          cluster_key: leiden
          min_counts_per_gene: 10
          min_samples_per_condition: 2
          fdr_threshold: 0.05
          log2fc_threshold: 1.0
          wilcoxon_alternative: two-sided
        requires:
        - raw_or_counts
        - obs.condition_key
        - obs.sample_key
        tips:
        - '--wilcoxon-alternative: official SciPy `ranksums` alternative hypothesis (`two-sided`, `less`,
          `greater`).'
        - '--reference-condition: controls the comparison direction; OmicsClaw still reports log2FC relative
          to the reference.'
        - '--min-samples-per-condition: keep this at >=2; Wilcoxon is a fallback, not a replacement for
          proper replicate-rich GLM analyses.'
  outputs:
    files:
    - tables/cluster_de_metrics.csv
    - tables/condition_run_summary.csv
    - tables/condition_spatial_points.csv
    - tables/condition_umap_points.csv
    - tables/per_cluster_summary.csv
    - tables/pseudobulk_de.csv
    - tables/pseudobulk_volcano_points.csv
    - tables/sample_counts_by_condition.csv
    - tables/skipped_contrasts.csv
    - tables/top_de_genes.csv
    - figures/cluster_de_burden.png
    - figures/condition_de_barplot.png
    - figures/condition_effect_burden_spatial.png
    - figures/condition_effect_burden_umap.png
    - figures/condition_pvalue_distribution.png
    - figures/condition_spatial_context.png
    - figures/pseudobulk_volcano.png
    - figures/sample_counts_by_condition.png
    - figures/skipped_contrasts.png
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm: []
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: spatial_condition.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - pydeseq2
  - scanpy
  - scipy
  - seaborn
  - statsmodels
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  figures: r_visualization/
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
