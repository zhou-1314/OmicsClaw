schema_version: 2
id: spatial-register
name: spatial-register
domain: spatial
version: 0.4.0
author: OmicsClaw
license: MIT
emoji: 📐
summary:
  load_when: aligning multiple spatial slices into a common coordinate frame on a multi-slice spatial
    AnnData via PASTE optimal transport or STalign image-aware registration
  skip_when:
  - condition: data is single-slice (no registration needed)
  - condition: cross-sample integration in the gene-expression space
    use: spatial-integrate
  trigger_keywords:
  - spatial registration
  - slice alignment
  - coordinate alignment
  - PASTE
  - STalign
  - multi-slice
  tags:
  - spatial
  - registration
  - alignment
  - paste
  - stalign
  - multi-slice
  aliases:
  - register
  - spatial-registration
interface:
  inputs:
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
  parameters:
    hints:
      paste:
        priority: slice_key/reference_slice → paste_alpha → paste_dissimilarity
        params:
        - slice_key
        - reference_slice
        - paste_alpha
        - paste_dissimilarity
        - paste_use_gpu
        defaults:
          paste_alpha: 0.1
          paste_dissimilarity: kl
          paste_use_gpu: false
        requires:
        - obsm.spatial
        - obs.slice
        - shared_genes
        - X_expression
        tips:
        - '--slice-key: practical wrapper control; OmicsClaw requires a real slice label column instead
          of fabricating one.'
        - '--paste-alpha: public PASTE weight between expression dissimilarity and spatial distance in
          `pairwise_align`.'
        - '--paste-dissimilarity: public PASTE expression dissimilarity choice; the wrapper exposes the
          documented `kl` / `euclidean` options.'
        - '--paste-use-gpu: public PASTE backend switch; only matters when a compatible Torch backend
          is available.'
      stalign:
        priority: slice_key/reference_slice → stalign_a → stalign_niter
        params:
        - slice_key
        - reference_slice
        - stalign_niter
        - stalign_a
        - stalign_image_size
        - use_expression
        defaults:
          stalign_niter: 2000
          stalign_a: 500.0
          stalign_image_size: 400
          use_expression: false
        requires:
        - obsm.spatial
        - obs.slice
        - pairwise_two_slices
        - X_expression_optional
        tips:
        - '--stalign-a / --stalign-niter: public STalign LDDMM controls that directly affect deformation
          smoothness and optimization depth.'
        - '--stalign-image-size: current OmicsClaw wrapper rasterization resolution before calling LDDMM;
          this is wrapper-level, not the core scientific STalign parameter.'
        - '--use-expression: current wrapper-level switch that uses PC1 of shared genes as image intensity
          instead of uniform weights.'
  outputs:
    files:
    - tables/registration_disparities.csv
    - tables/registration_metrics.csv
    - tables/registration_points.csv
    - tables/registration_run_summary.csv
    - tables/registration_shift_by_slice.csv
    - tables/registration_summary.csv
    - figures/registration_disparities.png
    - figures/registration_shift_by_slice.png
    - figures/registration_shift_distribution.png
    - figures/registration_shift_map.png
    - figures/slices_after.png
    - figures/slices_before.png
    - processed.h5ad
    - report.md
    - result.json
    anndata:
      saves_h5ad: true
      obsm:
      - spatial_aligned
      - spatial
      - X_spatial
runtime:
  entry: spatial_register.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - paste-bio
  - POT
  - scanpy
  - scikit-learn
  - scipy
  - seaborn
  - STalign
  - torch
compatibility:
  platforms:
  - macos
  - linux
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  figures: r_visualization/
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
