schema_version: 2
id: spatial-genes
name: spatial-genes
domain: spatial
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🧭
summary:
  load_when: ranking spatially variable genes (SVGs) on a preprocessed spatial AnnData via Moran's I,
    SpatialDE, SPARK-X, or FlashS
  skip_when:
  - condition: detecting tissue domains
    use: spatial-domains
  - condition: differential expression between groups
    use: spatial-de
  trigger_keywords:
  - spatially variable gene
  - spatial gene
  - SVG
  - SpatialDE
  - SPARK-X
  - spatial pattern
  - Moran
  - spatial autocorrelation
  tags:
  - spatial
  - svg
  - spatially-variable-genes
  - morans-i
  - spatialde
  - sparkx
  - flashs
  aliases:
  - genes
  - spatial-svg-detection
interface:
  inputs:
    modalities: []
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm:
        - spatial
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --flashs-bandwidth
    - --flashs-n-rand-features
    - --fdr-threshold
    - --method
    - --morans-coord-type
    - --morans-corr-method
    - --morans-n-neighs
    - --morans-n-perms
    - --n-top-genes
    - --sparkx-max-genes
    - --sparkx-num-cores
    - --sparkx-option
    - --spatialde-aeh-lengthscale
    - --spatialde-aeh-patterns
    - --spatialde-min-counts
    - --spatialde-no-aeh
    hints:
      morans:
        priority: morans_coord_type → morans_n_neighs → morans_n_perms
        params:
        - morans_coord_type
        - morans_n_neighs
        - morans_n_perms
        - morans_corr_method
        - fdr_threshold
        - n_top_genes
        defaults:
          morans_coord_type: auto
          morans_n_neighs: 6
          morans_n_perms: 100
          morans_corr_method: fdr_bh
          fdr_threshold: 0.05
          n_top_genes: 20
        requires:
        - obsm.spatial
        - X_log_normalized
        tips:
        - '--morans-coord-type: `auto` lets Squidpy infer Visium grid vs generic coordinates.'
        - '--morans-n-neighs: Main locality knob for generic coordinates.'
        - '--morans-n-perms: Permutation depth; set 0 for analytic-only p-values.'
        - '--morans-corr-method: Multiple-testing correction passed to Squidpy/statsmodels.'
      spatialde:
        priority: spatialde_no_aeh → spatialde_min_counts → spatialde_aeh_patterns/aeh_lengthscale
        params:
        - spatialde_no_aeh
        - spatialde_min_counts
        - spatialde_aeh_patterns
        - spatialde_aeh_lengthscale
        - fdr_threshold
        - n_top_genes
        defaults:
          spatialde_no_aeh: false
          spatialde_min_counts: 3
          fdr_threshold: 0.05
          n_top_genes: 20
        requires:
        - obsm.spatial
        - counts_or_raw
        tips:
        - '--spatialde-min-counts: Gene prefilter before Gaussian-process fitting.'
        - '--spatialde-no-aeh: Skip the AEH pattern-grouping stage and only return per-gene SpatialDE
          statistics.'
        - '--spatialde-aeh-patterns / --spatialde-aeh-lengthscale: Optional overrides for AEH pattern
          count `C` and lengthscale `l`.'
      sparkx:
        priority: sparkx_option → sparkx_num_cores → sparkx_max_genes
        params:
        - sparkx_option
        - sparkx_num_cores
        - sparkx_max_genes
        - fdr_threshold
        - n_top_genes
        defaults:
          sparkx_option: mixture
          sparkx_num_cores: 1
          sparkx_max_genes: 5000
          fdr_threshold: 0.05
          n_top_genes: 20
        requires:
        - obsm.spatial
        - counts_or_raw
        - Rscript
        tips:
        - '--sparkx-option: Passed through to `spark.sparkx`; the official SPARK-X example uses `mixture`.'
        - '--sparkx-num-cores: Passed through as `numCores` in the R implementation.'
        - '--sparkx-max-genes: OmicsClaw wrapper cap for very large matrices before calling SPARK-X.'
      flashs:
        priority: flashs_bandwidth → flashs_n_rand_features
        params:
        - flashs_bandwidth
        - flashs_n_rand_features
        - fdr_threshold
        - n_top_genes
        defaults:
          flashs_n_rand_features: 500
          fdr_threshold: 0.05
          n_top_genes: 20
        requires:
        - obsm.spatial
        - counts_or_raw
        tips:
        - '--flashs-bandwidth: Wrapper-level override for the kernel bandwidth; default is estimated from
          coordinate spread.'
        - '--flashs-n-rand-features: Wrapper-level sketch size controlling FlashS approximation fidelity
          vs runtime.'
  outputs:
    files:
    - tables/coords.csv
    - tables/counts.csv
    - tables/significant_svgs.csv
    - tables/sparkx_results.csv
    - tables/svg_observation_metrics.csv
    - tables/svg_results.csv
    - tables/svg_run_summary.csv
    - tables/top_svg_scores.csv
    - tables/top_svg_spatial_points.csv
    - tables/top_svg_umap_points.csv
    - figures/moran_ranking.png
    - figures/svg_score_vs_significance.png
    - figures/svg_significance_distribution.png
    - figures/top_svg_scores.png
    - figures/top_svg_spatial.png
    - figures/top_svg_umap.png
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm: []
      var: []
      layers: []
      uns:
      - moranI
runtime:
  language: python
  entry: spatial_genes.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - seaborn
  - SpatialDE
  - squidpy
  - statsmodels
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  figures: r_visualization/
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
