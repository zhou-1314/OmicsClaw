schema_version: 2
id: spatial-cnv
name: spatial-cnv
domain: spatial
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🧫
summary:
  load_when: inferring copy-number variation per spot on a preprocessed spatial AnnData with chromosome-annotated
    genes via infercnvpy (default — log-ratio sliding-window) or Numbat (R, allele-aware clone deconvolution)
  skip_when:
  - condition: '`var["chromosome"]` / `var["start"]` / `var["end"]` gene-coord metadata is missing'
  - condition: no normal-reference subset can be defined
  trigger_keywords:
  - copy number variation
  - CNV
  - inferCNV
  - infercnvpy
  - Numbat
  - aneuploidy
  - chromosomal aberration
  - tumor clone
  tags:
  - spatial
  - cnv
  - copy-number
  - infercnvpy
  - numbat
  - tumor
  aliases:
  - cnv
interface:
  inputs:
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obsm:
        - spatial
        - allele_counts
  parameters:
    hints:
      infercnvpy:
        priority: reference_key/reference_cat → window_size/step → infercnv_dynamic_threshold → infercnv_lfc_clip
        params:
        - window_size
        - step
        - infercnv_dynamic_threshold
        - infercnv_lfc_clip
        - infercnv_exclude_chromosomes
        - infercnv_chunksize
        - infercnv_n_jobs
        defaults:
          window_size: 100
          step: 10
          infercnv_dynamic_threshold: 1.5
          infercnv_lfc_clip: 3.0
          infercnv_exclude_chromosomes: chrX,chrY
          infercnv_chunksize: 5000
          infercnv_n_jobs: 1
        requires:
        - obsm.spatial
        - var.chromosome/start/end
        - X_log_normalized
        tips:
        - '--reference-key / --reference-cat: Official infercnvpy reference controls; omit both only when
          an all-cells baseline is scientifically acceptable.'
        - '--window-size: Number of ordered genes per smoothing window; larger windows emphasize broad
          chromosome-arm events.'
        - '--step: Compute every nth window; smaller values increase resolution at higher runtime.'
        - '--infercnv-dynamic-threshold: infercnvpy denoising cutoff (`None` disables thresholding, OmicsClaw
          default is 1.5).'
        - '--infercnv-lfc-clip: Official log-fold-change clipping bound before smoothing.'
        - '--infercnv-exclude-chromosomes / --infercnv-include-sex-chromosomes: infercnvpy defaults exclude
          `chrX` and `chrY`.'
        - '--infercnv-chunksize / --infercnv-n-jobs: Runtime controls; OmicsClaw defaults to single-job
          reproducibility.'
      numbat:
        priority: reference_key/reference_cat → numbat_max_entropy → numbat_min_llr/min_cells → numbat_ncores
        params:
        - numbat_genome
        - numbat_max_entropy
        - numbat_min_llr
        - numbat_min_cells
        - numbat_ncores
        defaults:
          numbat_genome: hg38
          numbat_max_entropy: 0.8
          numbat_min_llr: 5.0
          numbat_min_cells: 50
          numbat_ncores: 1
        requires:
        - layers.counts
        - allele_counts_table
        - reference_key/reference_cat
        tips:
        - '--reference-key / --reference-cat: Current OmicsClaw Numbat wrapper requires labeled diploid
          reference cells to construct `lambdas_ref`.'
        - '--numbat-max-entropy: Core Numbat filter on allele ambiguity; the spatial RNA tutorial recommends
          relaxing this toward `0.8` for Visium-like data.'
        - '--numbat-min-llr: Core confidence cutoff for CNA calls in `run_numbat()`.'
        - '--numbat-min-cells: Minimum clone size for retaining a CNA-defined clone.'
        - '--numbat-ncores: Passed to `run_numbat()` as `ncores`.'
        - '--numbat-genome: Reference genome build for the Numbat model (`hg19` or `hg38`).'
  outputs:
    files:
    - tables/allele_counts.csv
    - tables/cnv_bin_summary.csv
    - tables/cnv_group_sizes.csv
    - tables/cnv_run_summary.csv
    - tables/cnv_scores.csv
    - tables/cnv_spatial_points.csv
    - tables/cnv_umap_points.csv
    - tables/numbat_calls.csv
    - tables/numbat_clone_post.csv
    - tables/numbat_results.csv
    - figures/cnv_bin_summary.png
    - figures/cnv_group_sizes.png
    - figures/cnv_groups_umap.png
    - figures/cnv_heatmap.png
    - figures/cnv_score_distribution.png
    - figures/cnv_spatial.png
    - figures/cnv_umap.png
    - figures/cnv_uncertainty_distribution.png
    - figures/cnv_uncertainty_spatial.png
    - numbat_input.h5ad
    - processed.h5ad
    - report.md
    - result.json
    anndata:
      saves_h5ad: true
      obs:
      - cnv_score
      - cnv_leiden
      - numbat_p_cnv
      - numbat_clone
      - numbat_entropy
      uns:
      - numbat_calls
      - numbat_clone_post
runtime:
  entry: spatial_cnv.py
deps:
  python:
  - anndata
  - infercnvpy
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - seaborn
compatibility:
  platforms:
  - macos
  - linux
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  figures: r_visualization/
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
