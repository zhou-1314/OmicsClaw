domain: spatial
allowed_extra_flags:
- --auto-k
- --auto-k-min
- --auto-k-max
- --data-type
- --dim-output
- --epochs
- --k-nn
- --lambda-param
- --method
- --n-domains
- --n-layers
- --num-neighbours
- --pre-resolution
- --rad-cutoff
- --refine
- --resolution
- --spagcn-p
- --spatial-weight
- --stagate-alpha
- --use-rep
param_hints:
  leiden:
    priority: resolution → spatial_weight
    params:
    - resolution
    - spatial_weight
    defaults:
      resolution: 1.0
      spatial_weight: 0.3
    requires:
    - obsm.spatial
    tips:
    - '--resolution: Clustering granularity (default 1.0).'
    - '--spatial-weight: Spatial graph influence (default 0.3).'
  louvain:
    priority: resolution → spatial_weight
    params:
    - resolution
    - spatial_weight
    defaults:
      resolution: 1.0
      spatial_weight: 0.3
    requires:
    - obsm.spatial
    tips:
    - '--resolution: Clustering granularity (default 1.0).'
    - '--spatial-weight: Spatial graph influence (default 0.3).'
  spagcn:
    priority: spagcn_p → n_domains → epochs
    params:
    - n_domains
    - epochs
    - spagcn_p
    defaults:
      n_domains: 7
      epochs: 100
      spagcn_p: 0.5
    requires:
    - obsm.spatial
    tips:
    - '--spagcn-p: Spatial neighborhood contribution (default 0.5).'
    - '--n-domains: Target cluster count.'
    - '--epochs: Training loops (default 100 in the OmicsClaw CLI wrapper).'
  stagate:
    priority: rad_cutoff/k_nn → stagate_alpha → epochs
    params:
    - n_domains
    - epochs
    - k_nn
    - rad_cutoff
    - stagate_alpha
    - pre_resolution
    defaults:
      n_domains: 7
      epochs: 100
      k_nn: 6
      stagate_alpha: 0.0
      pre_resolution: 0.2
    requires:
    - obsm.spatial
    tips:
    - '--rad-cutoff / --k-nn: Spatial network. Varies by platform (Visium~150, Slide-seq~50).'
    - '--stagate-alpha: Cell type-aware module weight (0=disabled).'
    - '--epochs: Training epochs (default 100 in the OmicsClaw CLI wrapper).'
  graphst:
    priority: data_type → epochs → dim_output → n_domains
    params:
    - n_domains
    - epochs
    - dim_output
    - data_type
    defaults:
      n_domains: 7
      epochs: 100
      dim_output: 64
      data_type: auto
    requires:
    - obsm.spatial
    - raw_or_counts
    tips:
    - '--data-type: Platform hint for GraphST routing (visium, slide_seq, stereo).
      Auto-inferred from metadata/path when omitted.'
    - '--epochs: Default ~600 in official code. Lower to 50-100 for large datasets
      (>30k spots).'
    - '--dim-output: Embedding dimension (default 64). Increase for complex tissues.'
    - '--n-domains: Target cluster count.'
  banksy:
    priority: lambda_param → num_neighbours → resolution / n_domains
    params:
    - resolution
    - lambda_param
    - num_neighbours
    - n_domains
    defaults:
      resolution: 1.0
      lambda_param: 0.2
      num_neighbours: 15
    requires:
    - obsm.spatial
    tips:
    - '--lambda-param: 0.2 for cell-typing, 0.8 for domain-finding.'
    - '--num-neighbours: Spatial geometry k_geom (default 15).'
    - '--resolution: Leiden-mode clustering granularity (default 1.0 in the OmicsClaw
      CLI wrapper).'
    - '--n-domains: Optional exact cluster count target; if omitted, BANKSY falls
      back to Leiden discovery mode.'
  cellcharter:
    priority: n_domains/auto_k → n_layers → use_rep
    params:
    - n_domains
    - auto_k
    - n_layers
    - use_rep
    - auto_k_min
    - auto_k_max
    defaults:
      n_domains: 7
      n_layers: 3
      auto_k: false
    requires:
    - obsm.spatial
    tips:
    - '--n-layers: Number of spatial hops for feature aggregation (default 3).'
    - '--auto-k: Enable automatic discovery of the most stable cluster count. If disabled,
      fixed-K mode defaults to 7 unless --n-domains is provided.'
    - '--use-rep: Feature representation to use (defaults to X_pca or X).'
legacy_aliases:
- domains
- spatial-domain-identification
saves_h5ad: true
requires:
  bins:
  - python3
  env: []
  config: []
emoji: 🗺️
homepage: https://github.com/TianGzlab/OmicsClaw
os:
- macos
- linux
install:
- kind: pip
  package: scanpy
  bins: []
- kind: pip
  package: squidpy
  bins: []
trigger_keywords:
- spatial domain
- tissue region
- niche
- spatial niche
- niche identification
- niche detection
- SpaGCN
- STAGATE
- CellCharter
script: spatial_domains.py
requires_preprocessed: false
