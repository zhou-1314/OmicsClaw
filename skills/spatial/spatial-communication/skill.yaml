schema_version: 2
id: spatial-communication
name: spatial-communication
domain: spatial
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📡
summary:
  load_when: computing ligand-receptor cell-cell communication on a preprocessed spatial AnnData with
    `obs[cell_type_key]` (default `leiden`) via LIANA (default), CellPhoneDB, FastCCC, or CellChat (R)
  skip_when:
  - condition: running scRNA-only L-R inference
    use: sc-cell-communication
  - condition: no cell-type labels exist
    use: spatial-annotate
  trigger_keywords:
  - cell communication
  - cell-cell communication
  - ligand receptor
  - ligand-receptor
  - LIANA
  - CellPhoneDB
  - FastCCC
  - CellChat
  tags:
  - spatial
  - communication
  - ligand-receptor
  - liana
  - cellphonedb
  - cellchat
  - fastccc
  aliases:
  - communication
  - spatial-cell-communication
interface:
  inputs:
    modalities: []
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm:
        - spatial
      env: []
      config: []
  parameters:
    hints:
      liana:
        priority: liana_resource → liana_expr_prop → liana_min_cells → liana_n_perms
        params:
        - cell_type_key
        - species
        - liana_resource
        - liana_expr_prop
        - liana_min_cells
        - liana_n_perms
        defaults:
          cell_type_key: leiden
          species: human
          liana_resource: auto
          liana_expr_prop: 0.1
          liana_min_cells: 5
          liana_n_perms: 1000
        requires:
        - X_log_normalized
        - obs.cell_type
        tips:
        - '--liana-resource: `auto` maps to `consensus` for human and `mouseconsensus` for mouse.'
        - '--liana-expr-prop: minimum expressing-cell fraction forwarded to `liana.mt.rank_aggregate`.'
        - '--liana-min-cells: minimum cells per cell type before LIANA tests interactions.'
        - '--liana-n-perms: permutation depth used in LIANA consensus ranking.'
      cellphonedb:
        priority: cellphonedb_threshold → cellphonedb_iterations
        params:
        - cell_type_key
        - species
        - cellphonedb_threshold
        - cellphonedb_iterations
        defaults:
          cell_type_key: leiden
          species: human
          cellphonedb_threshold: 0.1
          cellphonedb_iterations: 1000
        requires:
        - X_log_normalized
        - obs.cell_type
        - human_species
        - cellphonedb_database
        tips:
        - '--cellphonedb-threshold: minimum fraction of cells expressing each ligand or receptor.'
        - '--cellphonedb-iterations: label-shuffling iterations in the official statistical method.'
      fastccc:
        priority: fastccc_single_unit_summary → fastccc_complex_aggregation → fastccc_lr_combination →
          fastccc_min_percentile
        params:
        - cell_type_key
        - species
        - fastccc_single_unit_summary
        - fastccc_complex_aggregation
        - fastccc_lr_combination
        - fastccc_min_percentile
        defaults:
          cell_type_key: leiden
          species: human
          fastccc_single_unit_summary: Mean
          fastccc_complex_aggregation: Minimum
          fastccc_lr_combination: Arithmetic
          fastccc_min_percentile: 0.1
        requires:
        - X_log_normalized
        - obs.cell_type
        - human_species
        - cellphonedb_database
        tips:
        - '--fastccc-single-unit-summary: public FastCCC summary statistic, for example `Mean`, `Median`,
          `Q3`, or `Quantile_0.9`.'
        - '--fastccc-complex-aggregation: how multi-subunit complexes are summarized (`Minimum` or `Average`).'
        - '--fastccc-lr-combination: how ligand and receptor activity are combined (`Arithmetic` or `Geometric`).'
        - '--fastccc-min-percentile: minimum expressing-cell fraction used in FastCCC filtering.'
      cellchat_r:
        priority: cellchat_prob_type → cellchat_min_cells
        params:
        - cell_type_key
        - species
        - cellchat_prob_type
        - cellchat_min_cells
        defaults:
          cell_type_key: leiden
          species: human
          cellchat_prob_type: triMean
          cellchat_min_cells: 10
        requires:
        - X_log_normalized
        - obs.cell_type
        - Rscript
        tips:
        - '--cellchat-prob-type: forwarded to `computeCommunProb(type=...)`; `triMean` is the current
          OmicsClaw default.'
        - '--cellchat-min-cells: forwarded to `filterCommunication(min.cells=...)`.'
  outputs:
    files:
    - tables/cellchat_centrality.csv
    - tables/cellchat_count_matrix.csv
    - tables/cellchat_pathways.csv
    - tables/cellchat_results.csv
    - tables/cellchat_weight_matrix.csv
    - tables/communication_run_summary.csv
    - tables/communication_spatial_points.csv
    - tables/communication_summary.csv
    - tables/communication_umap_points.csv
    - tables/complex_composition_table.csv
    - tables/complex_table.csv
    - tables/gene_table.csv
    - tables/interaction_table.csv
    - tables/lr_interactions.csv
    - tables/meta.tsv
    - tables/protein_table.csv
    - tables/signaling_roles.csv
    - tables/source_target_summary.csv
    - tables/top_interactions.csv
    - figures/communication_pvalue_distribution.png
    - figures/communication_roles_spatial.png
    - figures/communication_score_vs_significance.png
    - figures/lr_dotplot.png
    - figures/lr_heatmap.png
    - figures/lr_spatial.png
    - figures/signaling_roles.png
    - figures/source_target_summary.png
    - fastccc_input.h5ad
    - input.h5ad
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm: []
      var: []
      layers: []
      uns:
      - ccc_results
      - liana_results
      - cellphonedb_results
      - fastccc_results
      - cellchat_results
      - communication_summary
      - communication_signaling_roles
      - spatial_communication
runtime:
  language: python
  entry: spatial_communication.py
deps:
  python:
  - anndata
  - cellphonedb
  - fastccc
  - liana
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - seaborn
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  figures: r_visualization/
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
