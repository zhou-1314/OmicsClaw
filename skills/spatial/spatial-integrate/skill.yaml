schema_version: 2
id: spatial-integrate
name: spatial-integrate
domain: spatial
type: leaf
version: 0.4.0
author: OmicsClaw
license: MIT
emoji: 🔗
summary:
  load_when: removing batch effects across multiple spatial samples on a multi-batch spatial AnnData via
    Harmony, BBKNN, or Scanorama before downstream analysis
  skip_when:
  - condition: aligning physical slice coordinates
    use: spatial-register
  - condition: single-batch data (no integration needed)
    use: spatial-domains
  trigger_keywords:
  - multi-sample integration
  - batch correction
  - Harmony
  - BBKNN
  - Scanorama
  - merge samples
  tags:
  - spatial
  - integration
  - batch-correction
  - harmony
  - bbknn
  - scanorama
  - multi-sample
  aliases:
  - integrate
  - spatial-integration
interface:
  inputs:
    modalities: []
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm:
        - X_pca
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --batch-key
    - --method
    - --harmony-theta
    - --harmony-lambda
    - --harmony-max-iter
    - --bbknn-neighbors-within-batch
    - --bbknn-n-pcs
    - --bbknn-trim
    - --scanorama-knn
    - --scanorama-sigma
    - --scanorama-alpha
    - --scanorama-batch-size
    hints:
      harmony:
        priority: harmony_theta → harmony_lambda → harmony_max_iter
        params:
        - batch_key
        - harmony_theta
        - harmony_lambda
        - harmony_max_iter
        defaults:
          batch_key: batch
          harmony_theta: 2.0
          harmony_lambda: 1.0
          harmony_max_iter: 10
        requires:
        - obsm.X_pca
        - obs.batch_key
        tips:
        - '--harmony-theta: Diversity penalty; raise it to encourage stronger batch mixing.'
        - '--harmony-lambda: Ridge penalty; smaller values increase correction strength, while `-1` enables
          Harmony auto-lambda estimation.'
        - '--harmony-max-iter: Maximum Harmony outer iterations before convergence.'
      bbknn:
        priority: bbknn_neighbors_within_batch → bbknn_n_pcs → bbknn_trim
        params:
        - batch_key
        - bbknn_neighbors_within_batch
        - bbknn_n_pcs
        - bbknn_trim
        defaults:
          batch_key: batch
          bbknn_neighbors_within_batch: 3
          bbknn_n_pcs: 50
          bbknn_trim: null
        requires:
        - obsm.X_pca
        - obs.batch_key
        tips:
        - '--bbknn-neighbors-within-batch: Main integration knob controlling how many neighbors BBKNN
          draws from each batch.'
        - '--bbknn-n-pcs: Number of PCs used to build the batch-balanced graph; OmicsClaw clamps it to
          the PCs actually available in `X_pca`.'
        - '--bbknn-trim: Optional edge trimming after graph construction; leave unset to keep the package
          default.'
      scanorama:
        priority: scanorama_knn → scanorama_sigma → scanorama_alpha → scanorama_batch_size
        params:
        - batch_key
        - scanorama_knn
        - scanorama_sigma
        - scanorama_alpha
        - scanorama_batch_size
        defaults:
          batch_key: batch
          scanorama_knn: 20
          scanorama_sigma: 15.0
          scanorama_alpha: 0.1
          scanorama_batch_size: 5000
        requires:
        - obsm.X_pca
        - obs.batch_key
        tips:
        - '--scanorama-knn: Number of nearest neighbors used while matching batches.'
        - '--scanorama-sigma: Gaussian kernel width for smoothing Scanorama correction vectors.'
        - '--scanorama-alpha: Alignment-score cutoff controlling which batch matches are accepted.'
        - '--scanorama-batch-size: Incremental alignment batch size for large datasets.'
  outputs:
    files:
    - tables/batch_sizes.csv
    - tables/corrected_embedding_points.csv
    - tables/integration_metrics.csv
    - tables/integration_observations.csv
    - tables/umap_after_points.csv
    - tables/umap_before_points.csv
    - figures/batch_entropy_after_umap.png
    - figures/batch_entropy_distribution.png
    - figures/batch_highlight.png
    - figures/batch_mixing.png
    - figures/batch_sizes.png
    - figures/umap_before_by_batch.png
    - figures/umap_by_batch.png
    - figures/umap_by_cluster.png
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm:
      - X_pca_harmony
      - X_scanorama
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: spatial_integrate.py
deps:
  python:
  - anndata
  - bbknn
  - harmonypy
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - seaborn
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  figures: r_visualization/
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
