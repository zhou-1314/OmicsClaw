schema_version: 2
id: spatial-trajectory
name: spatial-trajectory
domain: spatial
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🛤️
summary:
  load_when: inferring pseudotime / lineage trajectories on a preprocessed spatial AnnData via DPT (default
    — diffusion pseudotime), CellRank (terminal-state + fate-probability), or Palantir (waypoint branch
    probabilities)
  skip_when:
  - condition: the data has spliced/unspliced layers and you want velocity-driven dynamics
    use: spatial-velocity
  - condition: non-spatial scRNA pseudotime
    use: sc-pseudotime
  trigger_keywords:
  - trajectory
  - pseudotime
  - diffusion pseudotime
  - DPT
  - CellRank
  - Palantir
  - cell fate
  - lineage
  tags:
  - spatial
  - trajectory
  - pseudotime
  - dpt
  - cellrank
  - palantir
  - lineage
  aliases:
  - trajectory
interface:
  inputs:
    modalities: []
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm:
        - X_pca
      env: []
      config: []
  parameters:
    hints:
      dpt:
        priority: cluster_key/root_cell/root_cell_type → dpt_n_dcs
        params:
        - cluster_key
        - root_cell
        - root_cell_type
        - dpt_n_dcs
        defaults:
          cluster_key: auto
          root_cell: null
          root_cell_type: null
          dpt_n_dcs: 10
        requires:
        - obsm.X_pca
        - uns.neighbors
        tips:
        - '--cluster-key: wrapper control used for root-cell-type selection and per-cluster pseudotime
          summaries; current OmicsClaw auto-detects common cluster columns if omitted.'
        - '--root-cell: exact barcode wrapper control; overrides automatic root selection.'
        - '--root-cell-type: wrapper control that selects the root from a specified annotation group.'
        - '--dpt-n-dcs: public `scanpy.tl.dpt` parameter controlling how many diffusion components enter
          pseudotime.'
      cellrank:
        priority: cluster_key/root_cell/root_cell_type → cellrank_use_velocity → cellrank_n_states → cellrank_schur_components
          → cellrank_frac_to_keep
        params:
        - cluster_key
        - root_cell
        - root_cell_type
        - dpt_n_dcs
        - cellrank_use_velocity
        - cellrank_n_states
        - cellrank_schur_components
        - cellrank_frac_to_keep
        defaults:
          cluster_key: auto
          root_cell: null
          root_cell_type: null
          dpt_n_dcs: 10
          cellrank_use_velocity: false
          cellrank_n_states: 3
          cellrank_schur_components: 20
          cellrank_frac_to_keep: 0.3
        requires:
        - obsm.X_pca
        - uns.neighbors
        - cellrank
        tips:
        - '--cellrank-use-velocity: current OmicsClaw wrapper-level preference for `VelocityKernel`; if
          velocity is unavailable the wrapper falls back to pseudotime/connectivity or connectivity only
          and reports the actual kernel mode.'
        - '--cellrank-n-states: public `GPCCA.compute_macrostates(n_states=...)` control.'
        - '--cellrank-schur-components: public `GPCCA.compute_schur(n_components=...)` control.'
        - '--cellrank-frac-to-keep: public `PseudotimeKernel.compute_transition_matrix(frac_to_keep=...)`
          control when the pseudotime kernel path is used.'
      palantir:
        priority: cluster_key/root_cell/root_cell_type → palantir_knn → palantir_num_waypoints → palantir_n_components
          → palantir_max_iterations
        params:
        - cluster_key
        - root_cell
        - root_cell_type
        - palantir_n_components
        - palantir_knn
        - palantir_num_waypoints
        - palantir_max_iterations
        defaults:
          cluster_key: auto
          root_cell: null
          root_cell_type: null
          palantir_n_components: 10
          palantir_knn: 30
          palantir_num_waypoints: 1200
          palantir_max_iterations: 25
        requires:
        - obsm.X_pca
        - uns.neighbors
        - palantir
        tips:
        - '--palantir-n-components / --palantir-knn: public `scanpy.external.tl.palantir(...)` controls
          for diffusion-space construction.'
        - '--palantir-num-waypoints / --palantir-max-iterations: public `scanpy.external.tl.palantir_results(...)`
          controls for waypoint sampling and pseudotime refinement.'
        - Current OmicsClaw stores Palantir pseudotime and entropy back into AnnData instead of pretending
          the Scanpy wrapper writes them automatically.
  outputs:
    files:
    - tables/cellrank_driver_genes.csv
    - tables/palantir_branch_probs.csv
    - tables/trajectory_cluster_summary.csv
    - tables/trajectory_diffmap_points.csv
    - tables/trajectory_driver_genes.csv
    - tables/trajectory_fate_probabilities.csv
    - tables/trajectory_fate_probabilities_wide.csv
    - tables/trajectory_genes.csv
    - tables/trajectory_run_summary.csv
    - tables/trajectory_spatial_points.csv
    - tables/trajectory_summary.csv
    - tables/trajectory_terminal_states.csv
    - tables/trajectory_umap_points.csv
    - figures/cellrank_fate_circular.png
    - figures/cellrank_fate_heatmap.png
    - figures/cellrank_fate_map.png
    - figures/cellrank_gene_trends.png
    - figures/trajectory_cluster_summary.png
    - figures/trajectory_diffmap.png
    - figures/trajectory_entropy_distribution.png
    - figures/trajectory_fate_probability_distribution.png
    - figures/trajectory_genes_barplot.png
    - figures/trajectory_pseudotime_distribution.png
    - figures/trajectory_pseudotime_embedding.png
    - figures/trajectory_pseudotime_spatial.png
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs:
      - dpt_pseudotime
      - traj_terminal_state
      - traj_fate_max_prob
      - traj_fate_entropy
      - palantir_pseudotime
      - palantir_entropy
      obsm:
      - palantir_branch_probs
      var: []
      layers: []
      uns:
      - iroot
      - palantir_waypoints
      - palantir_branch_prob_columns
runtime:
  language: python
  entry: spatial_trajectory.py
deps:
  python:
  - anndata
  - cellrank
  - matplotlib
  - numpy
  - palantir
  - pandas
  - scanpy
  - scipy
  - scvelo
  - seaborn
  - statsmodels
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  figures: r_visualization/
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
