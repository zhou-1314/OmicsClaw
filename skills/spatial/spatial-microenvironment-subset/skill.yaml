schema_version: 2
id: spatial-microenvironment-subset
name: spatial-microenvironment-subset
domain: spatial
version: 0.3.0
author: OmicsClaw
license: MIT
summary:
  load_when: extracting a niche / microenvironment subset around a center cell-type by spatial radius
    from a labelled spatial AnnData, producing a smaller AnnData of centers + their within-radius neighbours
  skip_when:
  - condition: running global tissue-domain detection
    use: spatial-domains
  - condition: cross-condition comparison
    use: spatial-condition
  trigger_keywords:
  - microenvironment
  - neighborhood subset
  - spatial radius
  - neighboring cells
  - nearby cells
  - tumor microenvironment
  - extract cells within 50 microns
  tags:
  - spatial
  - microenvironment
  - niche
  - subsetting
  - neighbourhood
  - visium
  - xenium
  aliases:
  - spatial-neighborhood-subset
  - spatial-proximity-subset
  - microenvironment
  - microenvironment subset
  - tumor microenvironment
  - neighborhood subset
interface:
  inputs:
    modalities:
    - visium
    - xenium
    file_types:
    - h5ad
    preconditions:
      data_shape:
        obsm:
        - spatial
  outputs:
    files:
    - tables/center_observations.csv
    - tables/label_composition.csv
    - tables/selected_observations.csv
    - tables/selection_summary.csv
    - figures/microenvironment_selection.png
    - spatial_microenvironment_subset.h5ad
    - report.md
    - result.json
    anndata:
      saves_h5ad: true
      obs:
      - microenv_is_center
      - microenv_role
      - microenv_within_radius
      - microenv_nearest_center
      - microenv_distance_native
      - microenv_distance_microns
runtime:
  entry: spatial_microenvironment_subset.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  tests: tests/
