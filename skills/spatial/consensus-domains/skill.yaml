schema_version: 2
id: consensus-domains
name: consensus-domains
domain: spatial
type: consensus
version: 0.1.0
author: OmicsClaw
license: Apache-2.0
emoji: 🧩
summary:
  load_when: you want a verified multi-method consensus over spatial tissue domains on a preprocessed
    spatial AnnData — fanning out N domain methods, ranking base clusterings, and emitting a typed consensus
    with cross-method disagreement
  skip_when:
  - condition: one method suffices
    use: spatial-domains
  - condition: the data is single-cell
    use: sc-consensus-clustering
  trigger_keywords:
  - consensus domains
  - consensus tissue regions
  - multi-method spatial domains
  - robust spatial clustering
  - expert in the loop spatial
  - bc ranking
  - saccelerator-like consensus
  tags:
  - spatial
  - consensus
  - typed-consensus
  - expert-in-the-loop
  - saccelerator
  - bc-ranking
  - kmode
  - lca
  - weighted
interface:
  inputs:
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
  parameters:
    allowed_extra_flags:
    - --members
    - --all
    - --no-spatial-panel
    - --n-clusters
    - --confirm-plan
    - --non-interactive
    - --alpha
    - --beta
    - --max-class-frac
    - --llm-judge
    - --operator
    - --seed
    - --timeout
    - --max-parallel
    - --query
    - --top-k
    - --run-id
  outputs:
    files:
    - consensus_labels.tsv
    - member_scores.csv
    - member_intrinsic_panel.csv
    - cross_method_nmi.csv
    - plan.json
    - report.md
    - result.json
runtime:
  entry: consensus_domains.py
deps:
  python:
  - anndata
  - numpy
  - pandas
  - PyYAML
  - scanpy
  - scikit-learn
  - scipy
compatibility:
  platforms:
  - linux
  - macos
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  tests: tests/
  homepage: https://github.com/OmicsClaw/OmicsClaw
