schema_version: 2
id: spatial-enrichment
name: spatial-enrichment
domain: spatial
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🛤️
summary:
  load_when: running pathway / gene-set enrichment per cluster on a preprocessed spatial AnnData via Enrichr
    (over-representation), GSEA (preranked), or ssGSEA (per-cell scores)
  skip_when:
  - condition: ranking spatially variable genes
    use: spatial-genes
  - condition: comparing pathways across conditions
    use: spatial-condition
  trigger_keywords:
  - pathway enrichment
  - gene set enrichment
  - enrichr
  - GSEA
  - ssGSEA
  - GO
  - Reactome
  - MSigDB
  tags:
  - spatial
  - enrichment
  - pathway
  - gsea
  - ssgsea
  - enrichr
  - gene-set
  aliases:
  - enrichment
interface:
  inputs:
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obsm:
        - spatial
  parameters:
    hints:
      enrichr:
        priority: source/gene_set_file → de_method/de_corr_method → enrichr_padj_cutoff/log2fc_cutoff
          → enrichr_max_genes
        params:
        - groupby
        - source
        - species
        - gene_set
        - gene_set_file
        - de_method
        - de_corr_method
        - enrichr_padj_cutoff
        - enrichr_log2fc_cutoff
        - enrichr_max_genes
        - fdr_threshold
        - n_top_terms
        defaults:
          groupby: leiden
          source: omicsclaw_core
          species: human
          de_method: wilcoxon
          de_corr_method: benjamini-hochberg
          enrichr_padj_cutoff: 0.05
          enrichr_log2fc_cutoff: 1.0
          enrichr_max_genes: 200
          fdr_threshold: 0.05
          n_top_terms: 20
        requires:
        - obs.groupby
        - X_log_normalized
        tips:
        - '`enrichr` in OmicsClaw is an ORA-style marker enrichment path: it first ranks markers with
          Scanpy, then enriches positive markers per group.'
        - '--source: choose `omicsclaw_core` for a stable local-first library, or an external library
          key such as `GO_Biological_Process` / `MSigDB_Hallmark` when GSEApy can resolve it.'
        - '--gene-set-file: OmicsClaw wrapper-level override for local `.json` or `.gmt` gene-set libraries.'
        - '--de-method / --de-corr-method: upstream Scanpy ranking controls that directly affect which
          markers enter ORA.'
        - '--enrichr-padj-cutoff / --enrichr-log2fc-cutoff / --enrichr-max-genes: wrapper-level positive-marker
          selection rules before enrichment.'
      gsea:
        priority: source/gene_set_file → de_method/de_corr_method → gsea_ranking_metric → gsea_min_size/max_size
          → gsea_permutation_num/weight
        params:
        - groupby
        - source
        - species
        - gene_set
        - gene_set_file
        - de_method
        - de_corr_method
        - gsea_ranking_metric
        - gsea_min_size
        - gsea_max_size
        - gsea_permutation_num
        - gsea_weight
        - gsea_ascending
        - gsea_threads
        - gsea_seed
        - fdr_threshold
        - n_top_terms
        defaults:
          groupby: leiden
          source: omicsclaw_core
          species: human
          de_method: wilcoxon
          de_corr_method: benjamini-hochberg
          gsea_ranking_metric: auto
          gsea_min_size: 15
          gsea_max_size: 500
          gsea_permutation_num: 100
          gsea_weight: 1.0
          gsea_ascending: false
          gsea_threads: 1
          gsea_seed: 123
          fdr_threshold: 0.05
          n_top_terms: 20
        requires:
        - obs.groupby
        - X_log_normalized
        tips:
        - '--gsea-ranking-metric: OmicsClaw wrapper-level choice of how Scanpy marker rankings are converted
          into a preranked list; `auto` prefers `scores`, then `logfoldchanges`.'
        - '--gsea-min-size / --gsea-max-size / --gsea-permutation-num / --gsea-weight / --gsea-ascending
          / --gsea-threads / --gsea-seed: official GSEApy `prerank()` controls.'
        - '`gsea` keeps the full ranked gene list per group, so it is more appropriate than ORA when the
          user wants subtle coordinated pathway shifts instead of thresholded marker overlap.'
      ssgsea:
        priority: source/gene_set_file → ssgsea_sample_norm_method/correl_norm_type → ssgsea_min_size/max_size
          → ssgsea_weight
        params:
        - groupby
        - source
        - species
        - gene_set
        - gene_set_file
        - ssgsea_sample_norm_method
        - ssgsea_correl_norm_type
        - ssgsea_min_size
        - ssgsea_max_size
        - ssgsea_weight
        - ssgsea_ascending
        - ssgsea_threads
        - ssgsea_seed
        - n_top_terms
        defaults:
          groupby: leiden
          source: omicsclaw_core
          species: human
          ssgsea_sample_norm_method: rank
          ssgsea_correl_norm_type: rank
          ssgsea_min_size: 15
          ssgsea_max_size: 500
          ssgsea_weight: 0.25
          ssgsea_ascending: false
          ssgsea_threads: 1
          ssgsea_seed: 123
          n_top_terms: 20
        requires:
        - obs.groupby
        - X_log_normalized
        tips:
        - '`ssgsea` in the current OmicsClaw wrapper runs on group-level mean expression profiles, not
          on every spot independently.'
        - '--ssgsea-sample-norm-method / --ssgsea-correl-norm-type / --ssgsea-min-size / --ssgsea-max-size
          / --ssgsea-weight / --ssgsea-ascending / --ssgsea-threads / --ssgsea-seed: official GSEApy `ssgsea()`
          controls.'
        - OmicsClaw projects selected group-level ssGSEA scores back to `adata.obs` for visualization;
          this is a display layer rather than extra statistical testing.
  outputs:
    files:
    - tables/enrichment_group_metrics.csv
    - tables/enrichment_results.csv
    - tables/enrichment_run_summary.csv
    - tables/enrichment_significant.csv
    - tables/enrichment_spatial_points.csv
    - tables/enrichment_term_group_scores.csv
    - tables/enrichment_umap_points.csv
    - tables/ranked_markers.csv
    - tables/top_enriched_terms.csv
    - figures/enrichment_barplot.png
    - figures/enrichment_dotplot.png
    - figures/enrichment_group_metrics.png
    - figures/enrichment_group_spatial_context.png
    - figures/enrichment_group_top_stat_spatial.png
    - figures/enrichment_group_top_stat_umap.png
    - figures/enrichment_pvalue_distribution.png
    - figures/enrichment_score_distribution.png
    - figures/enrichment_score_violin.png
    - figures/enrichment_spatial_scores.png
    - figures/top_enriched_terms.png
    - processed.h5ad
    - report.md
    - result.json
    anndata:
      saves_h5ad: true
      uns:
      - enrichment_results
      - '{method}_results'
      - enrichr_results
      - gsea_results
      - ssgsea_results
      - enrichment_score_columns
runtime:
  entry: spatial_enrichment.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - seaborn
compatibility:
  platforms:
  - macos
  - linux
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  figures: r_visualization/
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
