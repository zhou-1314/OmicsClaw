schema_version: 2
id: genomics-sv-detection
name: genomics-sv-detection
domain: genomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🧱
summary:
  load_when: summarising structural variants from an SV VCF (DEL / DUP / INV / TRA) — BND-notation parsing,
    size classification, per-type counts
  skip_when:
  - condition: working with small SNVs / indels
    use: genomics-variant-calling
  - condition: calling SVs from BAM (run Manta / Delly / Sniffles first)
  trigger_keywords:
  - structural variant
  - SV
  - Manta
  - Delly
  - Lumpy
  - Sniffles
  tags:
  - genomics
  - structural-variants
  - sv
  - manta
  - delly
  - sniffles
  - bnd
  aliases:
  - sv-detect
interface:
  inputs:
    file_types:
    - vcf
  outputs:
    files:
    - tables/structural_variants.csv
    - report.md
    - result.json
runtime:
  entry: sv_detection.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
