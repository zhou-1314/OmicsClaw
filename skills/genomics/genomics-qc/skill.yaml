schema_version: 2
id: genomics-qc
name: genomics-qc
domain: genomics
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📊
summary:
  load_when: running pre-alignment FASTQ quality control — Phred quality scores, Q20/Q30 rates, GC / N
    content, read-length distribution, adapter-contamination detection
  skip_when:
  - condition: working with already-aligned BAMs
    use: genomics-alignment
  - condition: peak / variant files are the input (use the relevant downstream skill)
  trigger_keywords:
  - sequencing QC
  - FastQC
  - read quality
  - adapter trimming
  - fastp
  tags:
  - genomics
  - qc
  - fastq
  - phred
  - adapter
  - fastqc
  aliases: []
interface:
  inputs:
    modalities: []
    file_types:
    - fastq
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints: {}
  outputs:
    files:
    - tables/per_base_quality.csv
    - tables/qc_metrics.csv
    - tables/read_length_distribution.csv
    - report.md
    - result.json
    result_json:
      required_keys: []
runtime:
  language: python
  entry: genomics_qc.py
deps:
  python:
  - numpy
  - pandas
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
