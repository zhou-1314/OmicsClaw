schema_version: 2
id: genomics-phasing
name: genomics-phasing
domain: genomics
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🔀
summary:
  load_when: summarising a phased VCF (output of WhatsHap / SHAPEIT5 / Eagle2) — phased fraction of het
    variants, phase-block N50, PS-field parsing, pipe-delimited genotype detection
  skip_when:
  - condition: the input is unphased (run a phaser first)
  - condition: calling small variants
    use: genomics-variant-calling
  trigger_keywords:
  - haplotype phasing
  - WhatsHap
  - SHAPEIT
  - Eagle
  - phasing
  tags:
  - genomics
  - phasing
  - haplotype
  - whatshap
  - shapeit
  - eagle
  - ps
  aliases:
  - phase
interface:
  inputs:
    modalities: []
    file_types:
    - vcf
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --n-variants
    hints: {}
  outputs:
    files:
    - tables/phase_blocks.csv
    - tables/phased_variants.csv
    - report.md
    - result.json
    result_json:
      required_keys: []
runtime:
  language: python
  entry: genomics_phasing.py
deps:
  python:
  - numpy
  - pandas
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
