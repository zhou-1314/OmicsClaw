schema_version: 2
id: genomics-phasing
name: genomics-phasing
domain: genomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🔀
summary:
  load_when: summarising a phased VCF (output of WhatsHap / SHAPEIT5 / Eagle2) — phased fraction of het
    variants, phase-block N50, PS-field parsing, pipe-delimited genotype detection
  skip_when:
  - condition: the input is unphased (run a phaser first)
  - condition: calling small variants
    use: genomics-variant-calling
  trigger_keywords:
  - haplotype phasing
  - WhatsHap
  - SHAPEIT
  - Eagle
  - phasing
  tags:
  - genomics
  - phasing
  - haplotype
  - whatshap
  - shapeit
  - eagle
  - ps
  aliases:
  - phase
interface:
  inputs:
    file_types:
    - vcf
    artifacts:
    - kind: genomics.filtered_variants
      formats:
      - vcf
  outputs:
    files:
    - tables/phase_blocks.csv
    - tables/phased_variants.csv
    - report.md
    - result.json
    artifacts:
    - kind: genomics.phased_variants
      path: tables/phased_variants.csv
      format: csv
runtime:
  entry: genomics_phasing.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
