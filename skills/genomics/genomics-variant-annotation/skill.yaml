schema_version: 2
id: genomics-variant-annotation
name: genomics-variant-annotation
domain: genomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📝
summary:
  load_when: summarising functional impact of an annotated variant CSV — per-IMPACT counts (HIGH / MODERATE
    / LOW / MODIFIER), top consequences, gene-affected count
  skip_when:
  - condition: input is a raw VCF (convert with `bcftools +split-vep` first)
  - condition: calling raw variants
    use: genomics-variant-calling
  - condition: filtering VCFs
    use: genomics-vcf-operations
  trigger_keywords:
  - variant annotation
  - VEP
  - snpEff
  - ANNOVAR
  - functional effect
  tags:
  - genomics
  - annotation
  - vep
  - snpeff
  - annovar
  - consequence
  - impact
  aliases:
  - variant-annotate
interface:
  inputs:
    file_types:
    - csv
    artifacts:
    - kind: genomics.variant_table
      formats:
      - csv
  outputs:
    files:
    - tables/annotated_variants.csv
    - tables/impact_distribution.csv
    - report.md
    - result.json
    artifacts:
    - kind: genomics.annotated_variants
      path: tables/annotated_variants.csv
      format: csv
runtime:
  entry: variant_annotation.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
