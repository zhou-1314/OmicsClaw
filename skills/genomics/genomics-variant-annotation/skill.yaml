schema_version: 2
id: genomics-variant-annotation
name: genomics-variant-annotation
domain: genomics
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📝
summary:
  load_when: summarising functional impact of an annotated variant CSV — per-IMPACT counts (HIGH / MODERATE
    / LOW / MODIFIER), top consequences, gene-affected count
  skip_when:
  - condition: input is a raw VCF (convert with `bcftools +split-vep` first)
  - condition: calling raw variants
    use: genomics-variant-calling
  - condition: filtering VCFs
    use: genomics-vcf-operations
  trigger_keywords:
  - variant annotation
  - VEP
  - snpEff
  - ANNOVAR
  - functional effect
  tags:
  - genomics
  - annotation
  - vep
  - snpeff
  - annovar
  - consequence
  - impact
  aliases:
  - variant-annotate
interface:
  inputs:
    modalities: []
    file_types:
    - csv
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --n-variants
    hints: {}
  outputs:
    files:
    - tables/annotated_variants.csv
    - tables/impact_distribution.csv
    - report.md
    - result.json
    result_json:
      required_keys: []
runtime:
  language: python
  entry: variant_annotation.py
deps:
  python:
  - numpy
  - pandas
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
