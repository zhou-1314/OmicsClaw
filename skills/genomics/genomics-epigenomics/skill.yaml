schema_version: 2
id: genomics-epigenomics
name: genomics-epigenomics
domain: genomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🧬
summary:
  load_when: summarising a peak file (BED / narrowPeak) from ATAC-seq / ChIP-seq / CUT&Tag — peak count,
    width distribution, per-chromosome counts, score statistics
  skip_when:
  - condition: calling peaks from BAM (run MACS / Genrich externally first)
  - condition: working with single-cell ATAC
    use: scatac-preprocessing
  trigger_keywords:
  - epigenomics
  - ATAC-seq
  - ChIP-seq
  - peak calling
  - MACS
  - motif
  - chromatin
  tags:
  - genomics
  - epigenomics
  - atac-seq
  - chip-seq
  - cut-tag
  - peaks
  - macs
  - bed
  aliases:
  - epigenomics
interface:
  inputs:
    modalities:
    - atac-seq
    - chip-seq
    file_types:
    - bed
    - narrowpeak
    - csv
  outputs:
    files:
    - tables/peaks_per_chromosome.csv
    - tables/peaks_summary.csv
    - report.md
    - result.json
runtime:
  entry: genomics_epigenomics.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
