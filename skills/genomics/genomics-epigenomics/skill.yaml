schema_version: 2
id: genomics-epigenomics
name: genomics-epigenomics
domain: genomics
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🧬
summary:
  load_when: summarising a peak file (BED / narrowPeak) from ATAC-seq / ChIP-seq / CUT&Tag — peak count,
    width distribution, per-chromosome counts, score statistics
  skip_when:
  - condition: calling peaks from BAM (run MACS / Genrich externally first)
  - condition: working with single-cell ATAC
    use: scatac-preprocessing
  trigger_keywords:
  - epigenomics
  - ATAC-seq
  - ChIP-seq
  - peak calling
  - MACS
  - motif
  - chromatin
  tags:
  - genomics
  - epigenomics
  - atac-seq
  - chip-seq
  - cut-tag
  - peaks
  - macs
  - bed
  aliases:
  - epigenomics
interface:
  inputs:
    modalities:
    - atac-seq
    - chip-seq
    file_types:
    - bed
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints: {}
  outputs:
    files:
    - tables/peaks_per_chromosome.csv
    - tables/peaks_summary.csv
    - report.md
    - result.json
    result_json:
      required_keys: []
runtime:
  language: python
  entry: genomics_epigenomics.py
deps:
  python:
  - numpy
  - pandas
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
