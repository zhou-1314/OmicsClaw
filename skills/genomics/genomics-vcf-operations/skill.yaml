schema_version: 2
id: genomics-vcf-operations
name: genomics-vcf-operations
domain: genomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📋
summary:
  load_when: summarising / filtering a VCF — variant classification (SNP / MNP / INS / DEL / COMPLEX),
    Ti/Tv ratio, QUAL / DP threshold filtering, INFO-field parsing
  skip_when:
  - condition: the input is a BAM
    use: genomics-variant-calling
  - condition: adding functional annotations
    use: genomics-variant-annotation
  trigger_keywords:
  - VCF
  - bcftools
  - variant filter
  - merge VCF
  tags:
  - genomics
  - vcf
  - bcftools
  - filter
  - ti-tv
  - snv
  - indel
  aliases:
  - vcf-ops
interface:
  inputs:
    file_types:
    - vcf
    preconditions:
      content:
        vcf:
          require_fileformat_header: true
          required_columns:
          - '#CHROM'
          - POS
          - ID
          - REF
          - ALT
          - QUAL
          - FILTER
          - INFO
  outputs:
    files:
    - tables/variants.csv
    - filtered.vcf
    - report.md
    - result.json
    artifacts:
    - kind: genomics.filtered_variants
      path: filtered.vcf
      format: vcf
runtime:
  entry: genomics_vcf_operations.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  compute:
    cpu_cores: 1
    memory_mib: 1024
    gpu_devices: 0
    threads: 1
    temporary_disk_mib: 2048
