schema_version: 2
id: genomics-alignment
name: genomics-alignment
domain: genomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🎯
summary:
  load_when: computing alignment QC metrics (mapping rate, MAPQ distribution, insert size, duplicate rate,
    proper-pair rate) from a SAM or BAM file produced by any short-/long-read aligner (BWA / Bowtie2 /
    Minimap2)
  skip_when:
  - condition: running the alignment step itself
  - condition: only FASTQ-level QC is needed
    use: genomics-qc
  trigger_keywords:
  - alignment
  - BWA
  - Bowtie2
  - Minimap2
  - map reads
  tags:
  - genomics
  - alignment
  - bam
  - sam
  - bwa
  - bowtie2
  - minimap2
  aliases:
  - align
interface:
  inputs:
    file_types:
    - sam
  outputs:
    files:
    - tables/alignment_stats.csv
    - report.md
    - result.json
runtime:
  entry: genomics_alignment.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
