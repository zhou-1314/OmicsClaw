schema_version: 2
id: genomics-assembly
name: genomics-assembly
domain: genomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🧬
summary:
  load_when: computing genome-assembly QC metrics — N50/N90, L50/L90, total length, contig count, GC content,
    longest-contig — from a FASTA produced by any assembler (SPAdes / Megahit / Flye / Canu)
  skip_when:
  - condition: running the assembly itself
  - condition: assessing alignment quality
    use: genomics-alignment
  trigger_keywords:
  - genome assembly
  - de novo
  - SPAdes
  - Megahit
  - Flye
  - Canu
  tags:
  - genomics
  - assembly
  - n50
  - l50
  - contig
  - quast
  - spades
  - flye
  aliases:
  - assemble
interface:
  inputs:
    file_types:
    - fasta
    - fa
  outputs:
    files:
    - tables/assembly_metrics.csv
    - tables/contig_lengths.csv
    - report.md
    - result.json
runtime:
  entry: genome_assembly.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
