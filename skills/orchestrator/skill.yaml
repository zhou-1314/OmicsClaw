schema_version: 2
id: orchestrator
name: orchestrator
domain: orchestrator
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🎯
summary:
  load_when: routing a natural-language omics query to the correct domain skill across spatial / singlecell
    / genomics / proteomics / metabolomics / bulkrna domains via keyword / LLM / hybrid matching
  skip_when:
  - condition: the target skill is already known — invoke that skill directly
  trigger_keywords:
  - which skill
  - route query
  - what should I run
  - orchestrate
  - pipeline
  - which analysis
  tags:
  - orchestrator
  - routing
  - meta
  - multi-omics
  - registry
interface:
  outputs:
    files:
    - result.json
    - demo_report.txt
runtime:
  entry: omics_orchestrator.py
deps:
  python:
  - PyYAML
compatibility:
  platforms:
  - macos
  - linux
  - windows
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  homepage: https://github.com/OmicsClaw/OmicsClaw
