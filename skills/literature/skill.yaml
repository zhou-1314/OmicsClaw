schema_version: 2
id: literature
name: literature
domain: literature
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📄
summary:
  load_when: extracting GEO accessions, dataset metadata, and downloadable references from a scientific
    paper (PDF / URL / DOI / PubMed ID / raw text) for downstream omics analysis
  skip_when:
  - condition: the dataset is already in hand
  - condition: only routing a query
    use: orchestrator
  trigger_keywords:
  - parse paper
  - literature
  - GEO accession
  - download dataset
  - PDF extract
  - PubMed
  - DOI
  tags:
  - literature
  - pdf
  - doi
  - pubmed
  - geo
  - metadata
interface:
  inputs:
    file_types:
    - pdf
  outputs:
    files:
    - output_dir/extracted_metadata.json
    - output_dir/report.md
    - output_dir/result.json
    - <--data-dir>/<GSEid>/...
runtime:
  entry: literature_parse.py
deps:
  python:
  - requests
compatibility:
  platforms:
  - macos
  - linux
  - windows
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  homepage: https://github.com/OmicsClaw/OmicsClaw
