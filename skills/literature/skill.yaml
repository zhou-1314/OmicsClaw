schema_version: 2
id: literature
name: literature
domain: literature
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📄
summary:
  load_when: extracting GEO accessions, dataset metadata, and downloadable references from a scientific
    paper (PDF / URL / DOI / PubMed ID / raw text) for downstream omics analysis
  skip_when:
  - condition: the dataset is already in hand
  - condition: only routing a query
    use: orchestrator
  trigger_keywords:
  - parse paper
  - literature
  - GEO accession
  - download dataset
  - PDF extract
  - PubMed
  - DOI
  tags:
  - literature
  - pdf
  - doi
  - pubmed
  - geo
  - metadata
  aliases: []
interface:
  inputs:
    modalities: []
    file_types:
    - pdf
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints: {}
  outputs:
    files:
    - output_dir/extracted_metadata.json
    - output_dir/report.md
    - output_dir/result.json
    - <--data-dir>/<GSEid>/...
    result_json:
      required_keys: []
runtime:
  language: python
  entry: literature_parse.py
deps:
  python:
  - requests
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  - windows
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  homepage: https://github.com/OmicsClaw/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
