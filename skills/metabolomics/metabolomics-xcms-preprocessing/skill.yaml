schema_version: 2
id: metabolomics-xcms-preprocessing
name: metabolomics-xcms-preprocessing
domain: metabolomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 🧪
summary:
  load_when: running an XCMS-style preprocessing summary on LC-MS metabolomics raw / vendor-converted
    files — emits a peak table with m/z, retention time, and per-sample intensities
  skip_when:
  - condition: working with an already-built peak table
    use: metabolomics-peak-detection
  - condition: only annotation is needed
    use: metabolomics-annotation
  trigger_keywords:
  - xcms
  - metabolomics preprocessing
  - LC-MS
  - peak detection
  - RT alignment
  tags:
  - metabolomics
  - xcms
  - preprocessing
  - peak-detection
  - lc-ms
  - gc-ms
  - centwave
  aliases:
  - xcms-preprocess
interface:
  inputs:
    modalities:
    - lc-ms
  outputs:
    files:
    - tables/peak_table.csv
    - report.md
    - result.json
runtime:
  entry: metabolomics_xcms_preprocessing.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
