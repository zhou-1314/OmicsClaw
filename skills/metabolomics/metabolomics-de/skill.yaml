schema_version: 2
id: metabolomics-de
name: metabolomics-de
domain: metabolomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📈
summary:
  load_when: running two-group metabolomics DE (t-test + log2FC + BH-FDR + PCA) on a feature × sample
    CSV using `--group-a-prefix` / `--group-b-prefix` (default `ctrl` / `treat`)
  skip_when:
  - condition: needing tunable test backends
    use: metabolomics-statistics
  - condition: raw spectra
  trigger_keywords:
  - metabolomics differential
  - PLS-DA
  - volcano plot
  - biomarker
  - OPLS-DA
  tags:
  - metabolomics
  - de
  - ttest
  - pca
  - bh-fdr
  - biomarker
  aliases:
  - met-diff
interface:
  inputs:
    file_types:
    - csv
    artifacts:
    - kind: metabolomics.feature_matrix
      formats:
      - csv
  outputs:
    files:
    - tables/differential_features.csv
    - tables/significant_features.csv
    - figures/pca_scores.png
    - report.md
    - result.json
    artifacts:
    - kind: metabolomics.differential_results
      path: tables/differential_features.csv
      format: csv
runtime:
  entry: met_diff.py
deps:
  python:
  - matplotlib
  - numpy
  - pandas
  - scikit-learn
  - scipy
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
