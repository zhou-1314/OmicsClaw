schema_version: 2
id: metabolomics-de
name: metabolomics-de
domain: metabolomics
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📈
summary:
  load_when: running two-group metabolomics DE (t-test + log2FC + BH-FDR + PCA) on a feature × sample
    CSV using `--group-a-prefix` / `--group-b-prefix` (default `ctrl` / `treat`)
  skip_when:
  - condition: needing tunable test backends
    use: metabolomics-statistics
  - condition: raw spectra
  trigger_keywords:
  - metabolomics differential
  - PLS-DA
  - volcano plot
  - biomarker
  - OPLS-DA
  tags:
  - metabolomics
  - de
  - ttest
  - pca
  - bh-fdr
  - biomarker
  aliases:
  - met-diff
interface:
  inputs:
    modalities: []
    file_types:
    - csv
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --group-a-prefix
    - --group-b-prefix
    hints: {}
  outputs:
    files:
    - tables/differential_features.csv
    - tables/significant_features.csv
    - figures/pca_scores.png
    - report.md
    - result.json
    result_json:
      required_keys: []
runtime:
  language: python
  entry: met_diff.py
deps:
  python:
  - matplotlib
  - numpy
  - pandas
  - scikit-learn
  - scipy
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
