schema_version: 2
id: metabolomics-quantification
name: metabolomics-quantification
domain: metabolomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📏
summary:
  load_when: imputing missing values (min / median / KNN) and normalising (TIC / median / log) a feature
    × sample metabolomics CSV
  skip_when:
  - condition: only normalisation is needed
    use: metabolomics-normalization
  - condition: the input is raw spectra
    use: metabolomics-xcms-preprocessing
  trigger_keywords:
  - metabolomics quantification
  - imputation
  - feature quantification
  - missing values
  tags:
  - metabolomics
  - quantification
  - imputation
  - normalization
  - knn
  - tic
  aliases:
  - met-quantify
interface:
  inputs:
    file_types:
    - csv
  outputs:
    files:
    - tables/quantified_features.csv
    - report.md
    - result.json
runtime:
  entry: met_quantify.py
deps:
  python:
  - numpy
  - pandas
  - scikit-learn
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
