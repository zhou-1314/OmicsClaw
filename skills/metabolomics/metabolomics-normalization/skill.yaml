schema_version: 2
id: metabolomics-normalization
name: metabolomics-normalization
domain: metabolomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📐
summary:
  load_when: normalising a feature × sample metabolomics CSV via median, quantile, total (sum), PQN (probabilistic
    quotient), or log methods — emits a normalised wide-form table
  skip_when:
  - condition: also imputing
    use: metabolomics-quantification
  - condition: raw spectra
    use: metabolomics-xcms-preprocessing
  trigger_keywords:
  - metabolomics normalization
  - scaling
  - NOREVA
  - TIC normalization
  tags:
  - metabolomics
  - normalization
  - pqn
  - quantile
  - median
  - log
  aliases:
  - met-normalize
interface:
  inputs:
    file_types:
    - csv
    artifacts:
    - kind: metabolomics.peak_table
      formats:
      - csv
  outputs:
    files:
    - tables/normalized.csv
    - report.md
    - result.json
    artifacts:
    - kind: metabolomics.feature_matrix
      path: tables/normalized.csv
      format: csv
runtime:
  entry: metabolomics_normalization.py
deps:
  python:
  - numpy
  - pandas
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
