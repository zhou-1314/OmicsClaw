schema_version: 2
id: metabolomics-normalization
name: metabolomics-normalization
domain: metabolomics
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📐
summary:
  load_when: normalising a feature × sample metabolomics CSV via median, quantile, total (sum), PQN (probabilistic
    quotient), or log methods — emits a normalised wide-form table
  skip_when:
  - condition: also imputing
    use: metabolomics-quantification
  - condition: raw spectra
    use: metabolomics-xcms-preprocessing
  trigger_keywords:
  - metabolomics normalization
  - scaling
  - NOREVA
  - TIC normalization
  tags:
  - metabolomics
  - normalization
  - pqn
  - quantile
  - median
  - log
  aliases:
  - met-normalize
interface:
  inputs:
    modalities: []
    file_types:
    - csv
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --method
    hints: {}
  outputs:
    files:
    - tables/normalized.csv
    - report.md
    - result.json
    result_json:
      required_keys: []
runtime:
  language: python
  entry: metabolomics_normalization.py
deps:
  python:
  - numpy
  - pandas
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
