schema_version: 2
id: metabolomics-statistics
name: metabolomics-statistics
domain: metabolomics
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📈
summary:
  load_when: running univariate two-group testing (t-test / Wilcoxon / ANOVA / Kruskal-Wallis) on a feature
    × sample metabolomics CSV with `--group1-prefix` / `--group2-prefix` column matching, BH-FDR adjusted
  skip_when:
  - condition: working with raw spectra
    use: metabolomics-xcms-preprocessing
  - condition: two-group DE with default `ctrl` / `treat` prefixes
    use: metabolomics-de
  trigger_keywords:
  - metabolomics statistics
  - multivariate
  - PCA
  - clustering
  tags:
  - metabolomics
  - statistics
  - ttest
  - wilcoxon
  - anova
  - kruskal
  - bh-fdr
  aliases:
  - met-stat
interface:
  inputs:
    file_types:
    - csv
  outputs:
    files:
    - tables/statistics.csv
    - tables/significant.csv
    - report.md
    - result.json
runtime:
  entry: metabolomics_statistics.py
deps:
  python:
  - numpy
  - pandas
  - scipy
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
