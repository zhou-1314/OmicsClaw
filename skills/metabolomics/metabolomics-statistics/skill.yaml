schema_version: 2
id: metabolomics-statistics
name: metabolomics-statistics
domain: metabolomics
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
emoji: 📈
summary:
  load_when: running univariate two-group testing (t-test / Wilcoxon / ANOVA / Kruskal-Wallis) on a feature
    × sample metabolomics CSV with `--group1-prefix` / `--group2-prefix` column matching, BH-FDR adjusted
  skip_when:
  - condition: working with raw spectra
    use: metabolomics-xcms-preprocessing
  - condition: two-group DE with default `ctrl` / `treat` prefixes
    use: metabolomics-de
  trigger_keywords:
  - metabolomics statistics
  - multivariate
  - PCA
  - clustering
  tags:
  - metabolomics
  - statistics
  - ttest
  - wilcoxon
  - anova
  - kruskal
  - bh-fdr
  aliases:
  - met-stat
interface:
  inputs:
    modalities: []
    file_types:
    - csv
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints: {}
  outputs:
    files:
    - tables/statistics.csv
    - tables/significant.csv
    - report.md
    - result.json
    result_json:
      required_keys: []
runtime:
  language: python
  entry: metabolomics_statistics.py
deps:
  python:
  - numpy
  - pandas
  - scipy
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
