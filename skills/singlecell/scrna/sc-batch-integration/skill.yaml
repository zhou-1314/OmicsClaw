schema_version: 2
id: sc-batch-integration
name: sc-batch-integration
domain: singlecell
type: leaf
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: S
summary:
  load_when: integrating multi-sample scRNA-seq with Harmony, scVI, scANVI, BBKNN, Scanorama, SIMBA, or
    supported R-backed methods to remove batch effects
  skip_when:
  - condition: the data is one sample (no batch effect to integrate)
  - condition: upstream merging only
    use: sc-multi-count
  trigger_keywords:
  - batch integration
  - batch effect
  - harmony
  - scvi
  - bbknn
  - merge samples
  tags:
  - singlecell
  - scrna
  - batch-integration
  - harmony
  - scvi
  - scanvi
  - bbknn
  - scanorama
  - simba
  aliases:
  - sc-integrate
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints:
      harmony:
        priority: batch_key
        params:
        - batch_key
        advanced_params:
        - harmony_theta
        - integration_pcs
        defaults:
          batch_key: batch
          harmony_theta: 2.0
          integration_pcs: 50
        requires:
        - existing_PCA_or_computeable_PCA
        - harmonypy
        tips:
        - '--method harmony: Default integration path in the current wrapper.'
      scvi:
        priority: batch_key -> n_epochs -> no_gpu
        params:
        - batch_key
        - n_epochs
        advanced_params:
        - n_latent
        - no_gpu
        defaults:
          batch_key: batch
          n_epochs: 400
          n_latent: 30
          no_gpu: false
        requires:
        - scvi
        - torch
        tips:
        - '--n-epochs: Main runtime/optimization knob for scVI.'
      scanvi:
        priority: batch_key -> n_epochs -> no_gpu
        params:
        - batch_key
        - labels_key
        - n_epochs
        advanced_params:
        - n_latent
        - no_gpu
        defaults:
          batch_key: batch
          labels_key: null
          n_epochs: 200
          n_latent: 30
          no_gpu: false
        requires:
        - scvi
        - torch
        - labels_in_obs
        tips:
        - If no labels are available, the current wrapper falls back to `scvi`.
      bbknn:
        priority: batch_key
        params:
        - batch_key
        advanced_params:
        - bbknn_neighbors_within_batch
        defaults:
          batch_key: batch
          bbknn_neighbors_within_batch: 3
        requires:
        - bbknn
        - existing_PCA_or_computeable_PCA
        tips:
        - '--method bbknn: Lightweight graph correction path.'
      scanorama:
        priority: batch_key
        params:
        - batch_key
        advanced_params:
        - scanorama_knn
        defaults:
          batch_key: batch
          scanorama_knn: 20
        requires:
        - scanorama
        tips:
        - '--method scanorama: Panorama-stitching integration path.'
      fastmnn:
        priority: batch_key
        params:
        - batch_key
        advanced_params:
        - integration_features
        - integration_pcs
        defaults:
          batch_key: batch
          integration_features: 2000
          integration_pcs: 30
        requires:
        - R_batchelor_stack
        tips:
        - '--method fastmnn: R-backed batchelor fastMNN path via the shared H5AD bridge.'
      seurat_cca:
        priority: batch_key
        params:
        - batch_key
        advanced_params:
        - integration_features
        - integration_pcs
        defaults:
          batch_key: batch
          integration_features: 2000
          integration_pcs: 30
        requires:
        - R_Seurat_stack
        tips:
        - '--method seurat_cca: R-backed Seurat CCA integration path via the shared H5AD bridge.'
      seurat_rpca:
        priority: batch_key
        params:
        - batch_key
        advanced_params:
        - integration_features
        - integration_pcs
        defaults:
          batch_key: batch
          integration_features: 2000
          integration_pcs: 30
        requires:
        - R_Seurat_stack
        tips:
        - '--method seurat_rpca: R-backed Seurat RPCA integration path via the shared H5AD bridge.'
  outputs:
    files:
    - tables/batch_mixing_matrix.csv
    - tables/batch_sizes.csv
    - tables/cell_metadata.csv
    - tables/cluster_sizes.csv
    - tables/embedding.csv
    - tables/integration_metrics.csv
    - tables/integration_summary.csv
    - tables/obs.csv
    - tables/umap.csv
    - tables/umap_points.csv
    - figures/batch_mixing_heatmap.png
    - figures/integration_metrics.png
    - figures/r_embedding_discrete.png
    - analysis_summary.txt
    - input.h5ad
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm:
      - X_<method>
      - X_pca
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_integrate.py
deps:
  python:
  - anndata
  - bbknn
  - harmonypy
  - matplotlib
  - numpy
  - pandas
  - phate
  - scanorama
  - scanpy
  - scikit-learn
  - scipy
  - scvi-tools
  - seaborn
  - simba-bio
  - torch
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
  homepage: https://github.com/OmicsClaw/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
