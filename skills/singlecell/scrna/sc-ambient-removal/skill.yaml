schema_version: 2
id: sc-ambient-removal
name: sc-ambient-removal
domain: singlecell
type: leaf
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: S
summary:
  load_when: removing ambient RNA contamination from droplet-based scRNA-seq using a simple subtraction
    path, CellBender, or SoupX
  skip_when:
  - condition: the contamination is multiplet barcodes
    use: sc-doublet-detection
  - condition: before counts exist
    use: sc-count
  trigger_keywords:
  - ambient RNA
  - ambient removal
  - cellbender
  - contamination
  - background RNA
  tags:
  - singlecell
  - scrna
  - ambient
  - cellbender
  - soupx
  - contamination
  aliases: []
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints:
      simple:
        priority: contamination
        params:
        - contamination
        defaults:
          contamination: 0.05
        requires:
        - count_like_expression_in_layers_counts_or_raw_or_X
        - scanpy
        tips:
        - '--method simple: Python fallback that subtracts a global ambient profile from the best available
          raw-count-like matrix.'
        - '--contamination: Wrapper-level contamination fraction used directly in the subtraction formula
          after scaling by each barcode''s library size.'
      cellbender:
        priority: raw_h5 -> expected_cells
        params:
        - raw_h5
        - expected_cells
        defaults:
          expected_cells: input_n_obs_or_required_without_input
        requires:
        - cellbender
        - 10x_raw_h5
        tips:
        - '--raw-h5: Required for the CellBender path.'
        - '--expected-cells: Main CellBender size prior; strongly recommended and required when no separate
          --input is provided.'
      soupx:
        priority: raw_matrix_dir -> filtered_matrix_dir
        params:
        - raw_matrix_dir
        - filtered_matrix_dir
        defaults: {}
        requires:
        - SoupX_ready_R_environment
        - 10x_raw_and_filtered_matrix_dirs
        tips:
        - '--method soupx: Requires both raw and filtered 10x matrix directories.'
        - If the required SoupX inputs are missing, OmicsClaw falls back to `simple`.
  outputs:
    files:
    - tables/cell_metadata.csv
    - tables/cellbender_output_cell_barcodes.csv
    - tables/cellbender_output_metrics.csv
    - tables/cells.csv
    - tables/corrected_counts.csv
    - tables/correction_summary.csv
    - tables/gene_expression.csv
    - tables/genes.csv
    - figures/barcode_rank.png
    - figures/count_distribution.png
    - figures/counts_comparison.png
    - figures/r_ambient_violin.png
    - README.md
    - analysis_summary.txt
    - cellbender_output_report.html
    - contamination.json
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm: []
      var: []
      layers:
      - counts
      uns:
      - ambient_correction
      - soupx
      - cellbender
runtime:
  language: python
  entry: sc_ambient.py
deps:
  python:
  - anndata
  - cellbender
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - torch
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  homepage: https://github.com/OmicsClaw/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
