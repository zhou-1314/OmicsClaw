schema_version: 2
id: sc-differential-abundance
name: sc-differential-abundance
domain: singlecell
type: leaf
version: 0.2.0
author: OmicsClaw
license: MIT
summary:
  load_when: testing whether cell-type / cluster proportions or neighbourhood densities differ between
    conditions in a multi-sample scRNA AnnData via Milo, scCODA, simple proportion screen, or R Monte-Carlo
    permutation
  skip_when:
  - condition: ranking marker genes
    use: sc-markers
  - condition: per-cell DE
    use: sc-de
  trigger_keywords: []
  tags:
  - singlecell
  - scrna
  - differential-abundance
  - compositional
  - milo
  - sccoda
  - proportion-test
  aliases:
  - sc-da
  - sc-compositional
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --cell-type-key
    - --condition-key
    - --contrast
    - --fdr
    - --method
    - --min-count
    - --n-neighbors
    - --n-permutations
    - --prop
    - --r-enhanced
    - --reference-cell-type
    - --sample-key
    hints: {}
  outputs:
    files:
    - tables/cell_meta.csv
    - tables/cell_metadata.csv
    - tables/condition_mean_proportions.csv
    - tables/milo_nhood_results.csv
    - tables/proportion_test_results.csv
    - tables/sample_by_celltype_counts.csv
    - tables/sample_by_celltype_proportions.csv
    - tables/sccoda_effects.csv
    - tables/simple_da_results.csv
    - figures/milo_logfc_barplot.png
    - figures/proportion_test_r_no_results.png
    - figures/r_cell_barplot.png
    - figures/r_cell_density.png
    - figures/r_embedding_discrete.png
    - figures/r_proportion_test.png
    - figures/sample_celltype_proportions.png
    - figures/sccoda_log2fc_barplot.png
    - analysis_summary.txt
    - annotated_input.h5ad
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm: []
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_differential_abundance.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - pertpy
  - scanpy
  - sccoda
  - scipy
  - seaborn
  - statsmodels
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
