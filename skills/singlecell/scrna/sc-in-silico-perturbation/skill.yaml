schema_version: 2
id: sc-in-silico-perturbation
name: sc-in-silico-perturbation
domain: singlecell
type: leaf
version: 0.2.0
author: OmicsClaw
license: MIT
summary:
  load_when: predicting in-silico gene knockout effects on a normalised scRNA AnnData via GRN-based propagation
    (Python) or scTenifoldKnk (R)
  skip_when:
  - condition: you have a real Perturb-seq / CRISPR screen
    use: sc-perturb
  - condition: predicting drug sensitivity
    use: sc-drug-response
  trigger_keywords: []
  tags:
  - singlecell
  - scrna
  - in-silico-perturbation
  - knockout
  - grn
  - sctenifoldknk
  aliases:
  - sc-tenifold-knockout
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints: {}
  outputs:
    files:
    - tables/cell_metadata.csv
    - tables/de_top_markers.csv
    - tables/diff_regulation.csv
    - tables/matrix.csv
    - tables/tenifold_diff_regulation.csv
    - figures/pvalue_distribution.png
    - figures/r_isp_volcano.png
    - figures/top_perturbed_genes.png
    - analysis_summary.txt
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm: []
      var:
      - perturbation_dr_score
      - perturbation_p_adj
      - perturbation_FC
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_in_silico_perturbation.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - statsmodels
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
