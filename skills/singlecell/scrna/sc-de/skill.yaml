schema_version: 2
id: sc-de
name: sc-de
domain: singlecell
type: leaf
version: 0.6.0
author: OmicsClaw
license: MIT
emoji: S
summary:
  load_when: finding marker genes per cluster or comparing condition expression in single-cell RNA-seq
  skip_when:
  - condition: the data is bulk
    use: bulkrna-de
  - condition: spatial
    use: spatial-de
  - condition: cluster-only markers without conditions
    use: sc-markers
  trigger_keywords:
  - differential expression
  - marker genes
  - de analysis
  - wilcoxon
  - pseudo-bulk
  tags:
  - singlecell
  - differential-expression
  - markers
  - wilcoxon
  - deseq2
  aliases: []
interface:
  inputs:
    modalities: []
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints:
      wilcoxon:
        priority: groupby -> n_top_genes -> group1/group2
        params:
        - groupby
        - n_top_genes
        - group1
        - group2
        advanced_params:
        - padj_threshold
        - log2fc_threshold
        defaults:
          groupby: leiden
          n_top_genes: 10
          padj_threshold: 0.05
          log2fc_threshold: 1.0
        requires:
        - preprocessed_anndata
        - scanpy
        tips:
        - '--method wilcoxon: Default exploratory marker-ranking path.'
      t-test:
        priority: groupby -> n_top_genes -> group1/group2
        params:
        - groupby
        - n_top_genes
        - group1
        - group2
        advanced_params:
        - padj_threshold
        - log2fc_threshold
        defaults:
          groupby: leiden
          n_top_genes: 10
          padj_threshold: 0.05
          log2fc_threshold: 1.0
        requires:
        - preprocessed_anndata
        - scanpy
        tips:
        - '--method t-test: Parametric alternative to Wilcoxon.'
      logreg:
        priority: groupby -> logreg_solver -> n_top_genes
        params:
        - groupby
        - logreg_solver
        - n_top_genes
        advanced_params:
        - padj_threshold
        - log2fc_threshold
        defaults:
          groupby: leiden
          logreg_solver: lbfgs
          n_top_genes: 10
          padj_threshold: 0.05
          log2fc_threshold: 1.0
        requires:
        - preprocessed_anndata
        - scanpy
        tips:
        - '--method logreg: Logistic-regression ranking, useful when you want genes that best separate
          one group from the others.'
      mast:
        priority: groupby -> group1/group2 -> n_top_genes
        params:
        - groupby
        - group1
        - group2
        - n_top_genes
        advanced_params:
        - padj_threshold
        - log2fc_threshold
        defaults:
          groupby: leiden
          n_top_genes: 10
          padj_threshold: 0.05
          log2fc_threshold: 1.0
        requires:
        - R_MAST_stack
        - log_normalized_expression_matrix
        tips:
        - '--method mast: R-backed MAST hurdle-model path on log-normalized expression.'
      deseq2_r:
        priority: groupby -> group1/group2 -> sample_key -> celltype_key
        params:
        - groupby
        - group1
        - group2
        - sample_key
        - celltype_key
        advanced_params:
        - pseudobulk_min_cells
        - pseudobulk_min_counts
        - padj_threshold
        - log2fc_threshold
        defaults:
          sample_key: sample_id
          celltype_key: cell_type
          pseudobulk_min_cells: 10
          pseudobulk_min_counts: 1000
          padj_threshold: 0.05
          log2fc_threshold: 1.0
        requires:
        - raw_counts_or_raw_layer
        - biological_replicates
        - R_DESeq2_stack
        tips:
        - '--method deseq2_r: Sample-aware pseudobulk path.'
        - --group1 and --group2 are required for the DESeq2 path.
  outputs:
    files:
    - tables/counts.csv
    - tables/de_full.csv
    - tables/de_group_summary.csv
    - tables/de_top_markers.csv
    - tables/deseq2_results.csv
    - tables/gene_expression.csv
    - tables/markers_top.csv
    - tables/mast_results.csv
    - tables/metadata.csv
    - tables/pseudobulk_summary.csv
    - figures/marker_dotplot.png
    - figures/pseudobulk_group_summary.png
    - figures/r_de_heatmap.png
    - figures/r_de_manhattan.png
    - figures/r_de_volcano.png
    - figures/r_feature_cor.png
    - figures/r_feature_violin.png
    - figures/rank_genes_groups.png
    - input.h5ad
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm: []
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_de.py
deps:
  python:
  - adjustText
  - anndata
  - matplotlib
  - numpy
  - pandas
  - pydeseq2
  - scanpy
  - scipy
  - seaborn
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
  homepage: https://github.com/OmicsClaw/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
