schema_version: 2
id: sc-perturb
name: sc-perturb
domain: singlecell
type: leaf
version: 0.2.0
author: OmicsClaw
license: MIT
summary:
  load_when: classifying perturbed vs non-perturbed cells in a Perturb-seq / CRISPR-screen scRNA AnnData
    via the pertpy Mixscape workflow
  skip_when:
  - condition: guide labels are not yet attached to the expression object
    use: sc-perturb-prep
  - condition: in-silico KO predictions on unperturbed data
    use: sc-in-silico-perturbation
  trigger_keywords: []
  tags:
  - singlecell
  - scrna
  - perturbation
  - perturb-seq
  - crispr
  - mixscape
  - pertpy
  aliases: []
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints: {}
  outputs:
    files:
    - tables/cell_metadata.csv
    - tables/cell_type_counts.csv
    - tables/mixscape_cell_classes.csv
    - tables/mixscape_class_counts.csv
    - tables/mixscape_global_class_counts.csv
    - tables/mixscape_global_classes.csv
    - figures/mixscape_global_classes.png
    - figures/r_perturbation_barplot.png
    - analysis_summary.txt
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs:
      - mixscape_class
      - mixscape_class_global
      - mixscape_class_p_<lower(perturbation_type)>
      obsm: []
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_perturb.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - packaging
  - pandas
  - pertpy
  - scanpy
  - scipy
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
