schema_version: 2
id: sc-cell-communication
name: sc-cell-communication
domain: singlecell
type: leaf
version: 0.4.0
author: OmicsClaw
license: MIT
emoji: S
summary:
  load_when: computing cell-cell ligand-receptor communication on an annotated scRNA AnnData via builtin
    scorer, LIANA, CellPhoneDB, CellChat (R), or NicheNet (R)
  skip_when:
  - condition: assigning cell-type labels
    use: sc-cell-annotation
  - condition: transcription factor → target regulatory networks
    use: sc-grn
  trigger_keywords:
  - cell communication
  - cell-cell communication
  - ligand receptor
  - cellchat
  - liana
  - cellphonedb
  - nichenet
  tags:
  - singlecell
  - scrna
  - cell-communication
  - ligand-receptor
  - liana
  - cellphonedb
  - cellchat
  - nichenet
  aliases: []
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --cell-type-key
    - --cellchat-min-cells
    - --cellchat-prob-type
    - --cellphonedb-counts-data
    - --cellphonedb-iterations
    - --cellphonedb-pvalue
    - --cellphonedb-threshold
    - --cellphonedb-threads
    - --condition-key
    - --condition-oi
    - --condition-ref
    - --method
    - --nichenet-lfc-cutoff
    - --nichenet-expression-pct
    - --nichenet-top-ligands
    - --receiver
    - --senders
    - --species
    - --r-enhanced
    hints:
      builtin:
        priority: cell_type_key -> species
        params:
        - cell_type_key
        - species
        defaults:
          cell_type_key: cell_type
          species: human
        requires:
        - normalized_expression
        - cell_type_labels_in_obs
        tips:
        - '--method builtin: Lightweight heuristic baseline. Good for a quick preview, but not a statistical
          communication test.'
      liana:
        priority: cell_type_key -> species
        params:
        - cell_type_key
        - species
        defaults:
          cell_type_key: cell_type
          species: human
        requires:
        - normalized_expression
        - liana
        - cell_type_labels_in_obs
        tips:
        - '--method liana: Best first rich backend in the current wrapper.'
      cellphonedb:
        priority: cell_type_key -> species
        params:
        - cell_type_key
        - species
        advanced_params:
        - cellphonedb_threshold
        - cellphonedb_iterations
        - cellphonedb_pvalue
        - cellphonedb_threads
        - cellphonedb_counts_data
        defaults:
          cell_type_key: cell_type
          species: human
          cellphonedb_counts_data: hgnc_symbol
          cellphonedb_iterations: 1000
          cellphonedb_threshold: 0.1
          cellphonedb_threads: 4
          cellphonedb_pvalue: 0.05
        requires:
        - normalized_expression
        - cellphonedb
        - cell_type_labels_in_obs
        - human_species
        tips:
        - '--method cellphonedb: Uses the official CellPhoneDB statistical backend exposed by the current
          wrapper.'
        - --cellphonedb-threshold and --cellphonedb-iterations are the main public CellPhoneDB tuning
          knobs in OmicsClaw.
      cellchat_r:
        priority: cell_type_key -> species
        params:
        - cell_type_key
        - species
        advanced_params:
        - cellchat_prob_type
        - cellchat_min_cells
        defaults:
          cell_type_key: cell_type
          species: human
          cellchat_prob_type: triMean
          cellchat_min_cells: 10
        requires:
        - normalized_expression
        - R_CellChat_stack
        - cell_type_labels_in_obs
        tips:
        - '--method cellchat_r: R-backed CellChat path with pathway and centrality outputs.'
      nichenet_r:
        priority: cell_type_key -> condition_key -> receiver -> senders
        params:
        - cell_type_key
        - condition_key
        - condition_oi
        - condition_ref
        - receiver
        - senders
        advanced_params:
        - nichenet_top_ligands
        - nichenet_expression_pct
        - nichenet_lfc_cutoff
        - species
        defaults:
          cell_type_key: cell_type
          condition_key: condition
          condition_oi: stim
          condition_ref: ctrl
          receiver: ''
          senders: ''
          nichenet_top_ligands: 20
          nichenet_expression_pct: 0.1
          nichenet_lfc_cutoff: 0.25
          species: human
        requires:
        - raw_counts_available
        - R_nichenetr_stack
        - cell_type_labels_in_obs
        - condition_labels_in_obs
        - human_species
        tips:
        - '--method nichenet_r: R-backed NicheNet ligand prioritization path.'
        - --receiver and --senders are required because NicheNet needs explicit receiver and sender cell
          types.
        - --nichenet-lfc-cutoff changes the receiver-side DE genes used as the target program.
  outputs:
    files:
    - tables/_matrix.csv
    - tables/cellchat_centrality.csv
    - tables/cellchat_count_matrix.csv
    - tables/cellchat_pathways.csv
    - tables/cellchat_results.csv
    - tables/cellchat_weight_matrix.csv
    - tables/cellphonedb_means.csv
    - tables/cellphonedb_pvalues.csv
    - tables/cellphonedb_significant_means.csv
    - tables/group_role_summary.csv
    - tables/lr_interactions.csv
    - tables/meta.tsv
    - tables/nichenet_ligand_activities.csv
    - tables/nichenet_ligand_receptors.csv
    - tables/nichenet_ligand_target_links.csv
    - tables/nichenet_lr_network.csv
    - tables/pathway_summary.csv
    - tables/sender_receiver_summary.csv
    - tables/top_interactions.csv
    - figures/r_ccc_bipartite.png
    - figures/r_ccc_bubble.png
    - figures/r_ccc_diff_network.png
    - figures/r_ccc_heatmap.png
    - figures/r_ccc_network.png
    - figures/r_ccc_stat_bar.png
    - figures/r_ccc_stat_scatter.png
    - figures/r_ccc_stat_violin.png
    - input.h5ad
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm: []
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_cell_communication.py
deps:
  python:
  - anndata
  - cellphonedb
  - liana
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - seaborn
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
  homepage: https://github.com/OmicsClaw/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
