schema_version: 2
id: sc-integrate-cluster
name: sc-integrate-cluster
domain: singlecell
type: leaf
version: 0.1.0
author: OmicsClaw
license: MIT
summary:
  load_when: running a single batch-correction representation (none/Harmony/Scanorama/scVI) + clustering
    of single-cell data as one self-contained unit — normally fanned out as a member of sc-consensus-integration
  skip_when:
  - condition: you want the full integration consensus
    use: sc-consensus-integration
  - condition: resolution-robust clustering
    use: sc-consensus-clustering
  trigger_keywords: []
  tags:
  - singlecell
  - scrna
  - integration
  - clustering
  - consensus
  aliases: []
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints:
      default:
        priority: method -> batch_key -> resolution
        params:
        - method
        - batch_key
        - resolution
        advanced_params:
        - cluster_method
        - n_neighbors
        - n_pcs
        defaults:
          method: none
          batch_key: batch
          cluster_method: leiden
          resolution: 1.0
          n_neighbors: 15
          n_pcs: 50
        requires:
        - normalized_expression
        - batch_key
        tips:
        - 'A consensus member: `--method` selects the batch-correction backend; `none` is the unintegrated
          X_pca baseline.'
        - scVI is GPU/stochastic — include it only when reproducible-within-tolerance is acceptable, and
          serialise GPU members.
  outputs:
    files:
    - figure_data/embedding_points.csv
    - figure_data/clustering_summary.csv
    - processed.h5ad
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm:
      - X_pca
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_integrate_cluster.py
deps:
  python:
  - anndata
  - harmonypy
  - matplotlib
  - numpy
  - pandas
  - scanorama
  - scanpy
  - scikit-learn
  - seaborn
  - torch
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
