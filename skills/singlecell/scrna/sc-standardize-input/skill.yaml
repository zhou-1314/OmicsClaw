schema_version: 2
id: sc-standardize-input
name: sc-standardize-input
domain: singlecell
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: 🧱
summary:
  load_when: an external single-cell h5ad/h5/loom/mtx needs to be canonicalised onto the OmicsClaw AnnData
    contract before downstream scRNA skills run
  skip_when:
  - condition: data already came from sc-count (already canonical)
  - condition: bulk RNA-seq
    use: bulkrna-qc
  - condition: spatial
    use: spatial-preprocess
  trigger_keywords:
  - standardize AnnData
  - fix scRNA input
  - canonicalize single-cell input
  - prepare AnnData
  - input contract
  tags:
  - singlecell
  - scrna
  - input
  - standardization
  - anndata
interface:
  inputs:
    path_kinds:
    - file
    - directory
    modalities:
    - scrna
    file_types:
    - h5ad
    - h5
    - loom
    - csv
    - tsv
  outputs:
    files:
    - tables/cell_metadata.csv
    - analysis_summary.txt
    - processed.h5ad
    - report.md
    - result.json
    anndata:
      saves_h5ad: true
      layers:
      - counts
runtime:
  entry: sc_standardize_input.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
