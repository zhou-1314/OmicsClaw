schema_version: 2
id: sc-perturb-prep
name: sc-perturb-prep
domain: singlecell
version: 0.2.0
author: OmicsClaw
license: MIT
summary:
  load_when: attaching cell-barcode → sgRNA assignments from a mapping TSV/CSV onto a Perturb-seq expression
    AnnData, producing standardised perturbation / sgRNA / target-gene obs columns
  skip_when:
  - condition: the AnnData already has perturbation labels
    use: sc-perturb
  - condition: raw guide-calling from FASTQ (use upstream demuxlet / cellranger guide pipelines)
  tags:
  - singlecell
  - scrna
  - perturb-prep
  - perturb-seq
  - crispr
  - sgrna-assignment
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    - h5
    - tsv
    - csv
  outputs:
    files:
    - tables/assignment_status_counts.csv
    - tables/cell_metadata.csv
    - tables/dropped_multi_guide_cells.csv
    - tables/feature_type_summary.csv
    - tables/perturbation_assignments.csv
    - tables/perturbation_counts.csv
    - figures/perturbation_counts.png
    - analysis_summary.txt
    - processed.h5ad
    - report.md
    - result.json
    anndata:
      saves_h5ad: true
      obs:
      - perturbation
      - sgRNA
      - target_gene
      - assignment_status
      - n_sgrnas
runtime:
  entry: sc_perturb_prep.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - packaging
  - pandas
  - pertpy
  - scanpy
  - scipy
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
