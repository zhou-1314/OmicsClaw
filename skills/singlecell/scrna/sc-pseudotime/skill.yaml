schema_version: 2
id: sc-pseudotime
name: sc-pseudotime
domain: singlecell
type: leaf
version: 0.5.0
author: OmicsClaw
license: MIT
summary:
  load_when: ordering cells along a developmental trajectory in a normalised scRNA AnnData via DPT, Palantir,
    VIA, CellRank, Slingshot (R), or Monocle3 (R)
  skip_when:
  - condition: ranking marker genes per cluster
    use: sc-markers
  - condition: RNA velocity vector fields
    use: sc-velocity
  trigger_keywords:
  - pseudotime
  - trajectory
  - lineage
  - diffusion pseudotime
  - palantir
  - via
  - cellrank
  - monocle3
  - slingshot
  tags:
  - singlecell
  - scrna
  - pseudotime
  - trajectory
  - dpt
  - palantir
  - via
  - cellrank
  - slingshot
  - monocle3
  aliases: []
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --method
    - --cluster-key
    - --use-rep
    - --root-cluster
    - --root-cell
    - --end-clusters
    - --n-neighbors
    - --n-pcs
    - --n-dcs
    - --n-genes
    - --corr-method
    - --palantir-knn
    - --palantir-n-components
    - --palantir-num-waypoints
    - --palantir-max-iterations
    - --palantir-seed
    - --via-knn
    - --via-seed
    - --cellrank-n-states
    - --cellrank-schur-components
    - --cellrank-frac-to-keep
    - --cellrank-use-velocity
    - --r-enhanced
    hints:
      dpt:
        priority: cluster_key -> use_rep -> root_cluster/root_cell
        params:
        - cluster_key
        - use_rep
        - root_cluster
        - root_cell
        advanced_params:
        - n_neighbors
        - n_pcs
        - n_dcs
        - n_genes
        - corr_method
        defaults:
          cluster_key: leiden
          n_neighbors: 15
          n_pcs: 50
          n_dcs: 10
          n_genes: 50
          corr_method: pearson
        requires:
        - normalized_expression
        - cluster_labels_in_obs
        - trajectory_representation
      palantir:
        priority: cluster_key -> use_rep -> root_cluster/root_cell
        params:
        - cluster_key
        - use_rep
        - root_cluster
        - root_cell
        advanced_params:
        - palantir_knn
        - palantir_n_components
        - palantir_num_waypoints
        - palantir_max_iterations
        - palantir_seed
        - n_genes
        - corr_method
        defaults:
          cluster_key: leiden
          palantir_knn: 30
          palantir_n_components: 10
          palantir_num_waypoints: 1200
          palantir_max_iterations: 25
          palantir_seed: 20
          n_genes: 50
          corr_method: pearson
        requires:
        - normalized_expression
        - palantir
        - explicit_root_choice
      via:
        priority: cluster_key -> use_rep -> root_cluster/root_cell
        params:
        - cluster_key
        - use_rep
        - root_cluster
        - root_cell
        advanced_params:
        - via_knn
        - via_seed
        - n_genes
        - corr_method
        defaults:
          cluster_key: leiden
          via_knn: 30
          via_seed: 20
          n_genes: 50
          corr_method: pearson
        requires:
        - normalized_expression
        - pyVIA
        - explicit_root_choice
      cellrank:
        priority: cluster_key -> use_rep -> root_cluster/root_cell -> cellrank_n_states
        params:
        - cluster_key
        - use_rep
        - root_cluster
        - root_cell
        - cellrank_n_states
        advanced_params:
        - cellrank_schur_components
        - cellrank_frac_to_keep
        - cellrank_use_velocity
        - n_genes
        - corr_method
        defaults:
          cluster_key: leiden
          cellrank_n_states: 3
          cellrank_schur_components: 20
          cellrank_frac_to_keep: 0.3
          cellrank_use_velocity: false
          n_genes: 50
          corr_method: pearson
        requires:
        - normalized_expression
        - cellrank
        - explicit_root_choice
      slingshot_r:
        priority: cluster_key -> use_rep -> root_cluster -> end_clusters
        params:
        - cluster_key
        - use_rep
        - root_cluster
        - end_clusters
        advanced_params:
        - n_genes
        - corr_method
        defaults:
          cluster_key: leiden
          end_clusters: null
          n_genes: 50
          corr_method: pearson
        requires:
        - normalized_expression
        - slingshot
        - SingleCellExperiment
        - zellkonverter
        - explicit_root_choice
      monocle3_r:
        priority: cluster_key -> use_rep -> root_cluster
        params:
        - cluster_key
        - use_rep
        - root_cluster
        advanced_params:
        - n_genes
        - corr_method
        defaults:
          cluster_key: leiden
          root_cluster: null
          n_genes: 50
          corr_method: pearson
        requires:
        - normalized_expression
        - monocle3
        - SingleCellExperiment
        - zellkonverter
  outputs:
    files:
    - tables/cell_metadata.csv
    - tables/fate_probabilities.csv
    - tables/gene_expression.csv
    - tables/monocle3_pseudotime.csv
    - tables/monocle3_trajectory.csv
    - tables/pseudotime_cells.csv
    - tables/pseudotime_points.csv
    - tables/slingshot_branches.csv
    - tables/slingshot_curves.csv
    - tables/slingshot_pseudotime.csv
    - tables/trajectory_genes.csv
    - tables/trajectory_summary.csv
    - figures/monocle3_trajectory_graph.png
    - figures/r_cell_density.png
    - figures/r_embedding_discrete.png
    - figures/r_embedding_feature.png
    - figures/r_pseudotime_dynamic.png
    - figures/r_pseudotime_heatmap.png
    - figures/r_pseudotime_lineage.png
    - analysis_summary.txt
    - input.h5ad
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs:
      - pseudotime
      obsm:
      - trajectory_fate_probabilities
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_pseudotime.py
deps:
  python:
  - anndata
  - cellrank
  - matplotlib
  - numpy
  - palantir
  - pandas
  - pyVIA
  - scanpy
  - scipy
  - scvelo
  - seaborn
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
