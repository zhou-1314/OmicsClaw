schema_version: 2
id: sc-gene-programs
name: sc-gene-programs
domain: singlecell
version: 0.2.0
author: OmicsClaw
license: MIT
summary:
  load_when: extracting gene programs (NMF / cNMF factorisation) and per-cell program usage scores from
    a non-negative scRNA AnnData
  skip_when:
  - condition: ranking marker genes per cluster
    use: sc-markers
  - condition: inferring TF → target regulons
    use: sc-grn
  tags:
  - singlecell
  - scrna
  - gene-programs
  - nmf
  - cnmf
  - factorisation
  aliases:
  - sc-programs
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
  outputs:
    files:
    - tables/cell_metadata.csv
    - tables/gene_expression.csv
    - tables/program_correlation.csv
    - tables/program_tpm.csv
    - tables/program_usage.csv
    - tables/program_weights.csv
    - tables/top_program_genes.csv
    - figures/mean_program_usage.png
    - figures/program_correlation.png
    - figures/r_feature_cor.png
    - figures/r_feature_violin.png
    - analysis_summary.txt
    - processed.h5ad
    - report.md
    - result.json
    anndata:
      saves_h5ad: true
      obsm:
      - X_gene_programs
runtime:
  entry: sc_gene_programs.py
deps:
  python:
  - anndata
  - cnmf
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scikit-learn
  - scipy
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
