domain: singlecell
type: workflow  # thin shim over omicsclaw.runtime.consensus.run (ADR 0016/0030)
legacy_aliases: []
allowed_extra_flags:
- --members
- --integration-methods
- --resolution
- --batch-key
- --include-scvi
- --all
- --confirm-plan
- --non-interactive
- --alpha
- --beta
- --max-class-frac
- --operator
- --seed
- --timeout
- --max-parallel
- --top-k
- --run-id
saves_h5ad: false
requires:
  bins:
  - python3
  env: []
  config: []
emoji: 🧬
homepage: https://github.com/OmicsClaw/OmicsClaw
os:
- linux
- macos
install: []
trigger_keywords:
- consensus integration
- batch correction consensus
- integration method consensus
- robust scrna integration clustering
- which clusters survive integration
script: sc_consensus_integration.py
param_hints:
  default:
    params:
    - integration_methods
    - resolution
    - batch_key
    defaults:
      integration_methods: none,harmony,scanorama
      resolution: 1.0
      batch_key: batch
    tips:
    - 'Members are integration backends; `none` is the unintegrated X_pca baseline that exposes batch-artifact clusters.'
    - 'Add `--include-scvi` for the GPU/stochastic scVI member; serialise GPU members with `--max-parallel 1`.'
requires_preprocessed: true
