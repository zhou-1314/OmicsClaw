schema_version: 2
id: sc-drug-response
name: sc-drug-response
domain: singlecell
version: 0.2.0
author: OmicsClaw
license: MIT
summary:
  load_when: scoring drug sensitivity per cluster on an annotated scRNA AnnData via simple-correlation
    against drug-target signatures or via CaDRReS-Sc pretrained models (GDSC / PRISM)
  skip_when:
  - condition: the AnnData has no cluster labels yet
    use: sc-clustering
  - condition: predicting genetic-perturbation effects
    use: sc-in-silico-perturbation
  tags:
  - singlecell
  - scrna
  - drug-response
  - pharmacogenomics
  - cadrres
  - gdsc
  - prism
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
  outputs:
    files:
    - tables/IC50_prediction.csv
    - tables/PRISM_prediction.csv
    - tables/cell_metadata.csv
    - tables/drug_rankings.csv
    - tables/masked_drugs.csv
    - figures/drug_cluster_heatmap.png
    - figures/drug_sensitivity_umap.png
    - figures/top_drugs_bar.png
    - analysis_summary.txt
    - processed.h5ad
    - report.md
    - result.json
    anndata:
      saves_h5ad: true
      obs:
      - drug_score_<drug>
runtime:
  entry: sc_drug_response.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - omicverse
  - pandas
  - scanpy
  - scipy
  - seaborn
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  tests: tests/
