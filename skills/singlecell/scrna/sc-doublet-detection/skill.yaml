schema_version: 2
id: sc-doublet-detection
name: sc-doublet-detection
domain: singlecell
type: leaf
version: 0.3.0
author: OmicsClaw
license: MIT
summary:
  load_when: annotating putative doublets in single-cell RNA-seq using Scrublet, DoubletDetection, DoubletFinder,
    scDblFinder, or scds
  skip_when:
  - condition: ambient RNA is the contamination problem
    use: sc-ambient-removal
  - condition: before counts exist
    use: sc-fastq-qc
  trigger_keywords: []
  tags:
  - singlecell
  - scrna
  - doublet
  - scrublet
  - doubletfinder
  - scdblfinder
  aliases:
  - sc-doublet
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints:
      scrublet:
        priority: expected_doublet_rate -> batch_key
        params:
        - expected_doublet_rate
        - batch_key
        advanced_params:
        - threshold
        defaults:
          expected_doublet_rate: 0.06
          threshold: auto
        requires:
        - scrublet
        - raw_count_like_input
        tips:
        - '--method scrublet: default Python-native path.'
        - '--batch-key: useful when captures/samples are mixed and Scrublet should run per batch.'
        - '--threshold: manual cutoff overriding Scrublet''s automatic call.'
      doubletdetection:
        priority: doubletdetection_n_iters
        params:
        - doubletdetection_n_iters
        - doubletdetection_standard_scaling
        defaults:
          doubletdetection_n_iters: 10
          doubletdetection_standard_scaling: false
        requires:
        - doubletdetection
        - raw_count_like_input
        tips:
        - '--method doubletdetection: consensus Python path borrowed from SCOP''s method surface.'
        - The current wrapper records expected_doublet_rate for context, but the native DoubletDetection
          classifier does not use it directly.
      doubletfinder:
        priority: expected_doublet_rate
        params:
        - expected_doublet_rate
        defaults:
          expected_doublet_rate: 0.06
        requires:
        - R_doubletfinder_stack
        tips:
        - '--method doubletfinder: R-backed Seurat path.'
        - If the R runtime fails, the wrapper falls back to scDblFinder and reports both methods.
      scdblfinder:
        priority: expected_doublet_rate
        params:
        - expected_doublet_rate
        defaults:
          expected_doublet_rate: 0.06
        requires:
        - R_scdblfinder_stack
        tips:
        - '--method scdblfinder: fast Bioconductor path with a compact wrapper surface.'
      scds:
        priority: expected_doublet_rate -> scds_mode
        params:
        - expected_doublet_rate
        - scds_mode
        defaults:
          expected_doublet_rate: 0.06
          scds_mode: cxds
        requires:
        - R_scds_stack
        tips:
        - '--method scds: Bioconductor score family from SCOP.'
        - --scds-mode chooses which score (`hybrid`, `cxds`, or `bcds`) becomes the public call surface.
        - In the current environment, `cxds` is the safest first-pass default.
  outputs:
    files:
    - tables/cell_metadata.csv
    - tables/doublet_calls.csv
    - tables/doublet_summary.csv
    - tables/doubletfinder_results.csv
    - tables/embedding_points.csv
    - tables/group_summary.csv
    - tables/scdblfinder_results.csv
    - tables/scds_results.csv
    - tables/summary.csv
    - figures/embedding_doublet_calls.png
    - figures/embedding_doublet_scores.png
    - figures/embedding_doublet_vs_group.png
    - figures/r_embedding_discrete.png
    - figures/r_embedding_feature.png
    - figures/r_feature_violin.png
    - analysis_summary.txt
    - input.h5ad
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs:
      - doublet_score
      - predicted_doublet
      - doublet_classification
      obsm: []
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_doublet.py
deps:
  python:
  - anndata
  - doubletdetection
  - h5py
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - scrublet
  - seaborn
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
