schema_version: 2
id: sc-velocity-prep
name: sc-velocity-prep
domain: singlecell
type: leaf
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: 🌀
summary:
  load_when: generating spliced / unspliced layers from Cell Ranger BAM, FASTQ, STARsolo output, or velocyto
    loom — the prerequisite for sc-velocity
  skip_when:
  - condition: AnnData already has spliced+unspliced layers
    use: sc-velocity
  - condition: any non-velocity preprocessing
    use: sc-preprocessing
  trigger_keywords:
  - RNA velocity prep
  - prepare spliced unspliced layers
  - velocyto
  - starsolo velocyto
  - velocity-ready AnnData
  tags:
  - singlecell
  - scrna
  - velocity-prep
  - velocyto
  - starsolo
  - spliced-unspliced
  - kb-python
  aliases:
  - scrna-velocity-prep
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - loom
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints:
      velocyto:
        priority: gtf -> base_h5ad -> threads
        params:
        - gtf
        - base_h5ad
        - threads
        defaults:
          threads: 4
        requires:
        - cellranger_output_or_loom
        tips:
        - '--gtf: required when the wrapper needs to run velocyto from a Cell Ranger BAM.'
        - '--base-h5ad: merge spliced/unspliced layers back into an existing OmicsClaw object.'
      starsolo:
        priority: reference -> chemistry -> whitelist -> base_h5ad -> sample -> threads
        params:
        - reference
        - chemistry
        - whitelist
        - base_h5ad
        - sample
        - threads
        defaults:
          threads: 8
        requires:
        - starsolo_velocyto_output_or_fastq
        tips:
        - '--chemistry: current STARsolo velocity wrapper supports `10xv2`, `10xv3`, and `10xv4` geometry.'
        - '--whitelist: strongly recommended for real FASTQ-backed STARsolo runs.'
        - '--base-h5ad: merge velocity layers into an existing preprocessed AnnData for direct scVelo
          use.'
  outputs:
    files:
    - tables/Summary.csv
    - tables/barcodes.tsv
    - tables/cell_metadata.csv
    - tables/features.tsv
    - tables/genes.tsv
    - tables/metrics_summary.csv
    - tables/top_velocity_genes.csv
    - tables/velocity_layer_summary.csv
    - figures/velocity_gene_balance.png
    - figures/velocity_layer_fraction.png
    - figures/velocity_layer_summary.png
    - figures/velocity_top_genes_stacked.png
    - 3M-february-2018.txt
    - 737K-august-2016.txt
    - Aligned.sortedByCoord.out.bam
    - analysis_summary.txt
    - multiqc_report.html
    - possorted_genome_bam.bam
    - processed.h5ad
    - velocity_input.h5ad
    - web_summary.html
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm: []
      var: []
      layers:
      - spliced
      - unspliced
      - ambiguous
      uns: []
runtime:
  language: python
  entry: sc_velocity_prep.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - seaborn
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
