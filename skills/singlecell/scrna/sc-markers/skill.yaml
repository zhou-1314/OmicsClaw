schema_version: 2
id: sc-markers
name: sc-markers
domain: singlecell
type: leaf
version: 0.6.0
author: OmicsClaw
license: MIT
summary:
  load_when: ranking cluster-level marker genes from a clustered single-cell AnnData via Scanpy Wilcoxon
    / t-test / logreg or COSG specificity
  skip_when:
  - condition: comparing condition-vs-control with replicates
    use: sc-de
  - condition: assigning cell-type labels
    use: sc-cell-annotation
  trigger_keywords: []
  tags:
  - singlecell
  - scrna
  - markers
  - cluster-markers
  - annotation
  - differential-expression
  - cosg
  aliases: []
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --groupby
    - --method
    - --n-genes
    - --n-top
    - --min-in-group-fraction
    - --min-fold-change
    - --max-out-group-fraction
    - --mu
    - --r-enhanced
    hints:
      wilcoxon:
        priority: groupby -> n_genes -> n_top
        params:
        - groupby
        - n_genes
        - n_top
        advanced_params:
        - min_fold_change
        - min_in_group_fraction
        - max_out_group_fraction
        defaults:
          n_genes: all
          n_top: 10
          min_fold_change: 0.25
          min_in_group_fraction: 0.25
          max_out_group_fraction: 0.5
        requires:
        - normalized_expression
        - group_labels_in_obs
        tips:
        - '--method wilcoxon: safest first-pass default for cluster marker ranking.'
      t-test:
        priority: groupby -> n_genes -> n_top
        params:
        - groupby
        - n_genes
        - n_top
        advanced_params:
        - min_fold_change
        - min_in_group_fraction
        - max_out_group_fraction
        defaults:
          n_genes: all
          n_top: 10
          min_fold_change: 0.25
          min_in_group_fraction: 0.25
          max_out_group_fraction: 0.5
        requires:
        - normalized_expression
        - group_labels_in_obs
        tips:
        - '--method t-test: parametric alternative when users want a simple mean-shift test.'
      logreg:
        priority: groupby -> n_genes -> n_top
        params:
        - groupby
        - n_genes
        - n_top
        advanced_params:
        - min_fold_change
        - min_in_group_fraction
        - max_out_group_fraction
        defaults:
          n_genes: all
          n_top: 10
          min_fold_change: 0.25
          min_in_group_fraction: 0.25
          max_out_group_fraction: 0.5
        requires:
        - normalized_expression
        - group_labels_in_obs
        tips:
        - '--method logreg: classification-style ranking for discriminative genes.'
      cosg:
        priority: groupby -> n_genes -> mu
        params:
        - groupby
        - n_genes
        - n_top
        - mu
        defaults:
          n_genes: 50
          n_top: 10
          mu: 1.0
        requires:
        - normalized_expression
        - group_labels_in_obs
        tips:
        - '--method cosg: fast cosine-similarity specificity scoring without p-values.'
        - '--mu: specificity penalty (0-1). Higher values penalize non-target expression more.'
        - COSG is especially useful for large datasets where Wilcoxon is slow.
  outputs:
    files:
    - tables/cell_metadata.csv
    - tables/cluster_summary.csv
    - tables/markers_all.csv
    - tables/markers_top.csv
    - figures/r_feature_violin.png
    - figures/r_marker_heatmap.png
    - analysis_summary.txt
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm: []
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_markers.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scikit-learn
  - scipy
  - seaborn
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
