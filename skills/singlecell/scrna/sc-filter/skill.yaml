schema_version: 2
id: sc-filter
name: sc-filter
domain: singlecell
type: leaf
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: S
summary:
  load_when: removing low-quality cells and lowly-detected genes from a single-cell AnnData using QC-derived
    thresholds or tissue presets
  skip_when:
  - condition: the full normalize→HVG→PCA→cluster pipeline
    use: sc-preprocessing
  - condition: reads are still raw FASTQ
    use: sc-fastq-qc
  trigger_keywords:
  - filter cells
  - cell filtering
  - gene filtering
  - remove low quality
  - qc filtering
  - tissue-specific thresholds
  tags:
  - singlecell
  - scrna
  - filter
  - qc
  - mitochondrial
  aliases: []
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints:
      threshold_filtering:
        priority: tissue -> min_genes/max_mt_percent -> min_cells -> count caps
        params:
        - tissue
        - min_genes
        - max_genes
        - min_counts
        - max_counts
        - max_mt_percent
        - min_cells
        defaults:
          min_genes: 200
          max_mt_percent: 20.0
          min_cells: 3
        requires:
        - qc_metrics_in_obs_or_count_like_matrix_in_X
        - scanpy
        tips:
        - '--tissue: Wrapper-level preset that overrides the default QC thresholds with OmicsClaw tissue
          heuristics.'
        - '--min-genes / --max-mt-percent: Main cell-retention controls.'
        - '--min-cells: Gene-level retention threshold applied after cell filtering.'
  outputs:
    files:
    - tables/cell_metadata.csv
    - tables/filter_reasons.csv
    - tables/filter_state.csv
    - tables/filter_stats.csv
    - tables/filter_summary.csv
    - tables/gene_expression.csv
    - tables/retention_summary.csv
    - figures/filter_comparison.png
    - figures/filter_reason_summary.png
    - figures/filter_state_scatter.png
    - figures/filter_summary.png
    - figures/filter_thresholds.png
    - figures/r_feature_violin.png
    - analysis_summary.txt
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm: []
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_filter.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - seaborn
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
  homepage: https://github.com/OmicsClaw/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
