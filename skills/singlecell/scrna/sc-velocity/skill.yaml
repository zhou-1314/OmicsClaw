schema_version: 2
id: sc-velocity
name: sc-velocity
domain: singlecell
version: 0.4.0
author: OmicsClaw
license: MIT
emoji: S
summary:
  load_when: computing RNA velocity vectors and latent time on a scRNA AnnData with spliced / unspliced
    layers via scVelo (stochastic / dynamical / steady-state)
  skip_when:
  - condition: input lacks spliced+unspliced layers
    use: sc-velocity-prep
  - condition: trajectory pseudotime ordering
    use: sc-pseudotime
  trigger_keywords:
  - rna velocity
  - velocity
  - scvelo
  - spliced unspliced
  - cellular dynamics
  - velovi
  - velocity pseudotime
  tags:
  - singlecell
  - scrna
  - velocity
  - rna-velocity
  - scvelo
  - latent-time
  - kinetics
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
  parameters:
    hints:
      scvelo_stochastic:
        priority: n_jobs
        params:
        - n_jobs
        defaults:
          n_jobs: 4
        requires:
        - scvelo
        - layers.spliced
        - layers.unspliced
        tips:
        - '--method scvelo_stochastic or --mode stochastic: default velocity path.'
      scvelo_dynamical:
        priority: n_jobs
        params:
        - n_jobs
        defaults:
          n_jobs: 4
        requires:
        - scvelo
        - layers.spliced
        - layers.unspliced
        tips:
        - '--method scvelo_dynamical or --mode dynamical: computes latent time when the fit succeeds.'
      scvelo_steady_state:
        priority: n_jobs
        params:
        - n_jobs
        defaults:
          n_jobs: 4
        requires:
        - scvelo
        - layers.spliced
        - layers.unspliced
        tips:
        - '--method scvelo_steady_state or --mode steady_state: steady-state approximation path.'
  outputs:
    files:
    - tables/cell_metadata.csv
    - tables/top_velocity_genes.csv
    - tables/velocity_cells.csv
    - tables/velocity_summary.csv
    - figures/latent_time_distribution.png
    - figures/latent_time_umap.png
    - figures/r_embedding_discrete.png
    - figures/r_embedding_feature.png
    - figures/r_velocity.png
    - figures/velocity_magnitude_distribution.png
    - figures/velocity_magnitude_umap.png
    - figures/velocity_stream.png
    - figures/velocity_top_genes.png
    - adata_with_velocity.h5ad
    - analysis_summary.txt
    - processed.h5ad
    - report.md
    - result.json
    anndata:
      saves_h5ad: true
      obs:
      - latent_time
      layers:
      - velocity
runtime:
  entry: sc_velocity.py
deps:
  python:
  - anndata
  - cellrank
  - matplotlib
  - numpy
  - palantir
  - pandas
  - pyVIA
  - scanpy
  - scikit-learn
  - scipy
  - scvelo
  - seaborn
compatibility:
  platforms:
  - macos
  - linux
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
  homepage: https://github.com/OmicsClaw/OmicsClaw
