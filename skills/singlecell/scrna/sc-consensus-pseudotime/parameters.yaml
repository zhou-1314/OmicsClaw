domain: singlecell
type: workflow  # thin shim over omicsclaw.runtime.consensus.run (ADR 0016/0031)
legacy_aliases: []
allowed_extra_flags:
- --members
- --pseudotime-methods
- --root-cluster
- --root-cell
- --operator
- --all
- --confirm-plan
- --non-interactive
- --alpha
- --beta
- --max-class-frac
- --seed
- --timeout
- --max-parallel
- --top-k
- --run-id
saves_h5ad: false
requires:
  bins:
  - python3
  env: []
  config: []
emoji: 🧬
homepage: https://github.com/OmicsClaw/OmicsClaw
os:
- linux
- macos
install: []
trigger_keywords:
- consensus pseudotime
- robust pseudotime
- trajectory method consensus
- pseudotime across methods
- which ordering survives the trajectory method
script: sc_consensus_pseudotime.py
param_hints:
  default:
    params:
    - pseudotime_methods
    - root_cluster
    defaults:
      pseudotime_methods: dpt,palantir,via
      root_cluster: ''
    tips:
    - 'Members are pseudotime methods (dpt/palantir/via); each must emit a single global pseudotime.'
    - 'A shared root is required: pass --root-cluster <name> or --root-cell <id> so direction is pinned.'
requires_preprocessed: true
