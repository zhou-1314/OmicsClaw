schema_version: 2
id: sc-consensus-pseudotime
name: sc-consensus-pseudotime
domain: singlecell
type: consensus
version: 0.1.0
author: OmicsClaw
license: MIT
emoji: 🧬
summary:
  load_when: you want a single-cell pseudotime ordering robust to the choice of trajectory method — fanning
    out DPT/Palantir/VIA from a shared root, rank-aligning them, and voting a consensus pseudotime with
    per-cell uncertainty
  skip_when:
  - condition: you have branching multi-lineage trajectories
  - condition: no defined root
  trigger_keywords:
  - consensus pseudotime
  - robust pseudotime
  - trajectory method consensus
  - pseudotime across methods
  - which ordering survives the trajectory method
  tags:
  - singlecell
  - scrna
  - consensus
  - pseudotime
  - trajectory
  aliases: []
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --members
    - --pseudotime-methods
    - --root-cluster
    - --root-cell
    - --operator
    - --all
    - --confirm-plan
    - --non-interactive
    - --alpha
    - --beta
    - --max-class-frac
    - --seed
    - --timeout
    - --max-parallel
    - --top-k
    - --run-id
    hints:
      default:
        params:
        - pseudotime_methods
        - root_cluster
        defaults:
          pseudotime_methods: dpt,palantir,via
          root_cluster: ''
        tips:
        - Members are pseudotime methods (dpt/palantir/via); each must emit a single global pseudotime.
        - 'A shared root is required: pass --root-cluster <name> or --root-cell <id> so direction is pinned.'
  outputs:
    files:
    - consensus_pseudotime.tsv
    - member_agreement_spearman.csv
    - member_scores.csv
    - selection_audit.json
    - plan.json
    - report.md
    result_json:
      required_keys: []
runtime:
  language: python
  entry: sc_consensus_pseudotime.py
deps:
  python:
  - anndata
  - numpy
  - pandas
  - PyYAML
  - scanpy
  - scikit-learn
  - scipy
  cli: []
compatibility:
  platforms:
  - linux
  - macos
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  homepage: https://github.com/OmicsClaw/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
