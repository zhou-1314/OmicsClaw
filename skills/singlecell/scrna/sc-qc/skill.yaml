schema_version: 2
id: sc-qc
name: sc-qc
domain: singlecell
type: leaf
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: 📊
summary:
  load_when: computing per-cell QC metrics (n_genes, total counts, mt%, ribo%) on a single-cell AnnData
    before filtering
  skip_when:
  - condition: reads are still raw FASTQ
    use: sc-fastq-qc
  - condition: you want to filter cells now
    use: sc-filter
  trigger_keywords:
  - scRNA QC
  - single-cell QC
  - quality control
  - mitochondrial percentage
  - ribosomal percentage
  - QC violin
  - QC scatter
  - n genes per cell
  tags:
  - singlecell
  - scrna
  - qc
  - mitochondrial
  - ribosomal
  aliases: []
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    hints:
      qc_metrics:
        priority: species
        params:
        - species
        defaults:
          species: human
        requires:
        - count_like_matrix_in_layers.raw_or_X
        - gene_symbols_with_species_prefix_convention
        tips:
        - '--species: Wrapper-level control for mitochondrial / ribosomal gene-prefix detection; use `human`
          for `MT-` / `RP[SL]`, `mouse` for `mt-` / `Rp[sl]`.'
        - Current OmicsClaw implementation exposes one public QC path, `qc_metrics`; it always computes
          ribosomal percentage in addition to mitochondrial percentage.
        - This skill is diagnostic-only and does not remove cells or genes.
  outputs:
    files:
    - tables/barcode_rank_curve.csv
    - tables/cell_metadata.csv
    - tables/gene_expression.csv
    - tables/highest_expr_genes.csv
    - tables/qc_metric_correlations.csv
    - tables/qc_metrics_per_cell.csv
    - tables/qc_metrics_summary.csv
    - tables/qc_run_summary.csv
    - figures/barcode_rank.png
    - figures/highest_expr_genes.png
    - figures/qc_correlation_heatmap.png
    - figures/qc_histograms.png
    - figures/qc_scatter.png
    - figures/qc_violin.png
    - figures/r_qc_violin.png
    - analysis_summary.txt
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm: []
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_qc.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - seaborn
  cli: []
compatibility:
  platforms:
  - macos
  - linux
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
  homepage: https://github.com/OmicsClaw/OmicsClaw
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
