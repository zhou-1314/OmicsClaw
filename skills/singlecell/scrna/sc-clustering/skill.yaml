schema_version: 2
id: sc-clustering
name: sc-clustering
domain: singlecell
version: 0.3.0
author: OmicsClaw
license: MIT
summary:
  load_when: building the neighbour graph, embedding (UMAP/t-SNE/diffmap/PHATE), and clustering (Leiden/Louvain)
    on a normalised single-cell AnnData
  skip_when:
  - condition: QC/normalisation/HVG/PCA have not run yet
    use: sc-preprocessing
  - condition: marker ranking after clustering
    use: sc-markers
  tags:
  - singlecell
  - scrna
  - clustering
  - leiden
  - louvain
  - umap
  - tsne
  - phate
  aliases:
  - sc-dimred-cluster
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obsm:
        - X_pca
  parameters:
    hints:
      umap:
        priority: use_rep -> cluster_method -> n_neighbors/resolution
        params:
        - use_rep
        - cluster_method
        - n_neighbors
        - resolution
        advanced_params:
        - n_pcs
        - umap_min_dist
        - umap_spread
        defaults:
          cluster_method: leiden
          n_neighbors: 15
          n_pcs: 50
          resolution: 1.0
          umap_min_dist: 0.5
          umap_spread: 1.0
        requires:
        - normalized_expression
        - embedding_or_pca
        tips:
        - '`use_rep` is the most important selector if multiple embeddings are available.'
      tsne:
        priority: use_rep -> cluster_method -> n_neighbors/resolution
        params:
        - use_rep
        - cluster_method
        - n_neighbors
        - resolution
        advanced_params:
        - n_pcs
        - tsne_perplexity
        - tsne_metric
        defaults:
          cluster_method: leiden
          n_neighbors: 15
          n_pcs: 50
          resolution: 1.0
          tsne_perplexity: 30.0
          tsne_metric: euclidean
        requires:
        - normalized_expression
        - embedding_or_pca
        tips:
        - '`tsne` is mainly for visualization; the clustering still comes from the neighbor graph.'
      diffmap:
        priority: use_rep -> cluster_method -> n_neighbors/resolution
        params:
        - use_rep
        - cluster_method
        - n_neighbors
        - resolution
        advanced_params:
        - n_pcs
        - diffmap_n_comps
        defaults:
          cluster_method: leiden
          n_neighbors: 15
          n_pcs: 50
          resolution: 1.0
          diffmap_n_comps: 15
        requires:
        - normalized_expression
        - embedding_or_pca
        tips:
        - '`diffmap` often emphasizes continuous trajectories more than compact clusters.'
      phate:
        priority: use_rep -> cluster_method -> n_neighbors/resolution
        params:
        - use_rep
        - cluster_method
        - n_neighbors
        - resolution
        advanced_params:
        - n_pcs
        - phate_knn
        - phate_decay
        defaults:
          cluster_method: leiden
          n_neighbors: 15
          n_pcs: 50
          resolution: 1.0
          phate_knn: 15
          phate_decay: 40
        requires:
        - normalized_expression
        - embedding_or_pca
        - phate
        tips:
        - '`phate` is optional and may need extra installation before use.'
  outputs:
    files:
    - tables/cell_metadata.csv
    - tables/cluster_qc_summary.csv
    - tables/cluster_summary.csv
    - tables/clustering_summary.csv
    - tables/embedding_points.csv
    - figures/auto_resolution_search.png
    - figures/cluster_qc_heatmap.png
    - figures/cluster_size_summary.png
    - figures/embedding_clusters.png
    - figures/embedding_comparison.png
    - figures/pca_scatter.png
    - figures/pca_variance.png
    - figures/r_cell_barplot.png
    - figures/r_cell_proportion.png
    - figures/r_embedding_discrete.png
    - figures/r_embedding_feature.png
    - analysis_summary.txt
    - processed.h5ad
    - report.md
    - result.json
    anndata:
      saves_h5ad: true
      obs:
      - leiden
      - louvain
      obsm:
      - X_<embedding>
runtime:
  entry: sc_cluster.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - phate
  - scanpy
  - scikit-learn
  - scipy
  - seaborn
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
  compute:
    cpu_cores: 2
    memory_mib: 4096
    gpu_devices: 0
    threads: 2
    temporary_disk_mib: 2048
