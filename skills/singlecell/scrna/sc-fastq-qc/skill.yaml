schema_version: 2
id: sc-fastq-qc
name: sc-fastq-qc
domain: singlecell
version: 0.3.0
author: OmicsClaw
license: MIT
emoji: 🧪
summary:
  load_when: checking raw single-cell FASTQ read quality (Phred / GC / adapter / length) before counting
  skip_when:
  - condition: reads are already counted
    use: sc-qc
  - condition: bulk FASTQ
    use: bulkrna-read-qc
  trigger_keywords:
  - scRNA FASTQ QC
  - FastQC single-cell
  - MultiQC single-cell
  - raw read quality
  - read-level QC
  tags:
  - singlecell
  - scrna
  - fastq
  - qc
  - read-quality
  aliases:
  - scrna-fastq-qc
interface:
  inputs:
    path_kinds:
    - file
    - directory
    modalities:
    - scrna
    file_types:
    - fastq
    - fq
    preconditions:
      content:
        fastq:
          require_valid_record: true
        directory:
          any_of_signatures:
          - fastq-collection
  parameters:
    hints:
      fastqc:
        priority: threads -> sample -> read2 -> max_reads
        params:
        - threads
        - sample
        - read2
        - max_reads
        defaults:
          threads: 4
          max_reads: 20000
        requires:
        - fastq_or_fastq_dir
        tips:
        - '--threads: forwarded to FastQC when installed, and used for external tool runs.'
        - '--sample: choose one sample when the input directory contains multiple FASTQ groups.'
        - '--max-reads: Python fallback only samples this many reads per FASTQ for lightweight local summaries.'
  outputs:
    files:
    - tables/Summary.csv
    - tables/barcodes.tsv
    - tables/fastq_per_base_quality.csv
    - tables/fastq_per_file_summary.csv
    - tables/fastq_per_sample_summary.csv
    - tables/features.tsv
    - tables/genes.tsv
    - tables/metrics_summary.csv
    - figures/fastq_file_quality.png
    - figures/fastq_q30_summary.png
    - figures/fastq_read_structure.png
    - figures/per_base_quality.png
    - 3M-february-2018.txt
    - 737K-august-2016.txt
    - Aligned.sortedByCoord.out.bam
    - multiqc_report.html
    - possorted_genome_bam.bam
    - web_summary.html
    - report.md
    - result.json
runtime:
  entry: sc_fastq_qc.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - seaborn
compatibility:
  platforms:
  - macos
  - linux
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
