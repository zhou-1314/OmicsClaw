schema_version: 2
id: sc-pathway-scoring
name: sc-pathway-scoring
domain: singlecell
type: leaf
version: 0.3.0
author: OmicsClaw
license: MIT
summary:
  load_when: computing per-cell pathway / gene-set scores on a normalised scRNA AnnData via AUCell (R
    or Python) or Scanpy score_genes
  skip_when:
  - condition: running condition-vs-control bulk-style enrichment on top of a DE table
    use: sc-enrichment
  - condition: de-novo gene-program discovery
    use: sc-gene-programs
  trigger_keywords:
  - pathway score
  - pathway scoring
  - gene set score
  - module score
  - pathway activity
  - signature score
  tags:
  - singlecell
  - scrna
  - pathway-scoring
  - aucell
  - scanpy-score-genes
  - gene-sets
  - decoupler
  aliases: []
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: false
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --aucell-auc-max-rank
    - --aucell-py-auc-threshold
    - --gene-set-db
    - --gene-sets
    - --groupby
    - --method
    - --r-enhanced
    - --score-genes-ctrl-size
    - --score-genes-n-bins
    - --seed
    - --species
    - --top-pathways
    hints:
      aucell_r:
        priority: gene_sets/gene_set_db -> groupby -> aucell_auc_max_rank -> top_pathways
        params:
        - gene_sets
        - gene_set_db
        - species
        - groupby
        - aucell_auc_max_rank
        - top_pathways
        defaults:
          groupby: auto-detect cluster/cell_type label when omitted
          top_pathways: 20
          aucell_auc_max_rank: 5% of detected features when omitted
          species: human
        requires:
        - AUCell
        - GSEABase
        - local_gmt_or_gene_set_db
        tips:
        - '--method aucell_r: Official AUCell Bioconductor scoring path.'
        - '--aucell-auc-max-rank: AUCell ranking depth override; leave unset to use the wrapper''s 5%
          feature default.'
      score_genes_py:
        priority: gene_sets/gene_set_db -> groupby -> score_genes_ctrl_size -> score_genes_n_bins -> top_pathways
        params:
        - gene_sets
        - gene_set_db
        - species
        - groupby
        - score_genes_ctrl_size
        - score_genes_n_bins
        - top_pathways
        defaults:
          groupby: auto-detect cluster/cell_type label when omitted
          top_pathways: 20
          score_genes_ctrl_size: 50
          score_genes_n_bins: 25
          species: human
        requires:
        - normalized_expression
        - local_gmt_or_gene_set_db
        tips:
        - '--method score_genes_py: lightweight Python module-score path for normalized adata.X.'
        - '--score-genes-ctrl-size: number of control genes used for background subtraction.'
        - '--score-genes-n-bins: expression binning granularity for control-gene matching.'
      aucell_py:
        priority: gene_sets/gene_set_db -> groupby -> aucell_py_auc_threshold -> top_pathways
        params:
        - gene_sets
        - gene_set_db
        - species
        - groupby
        - aucell_py_auc_threshold
        - top_pathways
        defaults:
          groupby: auto-detect cluster/cell_type label when omitted
          top_pathways: 20
          aucell_py_auc_threshold: 0.05
          species: human
        requires:
        - local_gmt_or_gene_set_db
        tips:
        - '--method aucell_py: pure Python AUCell implementation -- no R required.'
        - '--aucell-py-auc-threshold: fraction of ranked genome for AUC calculation (default 0.05).'
        - AUCell ranks genes per cell by expression, then measures gene-set recovery curve AUC.
  outputs:
    files:
    - tables/aucell_scores.csv
    - tables/cell_metadata.csv
    - tables/enrichment_scores.csv
    - tables/expression_matrix.tsv
    - tables/gene_expression.csv
    - tables/gene_set_overlap.csv
    - tables/group_high_fraction.csv
    - tables/group_mean_scores.csv
    - tables/top_pathway_scores_long.csv
    - tables/top_pathways.csv
    - figures/r_pathway_violin.png
    - analysis_summary.txt
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs: []
      obsm: []
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_pathway_scoring.py
deps:
  python:
  - anndata
  - gseapy
  - matplotlib
  - numpy
  - pandas
  - scanpy
  - scipy
  - seaborn
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
