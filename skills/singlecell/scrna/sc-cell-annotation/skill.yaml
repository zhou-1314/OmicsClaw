schema_version: 2
id: sc-cell-annotation
name: sc-cell-annotation
domain: singlecell
type: leaf
version: 0.6.0
author: OmicsClaw
license: MIT
summary:
  load_when: assigning cell-type labels to a clustered scRNA AnnData via marker dictionaries, CellTypist,
    PopV, KNNPredict, SingleR, scmap, SCSA, or a manual cluster-to-label map
  skip_when:
  - condition: ranking marker genes per cluster
    use: sc-markers
  - condition: condition-vs-control DE
    use: sc-de
  trigger_keywords: []
  tags:
  - singlecell
  - scrna
  - cell-annotation
  - celltypist
  - popv
  - singler
  - scmap
  - scsa
  - knnpredict
  - markers
  aliases:
  - sc-annotate
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
        obs: []
        obsm: []
      env: []
      config: []
  parameters:
    allowed_extra_flags:
    - --celltypist-majority-voting
    - --cluster-key
    - --manual-map
    - --manual-map-file
    - --marker-file
    - --method
    - --model
    - --r-enhanced
    - --reference
    - --scsa-foldchange
    - --scsa-pvalue
    - --species
    - --tissue
    hints:
      manual:
        priority: cluster_key -> manual_map/manual_map_file
        params:
        - cluster_key
        - manual_map
        - manual_map_file
        defaults:
          cluster_key: auto
        requires:
        - cluster_labels_in_obs
        tips:
        - '--method manual: explicit relabeling from user-provided cluster mappings.'
        - '--manual-map example: `0=T cell;1,2=Myeloid`.'
      markers:
        priority: cluster_key -> marker_file
        params:
        - cluster_key
        - marker_file
        defaults:
          cluster_key: auto
          marker_file: null
        requires:
        - normalized_expression
        - cluster_labels_in_obs
        tips:
        - '--method markers: use when clusters already exist and you want a quick label proposal from
          known markers.'
        - Built-in markers cover blood (PBMC), brain, and general tissue cell types (human gene symbols).
        - For non-human organisms or specialized tissues, provide --marker-file markers.json.
        - If ALL cells are 'Unknown', it means marker genes were not found — see Reference Data Guide
          below.
      celltypist:
        priority: model -> celltypist_majority_voting
        params:
        - model
        - celltypist_majority_voting
        defaults:
          model: Immune_All_Low
          celltypist_majority_voting: false
        requires:
        - celltypist
        - normalized_expression_matrix
        tips:
        - '--model: CellTypist model name or model file stem.'
        - '--celltypist-majority-voting: optional neighborhood/cluster smoothing for CellTypist labels.'
      popv:
        priority: reference -> cluster_key
        params:
        - reference
        - cluster_key
        defaults:
          cluster_key: auto
        requires:
        - labeled_reference_h5ad
        - normalized_expression_matrix
        tips:
        - '--method popv: official PopV path when possible, else lightweight reference mapping fallback.'
      knnpredict:
        priority: reference -> cluster_key
        params:
        - reference
        - cluster_key
        defaults:
          cluster_key: auto
        requires:
        - labeled_reference_h5ad
        - normalized_expression_matrix
        tips:
        - '--method knnpredict: lightweight AnnData-first projection inspired by SCOP KNNPredict.'
      singler:
        priority: reference
        params:
        - reference
        defaults:
          reference: HPCA
        requires:
        - R_SingleR_stack
        tips:
        - '--method singler: R SingleR path using celldex / ExperimentHub atlases or a labeled local H5AD
          reference.'
      scmap:
        priority: reference
        params:
        - reference
        defaults:
          reference: HPCA
        requires:
        - R_scmap_stack
        tips:
        - '--method scmap: R scmap path using celldex / ExperimentHub atlases or a labeled local H5AD
          reference.'
  outputs:
    files:
    - tables/annotation_embedding_points.csv
    - tables/annotation_summary.csv
    - tables/cell_metadata.csv
    - tables/cell_type_counts.csv
    - tables/cellmarker2_markers.csv
    - tables/cluster_annotation_matrix.csv
    - tables/popv_predictions.csv
    - tables/scmap_results.csv
    - tables/singler_results.csv
    - figures/cell_type_counts.png
    - figures/cluster_to_cell_type_heatmap.png
    - figures/embedding_annotation_score.png
    - figures/embedding_cell_type.png
    - figures/embedding_cluster_vs_cell_type.png
    - figures/r_cell_barplot.png
    - figures/r_cell_proportion.png
    - figures/r_cell_sankey.png
    - figures/r_embedding_discrete.png
    - figures/r_embedding_feature.png
    - _demo_ref.h5ad
    - analysis_summary.txt
    - input.h5ad
    - processed.h5ad
    - report.md
    - result.json
    result_json:
      required_keys: []
    anndata:
      saves_h5ad: true
      obs:
      - cell_type
      - annotation_requested_method
      - annotation_score
      obsm:
      - cell_type_prob
      var: []
      layers: []
      uns: []
runtime:
  language: python
  entry: sc_annotate.py
deps:
  python:
  - anndata
  - celltypist
  - matplotlib
  - numpy
  - pandas
  - popv
  - scanpy
  - scipy
  - seaborn
  cli: []
compatibility:
  platforms: []
  architectures: []
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
lifecycle:
  status: mvp
validation:
  level: smoke-only
  evidence: []
provenance:
  origin: human
security:
  data_egress: none
  network: none
  writes: output_dir_only
mcp:
  expose: false
