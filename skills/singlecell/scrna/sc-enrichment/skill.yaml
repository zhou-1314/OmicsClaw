schema_version: 2
id: sc-enrichment
name: sc-enrichment
domain: singlecell
version: 0.4.0
author: OmicsClaw
license: MIT
emoji: 🧭
summary:
  load_when: running bulk-style pathway enrichment (ORA / GSEA / GSEA-R / GSVA-R) on a per-group ranked
    DE / marker list against a gene-set library
  skip_when:
  - condition: computing per-cell pathway scores in-place
    use: sc-pathway-scoring
  - condition: de-novo gene-program discovery
    use: sc-gene-programs
  trigger_keywords:
  - sc enrichment
  - single-cell enrichment
  - GO enrichment
  - KEGG enrichment
  - GSEA
  - ORA
  - pathway enrichment
  tags:
  - singlecell
  - scrna
  - enrichment
  - gsea
  - ora
  - gsva
  - decoupler
  - pathway-enrichment
interface:
  inputs:
    modalities:
    - scrna
    file_types:
    - h5ad
    preconditions:
      data_shape:
        requires_preprocessed: true
  parameters:
    hints:
      ora:
        priority: gene_sets/gene_set_db/gene_set_from_markers -> engine -> groupby/ranking_method
        params:
        - gene_sets
        - gene_set_db
        - gene_set_from_markers
        - marker_group
        - marker_top_n
        - engine
        - groupby
        - ranking_method
        advanced_params:
        - ora_padj_cutoff
        - ora_log2fc_cutoff
        - ora_max_genes
        - species
        - top_terms
        defaults:
          engine: auto
          ranking_method: wilcoxon
          ora_padj_cutoff: 0.05
          ora_log2fc_cutoff: 0.25
          ora_max_genes: 200
          species: human
          top_terms: 18
        requires:
        - gene_set_source
        - normalized_expression_or_upstream_ranking
        tips:
        - '--method ora: best for thresholded marker/DE gene lists when you want the most enriched terms
          quickly.'
        - If you only provide a processed h5ad, the wrapper can auto-rank cluster markers first using
          `ranking_method`.
        - If you already ran `sc-markers` or `sc-de`, passing that output directory lets the wrapper reuse
          exported rankings.
      gsea:
        priority: gene_sets/gene_set_db/gene_set_from_markers -> engine -> groupby/ranking_method
        params:
        - gene_sets
        - gene_set_db
        - gene_set_from_markers
        - marker_group
        - marker_top_n
        - engine
        - groupby
        - ranking_method
        advanced_params:
        - gsea_ranking_metric
        - gsea_min_size
        - gsea_max_size
        - gsea_permutation_num
        - gsea_weight
        - gsea_seed
        - species
        - top_terms
        defaults:
          engine: auto
          ranking_method: wilcoxon
          gsea_ranking_metric: auto
          gsea_min_size: 5
          gsea_max_size: 500
          gsea_permutation_num: 100
          gsea_weight: 1.0
          gsea_seed: 123
          species: human
          top_terms: 18
        requires:
        - gene_set_source
        - full_ranked_gene_list
        tips:
        - '--method gsea: keeps the full ranking and is better when subtle coordinated shifts matter more
          than hard DEG thresholds.'
        - If the input is a filtered marker table, OmicsClaw may rebuild a fuller ranking from `processed.h5ad`.
        - '`gsea_ranking_metric=auto` prefers `stat`, then `scores`, then `logfoldchanges`.'
  outputs:
    files:
    - tables/cell_metadata.csv
    - tables/clusterprofiler_results.csv
    - tables/de_for_gsea_r.csv
    - tables/de_full.csv
    - tables/enrichment_results.csv
    - tables/enrichment_significant.csv
    - tables/group_expr_for_gsva.csv
    - tables/group_summary.csv
    - tables/gsea_input.csv
    - tables/gsea_r_results.csv
    - tables/gsea_running_scores.csv
    - tables/gsva_r_scores.csv
    - tables/markers_all.csv
    - tables/ora_input.csv
    - tables/ranking_input.csv
    - tables/top_terms.csv
    - figures/gsva_r_heatmap.png
    - figures/r_enrichment_bar.png
    - figures/r_enrichment_dotplot.png
    - figures/r_enrichment_enrichmap.png
    - figures/r_enrichment_lollipop.png
    - figures/r_enrichment_network.png
    - figures/r_gsea_mountain.png
    - figures/r_gsea_nes_heatmap.png
    - analysis_summary.txt
    - background_genes.txt
    - processed.h5ad
    - r_plot_metadata.json
    - report.md
    - result.json
    anndata:
      saves_h5ad: true
runtime:
  entry: sc_enrichment.py
deps:
  python:
  - adjustText
  - anndata
  - matplotlib
  - networkx
  - numpy
  - pandas
  - scanpy
  - scipy
  - seaborn
compatibility:
  platforms:
  - macos
  - linux
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  - r_visualization.md
  tests: tests/
  homepage: https://github.com/TianGzlab/OmicsClaw
