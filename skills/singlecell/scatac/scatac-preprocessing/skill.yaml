schema_version: 2
id: scatac-preprocessing
name: scatac-preprocessing
domain: singlecell
version: 0.2.0
author: OmicsClaw
license: MIT
emoji: 🧬
summary:
  load_when: preprocessing a single-cell ATAC peak × cell AnnData via Signac-style TF-IDF + LSI + Leiden,
    producing a clustered UMAP-ready object
  skip_when:
  - condition: input is fragments
  - condition: BAM (peak calling not implemented here)
  - condition: scRNA preprocessing
    use: sc-preprocessing
  trigger_keywords:
  - scATAC preprocessing
  - single-cell ATAC preprocessing
  - ATAC TF-IDF LSI
  - chromatin accessibility clustering
  - scATAC UMAP Leiden
  tags:
  - singlecell
  - scatac
  - atac
  - preprocessing
  - tfidf
  - lsi
  - clustering
  - leiden
  aliases:
  - scatac-preprocess
interface:
  inputs:
    path_kinds:
    - file
    - directory
    modalities:
    - scatac
    file_types:
    - h5ad
    - h5
    - loom
    - csv
    - tsv
  parameters:
    hints:
      tfidf_lsi:
        priority: min_peaks/min_cells -> n_top_peaks -> n_lsi/n_neighbors -> leiden_resolution
        params:
        - min_peaks
        - min_cells
        - n_top_peaks
        - tfidf_scale_factor
        - n_lsi
        - n_neighbors
        - leiden_resolution
        defaults:
          min_peaks: 200
          min_cells: 5
          n_top_peaks: 10000
          tfidf_scale_factor: 10000.0
          n_lsi: 30
          n_neighbors: 15
          leiden_resolution: 0.8
        requires:
        - count_like_peak_matrix_in_X
        - scanpy
        - sklearn
        tips:
        - '--min-peaks / --min-cells: Wrapper-level sparsity filters for low-information cells and rarely
          observed peaks.'
        - '--n-top-peaks: Wrapper-level feature-budget control using globally most accessible peaks after
          filtering.'
        - '--n-lsi / --n-neighbors / --leiden-resolution: Main structure-learning controls for latent
          space, graph locality, and clustering granularity.'
  outputs:
    files:
    - tables/cell_metadata.csv
    - tables/cluster_summary.csv
    - tables/lsi_variance_ratio.csv
    - tables/peak_summary.csv
    - tables/preprocess_summary.csv
    - tables/qc_metrics_per_cell.csv
    - tables/umap_points.csv
    - figures/clustering_comparison.png
    - figures/feature_umap.png
    - figures/lsi_variance.png
    - figures/pca_loadings.png
    - figures/pca_scatter.png
    - figures/pca_variance.png
    - figures/qc_violin.png
    - figures/top_accessible_peaks.png
    - analysis_summary.txt
    - processed.h5ad
    - report.md
    - result.json
    anndata:
      saves_h5ad: true
      processing_state: preprocessed
      obs:
      - leiden
      obsm:
      - X_lsi
      - X_umap
      layers:
      - counts
runtime:
  entry: scatac_preprocessing.py
deps:
  python:
  - anndata
  - matplotlib
  - numpy
  - pandas
  - phate
  - scanpy
  - scikit-learn
  - scipy
  - seaborn
compatibility:
  platforms:
  - macos
  - linux
resources:
  references:
  - methodology.md
  - output_contract.md
  - parameters.md
  tests: tests/
  homepage: https://github.com/OmicsClaw/OmicsClaw
