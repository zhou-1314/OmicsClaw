# OmicsClaw analysis environment
#
# Owns everything that mamba can install reliably:
#   - bioinformatics CLIs (samtools, STAR, fastqc, bwa, ...)
#   - R 4.3 + CRAN + Bioconductor packages
#   - C/C++ build toolchain (for pip's compiled deps + future tools/ vendoring)
#   - The heavy Python science stack (scanpy/anndata/squidpy, torch,
#     scvi-tools/scvelo/cellrank, harmonypy/bbknn/scanorama, multiqc,
#     kb-python, ...) — see Tier 4 below.
#
# pyproject.toml owns the THIN pip residue: omicsclaw editable + PyPI-only
# packages with no conda recipe (SpaGCN, GraphST, cellcharter, paste-bio,
# flashdeconv, fastccc, pyVIA, tangram-sc, ...). 0_setup_env.sh Tier 2
# installs that residue with `uv pip install` after this file's mamba env
# create completes.
#
# Channel order: conda-forge first (broad scientific), bioconda second
# (genomics specific). This file is designed for strict channel priority —
# enforce via `conda config --set channel_priority strict` or by passing
# `--strict-channel-priority` to env create. 0_setup_env.sh handles this.
name: OmicsClaw
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  # ────────── Tier 0: Python interpreter + build toolchain ──────────
  - python=3.11
  - pip
  - uv>=0.4                     # PubGrub-resolver pip front-end; >=0.4 needed
                                # for reliable PEP 517 editable installs.
                                # Used by 0_setup_env.sh Tier 2 for thin pip.
  - gxx_linux-64=12.*
  - sysroot_linux-64=2.17
  - cmake
  - make
  - autoconf
  - automake
  - libtool
  - pkg-config
  - git

  # ────────── Tier 1: bioinformatics CLIs (pip can't ship these) ──────────
  # Alignment
  - samtools
  - bcftools
  - bwa
  - bwa-mem2
  - bowtie2
  - minimap2
  - hisat2
  - star
  # QC
  - fastqc
  - fastp
  - trim-galore
  # Variant calling / postprocessing
  - gatk4
  - picard
  # Peak calling (genomics-epigenomics)
  - macs3
  # NOTE: cnvkit (genomics-cnv-calling) is NOT bundled — bioconda only
  # ships 0.9.8 which crashes on pandas>=2.0; newer versions' joblib<1.0
  # transitive dep conflicts with macs3's scikit-learn (joblib>=1.0). Users
  # who need cnvkit should install it in a dedicated env.
  # Single-cell / RNA upstream
  - simpleaf
  # NOTE: velocyto has no Python 3.11 build on bioconda (only 3.6–3.10,
  # 3.12) — installed via pip ("velocyto>=0.17.17") in Tier 2.1.
  # multiqc and kb-python now live in Tier 4 below (mamba-managed).

  # ────────── Tier 2: R 4.3 + CRAN packages (replaces install_r_dependencies.R, CRAN section) ──────────
  - r-base=4.3
  - r-devtools
  - r-biocmanager
  - r-dplyr
  - r-ggplot2
  - r-matrix
  - r-seurat
  - r-sctransform
  - r-harmony
  - r-soupx
  - r-openxlsx
  - r-hgnchelper
  - r-nmf
  - r-mclust
  - r-survival
  - r-msigdbr
  - r-ashr
  # CARD's GitHub installer otherwise pulls these CRAN spatial deps from
  # source, which requires UDUNITS2/GDAL/GEOS/PROJ toolchain probing.
  - r-units
  - r-sf
  - r-concaveman
  # Other direct install-time deps for the Tier 3 GitHub R packages. Keeping
  # them in conda avoids devtools compiling large CRAN dependency chains while
  # installing spacexr, CARD, CellChat, numbat, SPARK, and DoubletFinder.
  - r-readr
  - r-pals
  - r-doparallel
  - r-foreach
  - r-quadprog
  - r-tibble
  - r-reshape2
  - r-knitr
  - r-rmarkdown
  - r-fields
  - r-mgcv
  - r-compquadform
  - r-rfast
  - r-locfdr
  - r-metafor
  - r-data.table
  - r-rcpp
  - r-rcpparmadillo
  - r-mcmcpack
  # wrMisc is a CARD import, but conda-forge currently publishes only
  # R 4.4/4.5 r-wrmisc builds. 0_setup_env.sh installs CRAN wrMisc in Tier 3
  # before GitHub R packages so the main R 4.3 solve remains satisfiable.
  - r-sp
  - r-rann
  - r-rcolorbrewer
  - r-nnls
  - r-scatterpie
  - r-ggcorrplot
  - r-pbmcapply
  - r-rcppml
  - r-spatstat.random
  - r-gtools
  - r-rcppeigen
  - r-cowplot
  - r-igraph
  - r-future
  - r-future.apply
  - r-pbapply
  - r-irlba
  - r-ggalluvial
  - r-stringr
  - r-svglite
  - r-ggrepel
  - r-circlize
  - r-rspectra
  - r-reticulate
  - r-scales
  - r-sna
  - r-fnn
  - r-shape
  - r-magrittr
  - r-patchwork
  - r-colorspace
  - r-plyr
  - r-ggpubr
  - r-ggnetwork
  - r-plotly
  - r-shiny
  - r-bslib
  - r-collapse
  - r-ape
  - r-catools
  - r-dendextend
  - r-ggraph
  - r-glue
  - r-logger
  - r-optparse
  - r-paralleldist
  # scistreer (numbat import) imports phangorn and links RcppParallel; keep
  # those compiled CRAN deps in the conda layer.
  - r-phangorn
  - r-purrr
  - r-rhpcblasctl
  - r-r.utils
  - r-tidygraph
  - r-tidyr
  - r-vcfr
  - r-roptim
  - r-matlab
  - r-pracma
  - r-kernsmooth
  - r-rocr
  # Newer conda-forge r-rcppparallel builds target R 4.4/4.5; 5.1.9 still
  # provides R 4.3 builds and is sufficient for scistreer.
  - r-rcppparallel=5.1.9
  - r-seuratobject
  - r-zoo

  # ────────── Tier 3: Bioconductor packages (replaces install_r_dependencies.R, Bioc section) ──────────
  - bioconductor-biocgenerics
  - bioconductor-biocneighbors
  - bioconductor-complexheatmap
  - bioconductor-genomicranges
  - bioconductor-ggtree
  - bioconductor-iranges
  - bioconductor-summarizedexperiment
  - bioconductor-singlecellexperiment
  - bioconductor-scran
  - bioconductor-scuttle
  - bioconductor-singler
  - bioconductor-celldex
  - bioconductor-scdblfinder
  - bioconductor-batchelor
  - bioconductor-muscat
  - bioconductor-spatialexperiment
  - bioconductor-zellkonverter
  - bioconductor-spotlight
  - bioconductor-deseq2
  - bioconductor-apeglm
  - bioconductor-edger
  - bioconductor-limma
  - bioconductor-sva
  - bioconductor-clusterprofiler
  # WGCNA is published on CRAN, not Bioconductor — use r-wgcna
  - r-wgcna

  # NOTE: 6 GitHub-only R packages (spacexr/RCTD, CARD, CellChat, numbat,
  # SPARK, DoubletFinder) are NOT in this file — they have no bioconda
  # equivalent. They are installed via `devtools::install_github` in
  # 0_setup_env.sh Tier 3.

  # ────────── Tier 4: heavy Python science stack (lifted from pyproject pip layer) ──────────
  # Why: pip 24.2+ aborts the [full,singlecell-upstream] resolve with
  # `resolution-too-deep`. Lifting the heavy hubs (torch, scvi-tools, scanpy
  # family, jinja2/nbconvert chain) to mamba shrinks the pip graph by ~70%,
  # which lets the residual thin pip layer resolve reliably.
  # See docs/superpowers/specs/2026-05-02-mamba-first-env-design.md.
  # Channel pins: prefer conda-forge for python-only libs, bioconda for
  # genomics-domain libs. Strict channel priority is enforced by 0_setup_env.sh.
  #
  # Coverage notes:
  #   * High-confidence packages (well-known on conda-forge or bioconda) are
  #     listed without per-package channel pins; strict channel priority +
  #     bioconda/conda-forge order in this file is enough.
  #   * pytorch lives on conda-forge AND on the dedicated `pytorch` channel.
  #     The file keeps a CPU-safe baseline; 0_setup_env.sh can replace it with
  #     a CUDA build when OMICSCLAW_TORCH_BACKEND=auto/cuda.
  #   * Four packages from Task 0 audit are `unknown` (cell2location,
  #     cellphonedb, infercnvpy, spatialde) — they remain in pyproject as
  #     thin pip residue until verified on a network-connected machine. See
  #     docs/superpowers/specs/2026-05-02-mamba-first-env-design.md "Open
  #     questions" for follow-up.
  #   * cellphonedb was in the plan's initial high-confidence table but
  #     downgraded to `unknown` by the Task 0 audit (offline-cache miss,
  #     not a conda absence). It stays in pyproject [singlecell-communication]
  #     until re-audited on a network-connected machine.
  #
  # Single-cell / spatial core
  - scanpy>=1.9.0,<2.0
  - anndata>=0.11.0
  - squidpy>=1.2.0
  # Numeric stack
  - numpy>=1.24,<2.1            # cap at 2.1 until scvi-tools/numba clear 2.x
  - pandas>=2.0,<3.0
  - scipy>=1.7.0
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.11.0
  - pillow>=8.0.0
  - scikit-misc>=0.5.0
  - cython>=0.29                # Build-time dep for legacy pip packages whose
                                # setup.py imports Cython without declaring it
                                # in [build-system].requires (notably velocyto
                                # 0.17.17, installed by 0_setup_env.sh Tier 2.1
                                # via `pip install --no-build-isolation`). Pure-
                                # Python at runtime; harmless to ship in the
                                # main env.
  # Graph / clustering / embedding
  - python-igraph>=0.11.0
  - leidenalg>=0.10.0
  - louvain>=0.8.0
  - umap-learn>=0.5.0
  # Server / notebook runtime
  - pydantic>=2.1,<3.0
  - nbformat>=5.9
  - jupyter_client>=8.0
  - ipykernel>=6.0
  - rich>=13.0.0
  - greenlet>=3.0.0
  - prompt-toolkit>=3.0
  - questionary>=2.0
  - pyyaml>=6.0
  # Web / API stack (used by bot, app-server, memory)
  - aiosqlite>=0.19.0
  - sqlalchemy>=1.4.0
  - fastapi>=0.100.0
  - uvicorn>=0.23.0
  - cryptography>=41.0.0
  - requests>=2.31.0
  - openai>=1.0.0
  - python-dotenv>=1.0.0
  - httpx>=0.27
  # Nbconvert / Jinja2 chain — pulled by kb-python; pinning here breaks the
  # pygpcca/jinja2/fastapi backtracking storm in the pip layer.
  - jinja2>=3.1.5
  - nbconvert>=7.0
  - beautifulsoup4>=4.12
  # Deep learning (CPU-safe baseline; setup script may replace with CUDA)
  - pytorch>=2.0,<3.0
  - pytorch-cpu                 # explicit CPU variant for CPU-only machines.
  # scvi family + downstream
  - scvi-tools>=1.4.0,<2.0
  - scvelo>=0.3.0
  - cellrank>=2.0.7,<2.1
  # Batch correction / integration
  - harmonypy>=0.0.9
  - bbknn>=1.5.0
  - scanorama>=1.7.0
  # Cell typing / communication
  - celltypist>=1.6.0
  - liana>=1.7.1                # bioconda noarch; tracks PyPI 1:1.
                                # Was in `pyproject.toml` until the post-merge
                                # follow-up audit confirmed parity.
  # Enrichment / differential expression
  - gseapy>=1.0.0
  - pydeseq2>=0.4.0
  # Doublet detection
  - scrublet>=0.2.3
  - doubletdetection>=4.3.0
  # GRN / trajectory
  - arboreto>=0.1.6
  - palantir>=1.0.0
  # Single-cell upstream tooling
  - multiqc>=1.33,<2.0
  - kb-python>=0.29.0
  # Spatial statistics
  - esda>=2.4.0
  - libpysal>=4.6.0
  - pysal>=2.6.0
  - pot>=0.9.0                  # PyPI name `POT`, conda name `pot`
  # Resolver-leaf narrowing kept here for parity with prior pyproject pins
  - coloredlogs>=15.0.1,<16.0
  - humanfriendly>=10.0,<11.0
